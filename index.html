<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#06090f">
<title>BYD Voice Bridge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+SC:wght@700&family=Noto+Sans+Arabic:wght@500;700&family=Exo+2:wght@500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--c:#00e5ff;--c2:#006880;--cg:rgba(0,229,255,.1);--bg:#06090f;--bg2:#0a1520;--bg3:#0d1c2b;--t:#cce6ff;--m:#4a7090;--b:rgba(0,229,255,.14);--ok:#00e07a;--err:#ff3355;--warn:#ffaa00;--ar:#7dd8ff;--en:#a0c8e0;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Exo 2',sans-serif;color:var(--t);display:flex;flex-direction:column;}
.top{background:var(--bg2);border-bottom:1px solid var(--b);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.brand{display:flex;align-items:center;gap:9px;}
.bico{width:28px;height:28px;border:1.5px solid var(--c);border-radius:7px;display:flex;align-items:center;justify-content:center;background:var(--cg);}
.bname{color:var(--c);font-size:11px;letter-spacing:2px;font-family:'IBM Plex Mono',monospace;}
.bsub{color:var(--m);font-size:7px;letter-spacing:1px;font-family:'IBM Plex Mono',monospace;}
.pills{display:flex;gap:4px;align-items:center;}
.pi{font-size:7px;padding:2px 6px;border-radius:3px;border:1px solid;letter-spacing:.5px;font-family:'IBM Plex Mono',monospace;}
.pi.ok{border-color:var(--ok);color:var(--ok);}
.pi.cy{border-color:var(--c);color:var(--c);}
.pi.mu{border-color:var(--m);color:var(--m);}
.pi.no{border-color:var(--err);color:var(--err);}
.pi.wa{border-color:var(--warn);color:var(--warn);}
.sbar{display:flex;align-items:center;gap:8px;padding:7px 14px;background:var(--bg3);border-bottom:1px solid var(--b);flex-shrink:0;}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .3s;}
.sdot.armed{background:var(--ok);animation:dp 2s ease-in-out infinite;}
.sdot.go{background:var(--c);animation:dp .6s ease-in-out infinite;}
.sdot.say{background:var(--warn);animation:none;}
.sdot.off{background:var(--m);animation:none;}
@keyframes dp{0%,100%{opacity:1;}50%{opacity:.2;}}
.stxt{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.5px;flex:1;color:var(--m);}
.stxt.armed{color:var(--ok);}
.stxt.go{color:var(--c);}
.stxt.say{color:var(--warn);}
.sbtn{background:transparent;border:1px solid var(--b);color:var(--m);border-radius:4px;padding:3px 10px;font-size:8px;font-family:'IBM Plex Mono',monospace;cursor:pointer;touch-action:manipulation;}
.sbtn:active{border-color:var(--c);color:var(--c);}
.res{padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--b);flex-shrink:0;}
.rlbl{font-size:7px;letter-spacing:1.5px;color:var(--m);font-family:'IBM Plex Mono',monospace;margin-bottom:3px;}
.rtext{font-family:'Noto Sans Arabic',sans-serif;font-size:12px;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-height:17px;}
.rzh{font-family:'Noto Sans SC',sans-serif;font-size:24px;font-weight:700;color:var(--c);min-height:30px;line-height:1.1;}
.rpy{font-size:7px;color:var(--m);font-family:'IBM Plex Mono',monospace;min-height:11px;}
.langbar{display:flex;border-bottom:1px solid var(--b);flex-shrink:0;background:var(--bg2);}
.lb{flex:1;padding:5px 0;border:none;background:transparent;color:var(--m);font-size:9px;font-family:'IBM Plex Mono',monospace;cursor:pointer;letter-spacing:1px;border-bottom:2px solid transparent;touch-action:manipulation;}
.lb.on{color:var(--c);border-bottom-color:var(--c);background:var(--cg);}
.panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.ph{display:flex;align-items:center;justify-content:space-between;padding:5px 14px 2px;flex-shrink:0;}
.ptitle{font-size:7px;letter-spacing:2px;color:var(--m);font-family:'IBM Plex Mono',monospace;}
.pcnt{font-size:7px;color:var(--c);font-family:'IBM Plex Mono',monospace;}
.cats{display:flex;gap:4px;padding:3px 14px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;}
.cats::-webkit-scrollbar{display:none;}
.cb{font-size:9px;padding:3px 9px;border-radius:3px;border:1px solid var(--b);background:transparent;color:var(--m);cursor:pointer;white-space:nowrap;font-family:'IBM Plex Mono',monospace;touch-action:manipulation;}
.cb.on{border-color:var(--c);color:var(--c);background:var(--cg);}
.srch{margin:3px 14px;background:var(--bg3);border:1px solid var(--b);border-radius:5px;padding:5px 10px;color:var(--t);font-size:13px;font-family:'Exo 2',sans-serif;outline:none;display:block;width:calc(100% - 28px);}
.srch::placeholder{color:var(--m);}
.srch:focus{border-color:var(--c);}
.cmdlist{flex:1;min-height:0;overflow-y:auto;padding:3px 14px 14px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.cmdlist::-webkit-scrollbar{width:2px;}
.cmdlist::-webkit-scrollbar-thumb{background:var(--b);}
.cmd{display:flex;align-items:center;gap:9px;padding:9px 10px;margin-bottom:4px;background:var(--bg2);border:1px solid var(--b);border-radius:8px;cursor:pointer;user-select:none;-webkit-user-select:none;transition:border-color .1s;touch-action:manipulation;}
.cmd:active{border-color:var(--c);background:var(--cg);}
.cmd.done{border-color:var(--ok);}
.cmd.wkc{border-color:rgba(0,229,255,.3);background:var(--cg);}
.ci{flex:1;min-width:0;}
.ar{font-family:'Noto Sans Arabic',sans-serif;font-size:14px;font-weight:700;color:var(--ar);direction:rtl;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.en{font-family:'Exo 2',sans-serif;font-size:11px;font-weight:600;color:var(--en);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ccat{font-size:6px;color:var(--m);letter-spacing:1px;opacity:.5;font-family:'IBM Plex Mono',monospace;}
.czh{font-family:'Noto Sans SC',sans-serif;font-size:20px;color:var(--c);flex-shrink:0;min-width:50px;text-align:left;line-height:1;}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--bg2);border:1px solid var(--c);border-radius:10px;padding:6px 16px;font-size:13px;color:var(--c);font-family:'Noto Sans Arabic',sans-serif;opacity:0;transition:all .2s;pointer-events:none;z-index:999;white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
.bot{display:flex;align-items:center;justify-content:space-between;padding:3px 14px;border-top:1px solid var(--b);background:var(--bg2);font-size:7px;color:var(--m);flex-shrink:0;font-family:'IBM Plex Mono',monospace;}
</style>
</head>
<body>

<div class="top">
  <div class="brand">
    <div class="bico">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L21 7V17L12 22L3 17V7L12 2Z" stroke="#00e5ff" stroke-width="1.5"/>

        <path d="M6 12C6 15.3 8.7 18 12 18C15.3 18 18 15.3 18 12" stroke="#00e5ff" stroke-width="1.2" stroke-linecap="round"/>
      </svg>

    <div><div class="bname">BYD VOICE BRIDGE</div><div class="bsub">AR+EN → ZH · DLINK</div></div>
  </div>
  <div class="pills">

</div>

<div class="sbar">

  <span class="stxt off" id="stxt">جاري التشغيل...</span>
  <button class="sbtn" id="sbtn" onclick="G.toggle()">START</button>
</div>

<div class="res">

  <div class="rtext" id="rtext">قول أي أمر مباشرة · Say any command</div>
  <div class="rzh"  id="rzh">你好，小迪</div>
  <div class="rpy"  id="rpy">nǐ hǎo xiǎo dí</div>
</div>

<div class="langbar">
  <button class="lb on" id="lA" onclick="G.lg('ar')">🇸🇦 عربي</button>
  <button class="lb"    id="lE" onclick="G.lg('en')">🇬🇧 English</button>
  <button class="lb"    id="lB" onclick="G.lg('both')">AR+EN</button>
</div>

<div class="panel">
  <div class="ph">
    <span class="ptitle">COMMANDS · الأوامر</span>
    <span class="pcnt" id="cnt">0</span>
  </div>
  <div class="cats" id="cats"></div>
  <input class="srch" id="srch" placeholder="ابحث · Search..." oninput="G.render()">
  <div class="cmdlist" id="list"></div>
</div>

<div class="bot"><span>BYD VOICE BRIDGE v12</span><span id="bst">OFF</span></div>
<div id="toast"></div>

  'اقفل الشبابيك':13,'سكر الشبابيك':13,

  'شغل نور السيارة':60,'نور السيارة':60,

  'شغل البلوتوث':36,'فتح البلوتوث':36,

  'شغل الشاشة':80,'تشغيل الشاشة':80,

  'مود عادي':70,'وضع عادي':70,

  'مود ثلج':73,'وضع ثلج':73,

  'درجة 16':5,'sixteen':5,

  'درجة 22':8,'اتنين وعشرين':8,'twenty two':8,

/* ══ INTENT GUARDS — close words vs open words ══ */
var CW = ['اقفل','اكفل','سكر','وقف','اطفي'];
var OW = ['افتح','شغل','تشغيل','فتح'];
var CIDS = {2:1,13:1,17:1,33:1,37:1,41:1,52:1,53:1,54:1,61:1,63:1,65:1,81:1};
var OIDS = {1:1,12:1,14:1,15:1,16:1,32:1,34:1,36:1,42:1,60:1,62:1,64:1,80:1};
function isCl(t){for(var i=0;i<CW.length;i++)if(t.indexOf(CW[i])>=0)return true;return false;}
function isOp(t){for(var i=0;i<OW.length;i++)if(t.indexOf(OW[i])>=0)return true;return false;}

var CATS = ['ALL','WAKE','WIN','AC','CAR','LGT','DRV','SCR','MED','APP','SYS'];
var And = window.Android||null;
var lang='ar', cat='ALL', lid=null;
var on=false, speaking=false, curR=null, tstT=null;
var micStream=null;
var MK='byd12';

/* ══ INIT ══ */
function init(){
  bldCats(); render();
  // Release mic on hide/close
  document.addEventListener('visibilitychange', function(){
    if(document.hidden) shutdown();
  });
  window.addEventListener('pagehide', shutdown);
  window.addEventListener('beforeunload', shutdown);
  // Resume on return
  document.addEventListener('visibilitychange', function(){
    if(!document.hidden && !on && localStorage.getItem(MK)==='1'){
      setTimeout(function(){startMic(true);}, 300);
    }
  });
  startMic(false);
}

function shutdown(){
  on=false; speaking=false;
  if(curR){try{curR.abort();}catch(e){} curR=null;}
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  if(micStream){
    try{micStream.getTracks().forEach(function(t){t.stop();});}catch(e){}
    micStream=null;
  }
  setS('off','متوقف');
  document.getElementById('sbtn').textContent='START';
  document.getElementById('bst').textContent='OFF';
}

/* ══ MIC ══ */
function startMic(silent){
  navigator.mediaDevices.getUserMedia({
    audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}
  }).then(function(s){
    micStream=s;
    document.getElementById('mPill').textContent='MIC✓';
    document.getElementById('mPill').className='pi ok';
    localStorage.setItem(MK,'1');
    on=true;
    document.getElementById('sbtn').textContent='STOP';
    document.getElementById('bst').textContent='ON';
    setS('armed','يستمع · Listening...');
    listen();
  }).catch(function(){
    document.getElementById('mPill').textContent='TAP🎤';
    document.getElementById('mPill').className='pi wa';
    if(!silent) setS('off','اضغط START لبدء الاستماع');
  });
}

/* ══ TOGGLE ══ */
function toggle(){
  if(on){ shutdown(); }
  else  { startMic(false); }
}

/* ══ LISTEN LOOP ══ */
var SR = window.SpeechRecognition||window.webkitSpeechRecognition;

function listen(){
  if(!on||speaking||curR||!SR) return;
  var r=new SR();
  curR=r;
  r.lang='ar-EG';
  r.continuous=false;
  r.interimResults=true;
  r.maxAlternatives=3;
  setS('armed','يستمع · Listening...');

  r.onresult=function(e){
    var heard='';
    for(var i=0;i<e.results.length;i++) heard+=e.results[i][0].transcript;
    if(heard) document.getElementById('rtext').textContent=heard;
    // Only match on a result of sufficient length
    if(heard.trim().length<3) return;
    var m=doMatch(heard);
    if(m){
      try{r.abort();}catch(x){}
      curR=null;
      runCmd(m);
    }
  };

  r.onerror=function(ev){
    curR=null;
    if(!on||speaking) return;
    var gap = (ev.error==='no-speech'||ev.error==='aborted') ? 40 : 300;
    setTimeout(listen, gap);
  };

  r.onend=function(){
    curR=null;
    if(on&&!speaking) setTimeout(listen,40);
  };

  try{r.start();}
  catch(e){curR=null; if(on) setTimeout(listen,400);}
}

/* ══ MATCH — two-pass: exact then fuzzy ══ */
function doMatch(txt){
  var tl=txt.trim().toLowerCase();
  if(tl.length<3) return null;
  var ci=isCl(tl), oi=isOp(tl);

  /* Pass 1: exact table (longest key wins) */
  var ks=Object.keys(EX).sort(function(a,b){return b.length-a.length;});
  for(var k=0;k<ks.length;k++){
    if(tl.indexOf(ks[k])>=0){
      var tid=EX[ks[k]];
      if(ci && OIDS[tid]) continue;  // close intent → skip open cmd
      if(oi && !ci && CIDS[tid]) continue; // open intent → skip close cmd
      for(var x=0;x<DB.length;x++) if(DB[x].id===tid) return DB[x];
    }
  }

  /* Pass 2: fuzzy — only if text is long enough to be specific */
  if(tl.length<6) return null; // short text must match exactly

  var best=null, bs=0;
  for(var i=0;i<DB.length;i++){
    var cmd=DB[i];
    if(ci && OIDS[cmd.id]) continue;
    if(oi && !ci && CIDS[cmd.id]) continue;
    var phs=[cmd.en.toLowerCase()];
    if(cmd.ar) for(var a=0;a<cmd.ar.length;a++) phs.push(cmd.ar[a].toLowerCase());
    for(var p=0;p<phs.length;p++){
      var ph=phs[p];
      if(tl===ph){best=cmd;bs=1;break;}
      if(tl.indexOf(ph)>=0||ph.indexOf(tl)>=0){if(0.90>bs){bs=0.90;best=cmd;}continue;}
      // Word overlap — require 2+ words to match
      var pw=ph.split(/\s+/), tw=tl.split(/\s+/), h=0;
      for(var wi=0;wi<pw.length;wi++)
        for(var ti=0;ti<tw.length;ti++)
          if(pw[wi].length>2&&tw[ti].length>2&&(pw[wi]===tw[ti]||pw[wi].indexOf(tw[ti])>=0||tw[ti].indexOf(pw[wi])>=0)) h++;
      if(h>=2){ // Need at LEAST 2 word matches
        var sc=(h/Math.max(pw.length,1))*(ph.length/(ph.length+4));
        if(sc>bs){bs=sc;best=cmd;}
      }
    }
    if(bs===1) break;
  }
  return bs>0.40?best:null; // High threshold = fewer false matches
}

/* ══ RUN COMMAND ══ */
function runCmd(cmd){
  lid=cmd.id;
  var lb=(lang!=='en'&&cmd.ar&&cmd.ar.length)?cmd.ar[0]:cmd.en;
  document.getElementById('rlbl').textContent='EXECUTING ✓';
  document.getElementById('rtext').textContent=lb;
  document.getElementById('rzh').textContent=cmd.zh;
  document.getElementById('rpy').textContent=cmd.py;
  toast(cmd.zh+' · '+lb);
  render();
  setS('say','🔊 '+cmd.zh);
  tts(cmd.zh, function(){
    speaking=false;
    document.getElementById('rlbl').textContent='DONE ✓ · تم';
    if(on){ setS('armed','يستمع · Listening...'); setTimeout(listen,200); }
  });
}

/* ══ TTS — callback when truly done ══ */
function tts(txt, cb){
  speaking=true;
  if(curR){try{curR.abort();}catch(e){} curR=null;}

  // Android native bridge
  if(And&&And.speak){
    try{And.speak(txt,'zh-CN',1.0,0.88);setTP('APK');setTimeout(cb,1800);return;}catch(e){}
  }

  // Web Speech API
  if(window.speechSynthesis){
    window.speechSynthesis.cancel();
    var done=false;
    var finish=function(){if(done)return;done=true;cb();};
    var go=function(){
      var vs=window.speechSynthesis.getVoices(),zh=null;
      for(var i=0;i<vs.length;i++){if(vs[i].lang&&vs[i].lang.indexOf('zh')===0){zh=vs[i];break;}}
      var u=new SpeechSynthesisUtterance(txt);
      u.lang='zh-CN'; u.rate=0.85; u.volume=1.0;
      if(zh) u.voice=zh;
      u.onend=function(){setTP('SYN');finish();};
      u.onerror=function(ev){
        if(ev.error==='interrupted'){finish();return;}
        tryGoogle(txt,finish);
      };
      window.speechSynthesis.speak(u);
      setTimeout(function(){if(!done) finish();}, 5000); // safety
    };
    if(window.speechSynthesis.getVoices().length>0) go();
    else{window.speechSynthesis.onvoiceschanged=go; setTimeout(go,300);}
    return;
  }
  tryGoogle(txt,cb);
}

function tryGoogle(txt,cb){
  if(!navigator.onLine){setTP('—');cb();return;}
  try{
    var a=new Audio(), done=false;
    var finish=function(){if(done)return;done=true;cb();};
    a.oncanplay=function(){a.play();setTP('GTT');};
    a.onended=finish;
    a.onerror=function(){setTP('—');finish();};
    a.src='https://translate.google.com/translate_tts?ie=UTF-8&q='+encodeURIComponent(txt)+'&tl=zh-CN&client=tw-ob';
    a.load();
    setTimeout(function(){if(!done)finish();},6000);
  }catch(e){setTP('—');cb();}
}

function setTP(m){var p=document.getElementById('tPill');p.textContent='TTS:'+m;p.className=(m==='APK'||m==='SYN'||m==='GTT')?'pi ok':'pi mu';}

/* ══ UI ══ */
function setS(state,txt){
  var d=document.getElementById('sdot'), s=document.getElementById('stxt');
  d.className='sdot '+state; s.className='stxt '+state; s.textContent=txt;
  document.getElementById('bst').textContent=on?'ON':'OFF';
}
function toast(msg){clearTimeout(tstT);var t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');tstT=setTimeout(function(){t.classList.remove('on');},3000);}
function lg(l){lang=l;var ids=['lA','lE','lB'],vs=['ar','en','both'];for(var i=0;i<ids.length;i++)document.getElementById(ids[i]).className='lb'+(l===vs[i]?' on':'');render();}
function bldCats(){
  var el=document.getElementById('cats');el.innerHTML='';
  for(var i=0;i<CATS.length;i++){
    var c=CATS[i],b=document.createElement('button');
    b.className='cb'+(c===cat?' on':'');b.textContent=c;
    (function(cc){b.onclick=function(){cat=cc;bldCats();render();};})(c);
    el.appendChild(b);
  }
}
function render(){
  var q=(document.getElementById('srch').value||'').toLowerCase();
  var ls=[];
  for(var i=0;i<DB.length;i++){
    var c=DB[i],mc=cat==='ALL'||c.cat===cat;
    var mq=!q||c.en.toLowerCase().indexOf(q)>=0||c.zh.indexOf(q)>=0||(c.ar&&c.ar.join(' ').indexOf(q)>=0);
    if(mc&&mq)ls.push(c);
  }
  document.getElementById('cnt').textContent=ls.length;
  var el=document.getElementById('list');el.innerHTML='';
  for(var j=0;j<ls.length;j++){
    var cmd=ls[j],d=document.createElement('div');
    d.className='cmd'+(cmd.wk?' wkc':'')+(lid===cmd.id?' done':'');
    var ar=(lang!=='en'&&cmd.ar&&cmd.ar.length)?'<div class="ar">'+cmd.ar[0]+'</div>':'';
    var en=(lang!=='ar')?'<div class="en">'+cmd.en+'</div>':'';
    d.innerHTML='<div class="ci">'+ar+en+'<div class="ccat">'+cmd.cat+'</div></div><div class="czh">'+cmd.zh+'</div>';
    (function(c){d.onclick=function(){runCmd(c);};})(cmd);
    el.appendChild(d);
  }
}
init();
return{toggle:toggle, lg:lg, render:render};
})();
</script>
