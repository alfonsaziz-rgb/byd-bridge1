<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>BYD Voice Bridge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Noto+Sans+SC:wght@400;700&family=Share+Tech+Mono&family=Noto+Sans+Arabic:wght@400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --c:#00e5ff;--c2:#0097a7;--cg:rgba(0,229,255,0.12);
  --bg:#060a10;--bg2:#0a1220;--bg3:#0e1a28;
  --t:#ddeeff;--m:#4a7a99;--b:rgba(0,229,255,0.2);
  --ok:#00ff99;--err:#ff3355;
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Rajdhani',sans-serif;color:var(--t);display:flex;flex-direction:column;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:1px solid var(--b);background:var(--bg2);flex-shrink:0;}
.brand{display:flex;align-items:center;gap:10px;}
.bicon{width:36px;height:36px;border:1.5px solid var(--c);border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--cg);}
.btitle{font-size:17px;font-weight:700;letter-spacing:3px;color:var(--c);}
.bsub{font-size:9px;letter-spacing:2px;color:var(--m);font-family:'Share Tech Mono',monospace;}
.pills{display:flex;gap:6px;align-items:center;}
.pill{font-family:'Share Tech Mono',monospace;font-size:9px;padding:2px 8px;border-radius:3px;border:1px solid;letter-spacing:1px;}
.pill.ok{border-color:var(--ok);color:var(--ok);}
.pill.no{border-color:var(--err);color:var(--err);}
.pill.cy{border-color:var(--c);color:var(--c);}
.pill.mu{border-color:var(--m);color:var(--m);}

/* MIC STATUS BAR */
.mic-status-bar{display:none;align-items:center;gap:8px;background:rgba(255,51,85,0.1);border-bottom:1px solid rgba(255,51,85,0.3);padding:8px 18px;flex-shrink:0;}
.mic-status-bar.show{display:flex;}
.msb-text{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--err);letter-spacing:1px;}
.msb-btn{background:var(--err);color:#fff;border:none;border-radius:4px;padding:5px 12px;font-size:11px;font-family:'Share Tech Mono',monospace;letter-spacing:1px;cursor:pointer;}

/* LANG BAR */
.lang-bar{display:flex;border-bottom:1px solid var(--b);background:var(--bg2);flex-shrink:0;}
.lb{flex:1;padding:7px;border:none;background:transparent;color:var(--m);cursor:pointer;font-size:12px;font-weight:600;letter-spacing:1px;font-family:'Rajdhani',sans-serif;border-bottom:2px solid transparent;transition:all .2s;}
.lb.on{color:var(--c);border-bottom-color:var(--c);background:var(--cg);}

/* MAIN */
.main{display:flex;flex:1;overflow:hidden;}

/* LEFT */
.left{flex:1.1;display:flex;flex-direction:column;padding:10px 14px;border-right:1px solid var(--b);overflow:hidden;}

/* HEX MIC */
.mzone{display:flex;flex-direction:column;align-items:center;padding:6px 0;flex-shrink:0;}
.mouter{position:relative;width:100px;height:100px;display:flex;align-items:center;justify-content:center;}
.ring{position:absolute;border-radius:50%;border:1.5px solid transparent;opacity:0;transition:opacity .3s;}
.ring.r1{inset:0;border-top-color:var(--c);border-right-color:var(--c);animation:sp1 2s linear infinite;}
.ring.r2{inset:11%;border-left-color:var(--c2);border-bottom-color:var(--c2);animation:sp2 1.5s linear infinite reverse;}
.mouter.act .ring{opacity:1;}
@keyframes sp1{to{transform:rotate(360deg);}}
@keyframes sp2{to{transform:rotate(360deg);}}
.pdots{position:absolute;inset:0;pointer-events:none;}
.pdot{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--c);opacity:0;}
.mouter.act .pdot{animation:pd 1.8s ease-in-out infinite;}
.pdot:nth-child(1){top:2px;left:calc(50% - 3px);}
.pdot:nth-child(2){top:calc(50% - 3px);right:2px;animation-delay:.45s;}
.pdot:nth-child(3){bottom:2px;left:calc(50% - 3px);animation-delay:.9s;}
.pdot:nth-child(4){top:calc(50% - 3px);left:2px;animation-delay:1.35s;}
@keyframes pd{0%,100%{opacity:0;transform:scale(.5);}50%{opacity:1;transform:scale(1);}}
.hexbtn{
  position:relative;z-index:2;width:70px;height:70px;
  clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);
  background:var(--bg2);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;
}
.hexin{
  width:56px;height:56px;
  clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);
  background:var(--bg3);border:2px solid var(--c2);
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.hexbtn.lst .hexin{border-color:var(--c);box-shadow:0 0 12px rgba(0,229,255,.3);}
.hexbtn.ok2 .hexin{border-color:var(--ok);}
.hexbtn.er .hexin{border-color:var(--err);}
.hexbtn:active{transform:scale(.95);}
.msvg{width:24px;height:24px;transition:all .2s;}

/* RECORDING BAR */
.recbar{display:none;align-items:center;justify-content:center;gap:8px;background:rgba(255,51,85,.08);border:1px solid rgba(255,51,85,.25);border-radius:6px;padding:5px 12px;margin:4px 0;flex-shrink:0;}
.recbar.show{display:flex;}
.reddot{width:7px;height:7px;border-radius:50%;background:var(--err);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.rectxt{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--err);letter-spacing:2px;}
.rectime{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--err);}

/* WAVE */
.wavewrap{height:34px;flex-shrink:0;margin:3px 0;background:var(--bg3);border-radius:6px;border:1px solid var(--b);overflow:hidden;}
#wc{width:100%;height:34px;display:block;}

/* DISPLAY */
.dbox{background:var(--bg2);border:1px solid var(--b);border-radius:10px;padding:12px 14px;flex:1;display:flex;flex-direction:column;justify-content:space-between;margin-top:6px;position:relative;overflow:hidden;}
.dbox::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--c),transparent);}
.dtag{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--m);margin-bottom:4px;}
.zhout{font-family:'Noto Sans SC',sans-serif;font-size:44px;font-weight:700;color:var(--c);line-height:1;min-height:52px;}
.pyout{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--m);margin:3px 0;min-height:16px;}
.srout{font-size:15px;font-weight:600;color:var(--t);min-height:20px;}
.cbar{display:flex;align-items:center;gap:8px;margin-top:8px;}
.clbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--m);width:30px;}
.ctrk{flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.cfil{height:100%;background:var(--c);border-radius:2px;transition:width .3s;width:0%;}
.cpct{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--c);width:28px;text-align:right;}
.nrow{display:flex;align-items:center;gap:8px;margin-top:6px;background:var(--bg3);border-radius:5px;padding:5px 10px;}
.nlbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--m);width:38px;}
.nbars{display:flex;gap:2px;align-items:flex-end;height:16px;}
.nb{width:3px;border-radius:1px;background:var(--bg2);transition:height .1s;}
.nb.lit{background:var(--c);}
.ndb{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--c);margin-left:auto;}

/* RIGHT */
.right{flex:1;display:flex;flex-direction:column;padding:10px 12px;overflow:hidden;}
.ptitle{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--m);margin-bottom:8px;}
.cats{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.catbtn{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;padding:3px 9px;border-radius:3px;border:1px solid var(--b);background:transparent;color:var(--m);cursor:pointer;transition:all .15s;}
.catbtn.on{border-color:var(--c);color:var(--c);background:var(--cg);}
.srch{width:100%;background:var(--bg3);border:1px solid var(--b);border-radius:6px;padding:6px 10px;color:var(--t);font-size:13px;font-family:'Rajdhani',sans-serif;outline:none;margin-bottom:8px;}
.srch:focus{border-color:var(--c);}
.srch::placeholder{color:var(--m);}
.cmds{flex:1;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:5px;align-content:start;}
.cmds::-webkit-scrollbar{width:2px;}
.cmds::-webkit-scrollbar-thumb{background:var(--b);}
.cmd{background:var(--bg3);border:1px solid var(--b);border-radius:7px;padding:9px 10px;cursor:pointer;transition:all .15s;user-select:none;}
.cmd:active{transform:scale(.97);}
.cmd:hover,.cmd:active{border-color:var(--c);background:var(--cg);}
.cmd.done{border-color:var(--ok);background:rgba(0,255,153,.05);}
.cen{font-size:11px;font-weight:600;color:var(--t);}
.car{font-family:'Noto Sans Arabic',sans-serif;font-size:11px;color:var(--m);margin:1px 0;direction:rtl;}
.ccat{font-size:8px;color:var(--m);font-family:'Share Tech Mono',monospace;letter-spacing:1px;}
.czh{font-family:'Noto Sans SC',sans-serif;font-size:20px;color:var(--c);}

/* CHAT BUBBLE */
#chat{position:fixed;bottom:44px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg2);border:1px solid var(--c);border-radius:12px;padding:10px 20px;font-size:14px;font-family:'Noto Sans Arabic',sans-serif;direction:rtl;text-align:center;max-width:85%;opacity:0;transition:all .35s;pointer-events:none;z-index:500;box-shadow:0 0 24px rgba(0,229,255,.2);}
#chat.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* BOTTOM */
.bot{display:flex;align-items:center;justify-content:space-between;padding:5px 16px;border-top:1px solid var(--b);background:var(--bg2);font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--m);letter-spacing:1.5px;flex-shrink:0;}
.wk{display:flex;align-items:center;gap:4px;}
.wdot{width:5px;height:5px;border-radius:50%;background:var(--ok);box-shadow:0 0 5px var(--ok);}
.mhint{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--m);margin-top:5px;text-align:center;}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">
    <div class="bicon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L21 7V17L12 22L3 17V7L12 2Z" stroke="#00e5ff" stroke-width="1.5"/>
        <rect x="9" y="5" width="6" height="9" rx="3" stroke="#00e5ff" stroke-width="1.2"/>
        <path d="M6 12C6 15.3 8.7 18 12 18C15.3 18 18 15.3 18 12" stroke="#00e5ff" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="12" y1="18" x2="12" y2="21" stroke="#00e5ff" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <div class="btitle">BYD VOICE BRIDGE</div>
      <div class="bsub">DLINK · CHINESE VOICE SYSTEM</div>
    </div>
  </div>
  <div class="pills">
    <div class="pill cy">PWA</div>
    <div class="pill mu" id="micPill">MIC —</div>

</div>

<!-- MIC STATUS BAR -->
<div class="mic-status-bar" id="mStat">

  <button class="msb-btn" onclick="grantMic()">GRANT ACCESS</button>
</div>

<!-- LANG BAR -->
<div class="lang-bar">
  <button class="lb on" id="lb1" onclick="setLang('ar')">🇪🇬 عربي</button>
  <button class="lb" id="lb2" onclick="setLang('en')">🇬🇧 English</button>
  <button class="lb" id="lb3" onclick="setLang('both')">BOTH · الاثنين</button>
</div>

<div class="main">
<!-- LEFT -->
<div class="left">
  <div class="mzone">
    <div class="mouter" id="mo">
      <div class="ring r1"></div>
      <div class="ring r2"></div>
      <div class="pdots">
        <div class="pdot"></div><div class="pdot"></div>
        <div class="pdot"></div><div class="pdot"></div>
      </div>
      <button class="hexbtn" id="hb" onclick="toggleListen()">
        <div class="hexin">
          <svg class="msvg" viewBox="0 0 24 24" fill="none" id="msvg">
            <rect x="8" y="2" width="8" height="13" rx="4" stroke="#4a7a99" stroke-width="1.8" id="mb"/>
            <path d="M4 12C4 16.4 7.6 20 12 20C16.4 20 20 16.4 20 12" stroke="#4a7a99" stroke-width="1.8" stroke-linecap="round" id="ma"/>
            <line x1="12" y1="20" x2="12" y2="23" stroke="#4a7a99" stroke-width="1.8" stroke-linecap="round" id="ml"/>
            <line x1="9" y1="23" x2="15" y2="23" stroke="#4a7a99" stroke-width="1.8" stroke-linecap="round" id="mba"/>
            <line x1="10" y1="10" x2="10" y2="7" stroke="#4a7a99" stroke-width="1.2" stroke-linecap="round" id="f1" opacity=".4"/>
            <line x1="12" y1="10" x2="12" y2="5" stroke="#4a7a99" stroke-width="1.2" stroke-linecap="round" id="f2" opacity=".4"/>
            <line x1="14" y1="10" x2="14" y2="8" stroke="#4a7a99" stroke-width="1.2" stroke-linecap="round" id="f3" opacity=".4"/>
          </svg>
        </div>
      </button>
    </div>
    <div class="mhint" id="mhint">قول "BYD" أو اضغط المايك</div>
  </div>

  <div class="recbar" id="rb">
    <div class="reddot"></div>
    <span class="rectxt">RECORDING</span>
    <span class="rectime" id="rt">0:00</span>
  </div>

  <div class="wavewrap"><canvas id="wc" height="34"></canvas></div>

  <div class="dbox">
    <div>
      <div class="dtag" id="dtag">WAITING · في انتظار الأمر</div>
      <div class="zhout" id="zhout">BYD</div>
      <div class="pyout" id="pyout">bèi yǎ dí</div>
      <div class="srout" id="srout">Say a command or tap mic</div>
    </div>
    <div>
      <div class="cbar">
        <span class="clbl">CONF</span>
        <div class="ctrk"><div class="cfil" id="cf"></div></div>
        <span class="cpct" id="cp">—</span>
      </div>
      <div class="nrow">
        <span class="nlbl">NOISE</span>
        <div class="nbars" id="nb"></div>
        <span class="ndb" id="ndb">—</span>
      </div>
    </div>
  </div>
</div>

<!-- RIGHT -->
<div class="right">
  <div class="ptitle">COMMAND LIBRARY · مكتبة الأوامر</div>
  <div class="cats" id="cats"></div>
  <input class="srch" id="srch" placeholder="Search · ابحث..." oninput="renderCmds()">
  <div class="cmds" id="cmds"></div>
</div>
</div>

<div class="bot">
  <span>BYD VOICE BRIDGE v3.0 · OFFLINE</span>
  <div class="wk"><div class="wdot"></div><span>WAKE: "BYD" ACTIVE</span></div>
</div>

<div id="chat"></div>

<script>

  {id:38,en:'WiFi on',ar:['فتح الواي فاي','شغل النت'],zh:'打开无线网络',py:'dǎkāi wúxiàn wǎngluò',cat:'SYSTEM'},
  {id:39,en:'Fan speed up',ar:['زود الفان','سرعة الهواء','زود التهوية'],zh:'增加风速',py:'zēngjiā fēng sù',cat:'CLIMATE'},
  {id:40,en:'Fan speed down',ar:['قلل الفان','قلل التهوية'],zh:'降低风速',py:'jiàng dī fēng sù',cat:'CLIMATE'},
];
const CASUAL=[
  {t:['ازيك','عامل ايه','اخبارك','عاملة ايه','حالك ايه'],r:'أنا كويسة زي الفل! 😊 وانت عامل ايه؟'},
  {t:['صباح الخير','صبح النور'],r:'صباح النور يا فندم ☀️ يارب يومك حلو!'},
  {t:['مساء الخير','مسا النور'],r:'مساء الفل! 🌙 عامل ايه انهارده؟'},
  {t:['انت مين','اسمك ايه','انتي مين'],r:'أنا BYD Voice Bridge، مساعدك الصوتي الذكي 🚗'},
  {t:['شكرا','مشكور','تسلم'],r:'العفو! في أمر تاني؟ 😊'},
  {t:['تعبان','مش كويس','زهقت'],r:'متزهقش! أنا هنا دايما معاك 💙'},
  {t:['انهارده','النهارده','اليوم'],r:'يوم جميل للرحلة! 🚗 فين رايح؟'},
];

const CATS=['ALL',...new Set(DB.map(c=>c.cat))];
let lang='ar', activeCat='ALL', lastCmd=null;
let listening=false, micGranted=false;
let recSec=0, recTimer=null;
let noiseTimer=null;
let waveId=null;
let audioCtx=null, analyser=null, micStream=null;
let chatTimer=null;

// ======== ANDROID BRIDGE ========
// Check if running inside Android WebView with our Java bridge
const Android = window.Android || null;
const isAndroid = !!Android;

// ======== INIT ========
(function init(){
  // Build noise bars
  const nb=document.getElementById('nb');
  for(let i=0;i<14;i++){
    const b=document.createElement('div');
    b.className='nb';b.id='n'+i;b.style.height='2px';
    nb.appendChild(b);
  }
  buildCats();renderCmds();
  idleNoise();
  checkNet();
  window.addEventListener('online',checkNet);
  window.addEventListener('offline',checkNet);

  // Check mic immediately
  if(navigator.permissions){
    navigator.permissions.query({name:'microphone'}).then(r=>{
      if(r.state==='granted'){grantMic();}
      else{document.getElementById('mStat').classList.add('show');}
      r.onchange=()=>{if(r.state==='granted')grantMic();};
    }).catch(()=>document.getElementById('mStat').classList.add('show'));
  } else {
    // Auto-try on Android
    if(isAndroid) grantMic();
    else document.getElementById('mStat').classList.add('show');
  }
})();

function checkNet(){
  const p=document.getElementById('netPill');
  p.textContent=navigator.onLine?'ONLINE':'OFFLINE';
  p.className=navigator.onLine?'pill ok':'pill mu';
}

// ======== MIC GRANT ========
async function grantMic(){
  try{
    micStream=await navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true,channelCount:1}
    });
    micGranted=true;
    document.getElementById('mStat').classList.remove('show');
    document.getElementById('micPill').textContent='MIC ✓';
    document.getElementById('micPill').className='pill ok';
    setupAnalyser();
    drawWave();
    startWake();
  }catch(e){
    document.getElementById('mStatTxt').textContent='⚠ MIC DENIED — USE MANUAL COMMANDS BELOW';
    document.getElementById('micPill').textContent='MIC ✗';
    document.getElementById('micPill').className='pill no';
  }
}

function setupAnalyser(){
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=512;
    const src=audioCtx.createMediaStreamSource(micStream);
    src.connect(analyser);
    clearInterval(noiseTimer);
    liveNoise();
  }catch(e){idleNoise();}
}

// ======== NOISE ========
function idleNoise(){
  clearInterval(noiseTimer);
  noiseTimer=setInterval(()=>{
    const d=Math.floor(Math.random()*10+3);
    document.getElementById('ndb').textContent=d+'dB';
    for(let i=0;i<14;i++){
      const h=Math.random()*3+1;
      const b=document.getElementById('n'+i);
      b.style.height=Math.round(h)+'px';b.className='nb';
    }
  },600);
}
function liveNoise(){
  clearInterval(noiseTimer);
  const data=new Uint8Array(analyser?analyser.frequencyBinCount:0);
  noiseTimer=setInterval(()=>{
    if(!analyser)return;
    analyser.getByteFrequencyData(data);
    const avg=data.slice(0,60).reduce((a,b)=>a+b,0)/60;
    const db=Math.round(20*Math.log10((avg||1)/255)+90);
    document.getElementById('ndb').textContent=Math.max(0,db)+'dB';
    for(let i=0;i<14;i++){
      const h=Math.min(16,(data[i*3]||0)/16+1);
      const b=document.getElementById('n'+i);
      b.style.height=Math.round(h)+'px';
      b.className='nb'+(h>7?' lit':'');
    }
  },100);
}

// ======== WAVEFORM ========
function drawWave(){
  if(!analyser)return;
  const canvas=document.getElementById('wc');
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth||300;
  const W=canvas.width,H=34;
  const data=new Uint8Array(analyser.fftSize);
  function frame(){
    analyser.getByteTimeDomainData(data);
    ctx.clearRect(0,0,W,H);
    ctx.beginPath();
    ctx.strokeStyle=listening?'#00e5ff':'#0097a7';
    ctx.lineWidth=1.5;
    const step=W/data.length;
    for(let i=0;i<data.length;i++){
      const v=data[i]/128-1,y=H/2+v*(H/2-3);
      i===0?ctx.moveTo(0,y):ctx.lineTo(i*step,y);
    }
    ctx.stroke();
    waveId=requestAnimationFrame(frame);
  }
  if(waveId)cancelAnimationFrame(waveId);
  frame();
}

// ======== SPEECH — Android WebView Compatible ========
// Uses webkitSpeechRecognition if available, else falls back to MediaRecorder
function getSR(){
  return window.SpeechRecognition||window.webkitSpeechRecognition||null;
}

// ======== WAKE WORD ========
function startWake(){
  const SR=getSR();
  if(!SR||!micGranted)return;
  function loop(){
    if(listening)return;
    const r=new SR();
    r.lang=lang==='en'?'en-US':'ar-EG';
    r.interimResults=false;
    r.continuous=false;
    r.maxAlternatives=3;
    r.onresult=(e)=>{
      for(let i=0;i<e.results.length;i++){
        const tr=e.results[i][0].transcript.toLowerCase();
        if(tr.includes('byd')||tr.includes('بيد')||tr.includes('باي دي')||tr.includes('بي واي دي')){
          if(!listening)startListen();return;
        }
        if(checkCasual(tr))return;
        const m=fuzzy(tr);
        if(m&&m.c>55){execCmd(m.cmd);}
      }
    };
    r.onend=()=>{if(!listening)setTimeout(loop,600);};
    r.onerror=(e)=>{
      const skip=['no-speech','aborted','network'];
      if(!skip.includes(e.error))console.warn('wake err',e.error);
      if(!listening)setTimeout(loop,1500);
    };
    try{r.start();}catch(e){setTimeout(loop,2000);}
  }
  loop();
}

// ======== LISTEN ========
function toggleListen(){
  if(!micGranted){grantMic();return;}
  if(listening){stopListen();return;}
  startListen();
}

function startListen(){
  if(listening)return;
  const SR=getSR();
  if(!SR){
    setDisp('NOT SUPPORTED','Use manual commands below','—','',0);
    return;
  }
  const r=new SR();
  r.lang=lang==='en'?'en-US':'ar-EG';
  r.interimResults=true;
  r.continuous=false;
  r.maxAlternatives=5;
  r.onstart=()=>{
    listening=true;
    document.getElementById('mo').classList.add('act');
    document.getElementById('hb').classList.add('lst');
    document.getElementById('mhint').textContent='🎙️ بسمعك... LISTENING';
    document.getElementById('rb').classList.add('show');
    setMicColor('#00e5ff');setFreq(true);
    recSec=0;
    clearInterval(recTimer);
    recTimer=setInterval(()=>{
      recSec++;
      const m=Math.floor(recSec/60),s=recSec%60;
      document.getElementById('rt').textContent=m+':'+(s<10?'0':'')+s;
    },1000);
    setDisp('LISTENING · بسمعك','...','','',0);
  };
  r.onresult=(e)=>{
    const tr=Array.from(e.results).map(x=>x[0].transcript).join(' ');
    const cf=e.results[e.results.length-1][0].confidence||0.6;
    const pct=Math.round(cf*100);
    document.getElementById('srout').textContent=tr;
    document.getElementById('cf').style.width=pct+'%';
    document.getElementById('cp').textContent=pct+'%';
    if(checkCasual(tr.toLowerCase())){stopListen();return;}
    if(pct>=50){
      const m=fuzzy(tr);
      if(m&&m.c>45){stopListen();execCmd(m.cmd);}
    }
  };
  r.onerror=(ev)=>{
    const ignore=['no-speech','aborted'];
    if(!ignore.includes(ev.error)){
      document.getElementById('hb').classList.add('er');
      setDisp('ERROR: '+ev.error.toUpperCase(),'Try again','—','',0);
      setTimeout(()=>document.getElementById('hb').classList.remove('er'),2000);
    }
    stopListen();
  };
  r.onend=()=>stopListen();
  window._recog=r;
  try{r.start();}catch(e){stopListen();}
}

function stopListen(){
  listening=false;
  if(window._recog){try{window._recog.stop();}catch(e){}window._recog=null;}
  clearInterval(recTimer);
  document.getElementById('rb').classList.remove('show');
  document.getElementById('mo').classList.remove('act');
  document.getElementById('hb').classList.remove('lst');
  document.getElementById('mhint').textContent='قول "BYD" أو اضغط المايك';
  setMicColor('#4a7a99');setFreq(false);
  if(document.getElementById('dtag').textContent.includes('LISTENING'))
    setDisp('READY · جاهز','—','BYD','bèi yǎ dí',0);
  if(micGranted)setTimeout(startWake,700);
}

// ======== EXECUTE COMMAND ========
function execCmd(cmd){
  lastCmd=cmd;
  const label=lang==='en'?cmd.en:(cmd.ar&&cmd.ar.length?cmd.ar[0]:cmd.en);
  setDisp('EXECUTING · تنفيذ',label,cmd.zh,cmd.py,96);
  document.getElementById('hb').classList.add('ok2');
  renderCmds();
  // Speak Chinese — multiple methods
  speakChinese(cmd.zh);
  // Haptic if Android bridge available
  if(Android&&Android.vibrate)Android.vibrate(80);
  setTimeout(()=>{
    document.getElementById('hb').classList.remove('ok2');
    setDisp('DONE ✓ · تم',label,cmd.zh,cmd.py,96);
  },2200);
}

// ======== TTS — 3 fallback methods ========
function speakChinese(text){
  // Method 1: Android bridge (most reliable in WebView)
  if(Android&&Android.speak){
    Android.speak(text,'zh-CN',1.0,0.85);
    return;
  }
  // Method 2: Web Speech API
  if(window.speechSynthesis){
    window.speechSynthesis.cancel();
    setTimeout(()=>{
      const u=new SpeechSynthesisUtterance(text);
      u.lang='zh-CN';u.rate=0.82;u.pitch=1;u.volume=1;
      // Force voices to load
      const voices=window.speechSynthesis.getVoices();
      const zh=voices.find(v=>v.lang&&v.lang.startsWith('zh'));
      if(zh)u.voice=zh;
      u.onend=()=>{};
      u.onerror=(e)=>console.warn('TTS err',e);
      window.speechSynthesis.speak(u);
    },50);
    return;
  }
  // Method 3: Confirmation beep
  beep(660,0.15);
}

function beep(freq,dur){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.frequency.value=freq;o.type='sine';
    g.gain.setValueAtTime(0.25,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    o.start();o.stop(ac.currentTime+dur+0.01);
  }catch(e){}
}

// ======== FUZZY MATCH ========
function fuzzy(text){
  const t=text.toLowerCase().trim();
  let best=null,bestSc=0;
  DB.forEach(cmd=>{
    const phrases=[cmd.en.toLowerCase(),...(cmd.ar||[])];
    phrases.forEach(ph=>{
      // Direct include
      if(t.includes(ph.toLowerCase())||ph.toLowerCase().includes(t)){
        if(0.9>bestSc){bestSc=0.9;best=cmd;}
        return;
      }
      // Word overlap
      const pw=ph.toLowerCase().split(/\s+/);
      const tw=t.split(/\s+/);
      let hits=0;
      pw.forEach(p=>tw.forEach(w=>{
        if(p.length>1&&w.length>1&&(p.includes(w)||w.includes(p)))hits++;
      }));
      const sc=hits/Math.max(pw.length,1);
      if(sc>bestSc){bestSc=sc;best=cmd;}
    });
  });
  return bestSc>0.28?{cmd:best,c:Math.round(bestSc*100)}:null;
}

// ======== CASUAL CHAT ========
function checkCasual(t){
  for(const g of CASUAL){
    if(g.t.some(tr=>t.includes(tr))){
      showChat(g.r);
      setDisp('CHAT · دردشة',g.r,'💬','',0);
      return true;
    }
  }
  return false;
}
function showChat(msg){
  clearTimeout(chatTimer);
  const b=document.getElementById('chat');
  b.textContent=msg;b.classList.add('show');
  chatTimer=setTimeout(()=>b.classList.remove('show'),4500);
}

// ======== DISPLAY ========
function setDisp(tag,src,zh,py,conf){
  document.getElementById('dtag').textContent=tag;
  document.getElementById('srout').textContent=src;
  document.getElementById('zhout').textContent=zh||'BYD';
  document.getElementById('pyout').textContent=py||'';
  document.getElementById('cf').style.width=conf+'%';
  document.getElementById('cp').textContent=conf?conf+'%':'—';
}

// ======== MIC SVG ========
function setMicColor(c){
  ['mb','ma','ml','mba','f1','f2','f3'].forEach(id=>{
    const e=document.getElementById(id);if(e)e.setAttribute('stroke',c);
  });
}
function setFreq(on){
  const bars=['f1','f2','f3'],y2s=['7','4','8'];
  bars.forEach((id,i)=>{
    const e=document.getElementById(id);if(!e)return;
    e.setAttribute('y2',on?y2s[i]:'10');
    e.setAttribute('opacity',on?'1':'0.4');
  });
}

// ======== LANG ========
function setLang(l){
  lang=l;
  ['lb1','lb2','lb3'].forEach((id,i)=>document.getElementById(id).className='lb'+(l===['ar','en','both'][i]?' on':''));
  renderCmds();
}

// ======== CATS & CMDS ========
function buildCats(){
  const el=document.getElementById('cats');el.innerHTML='';
  CATS.forEach(c=>{
    const b=document.createElement('button');
    b.className='catbtn'+(c===activeCat?' on':'');
    b.textContent=c;
    b.onclick=()=>{activeCat=c;buildCats();renderCmds();};
    el.appendChild(b);
  });
}
function renderCmds(){
  const q=(document.getElementById('srch').value||'').toLowerCase();
  const list=DB.filter(c=>{
    const mc=activeCat==='ALL'||c.cat===activeCat;
    const mq=!q||c.en.toLowerCase().includes(q)||c.zh.includes(q)||(c.ar||[]).join(' ').includes(q);
    return mc&&mq;
  });
  const el=document.getElementById('cmds');el.innerHTML='';
  list.forEach(c=>{
    const d=document.createElement('div');
    d.className='cmd'+(lastCmd&&lastCmd.id===c.id?' done':'');
    const ar=(c.ar&&c.ar.length)?c.ar[0]:'';
    d.innerHTML=`
      ${lang!=='ar'?`<div class="cen">${c.en}</div>`:''}
      ${lang!=='en'&&ar?`<div class="car">${ar}</div>`:''}
      <div class="ccat">${c.cat}</div>
      <div class="czh">${c.zh}</div>`;
    d.onclick=()=>execCmd(c);
    el.appendChild(d);
  });
}
