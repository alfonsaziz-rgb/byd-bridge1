<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#06090f">
<title>BYD Voice Bridge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+SC:wght@700&family=Noto+Sans+Arabic:wght@500;700&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --c:#00e5ff;--c2:#007a99;--cg:rgba(0,229,255,0.10);
  --bg:#06090f;--bg2:#0a1520;--bg3:#0d1c2b;
  --t:#cce6ff;--m:#3d6070;--b:rgba(0,229,255,0.13);
  --ok:#00e07a;--err:#ff3355;--warn:#ffaa00;
  --ar:#7dd8ff;
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Inter',sans-serif;color:var(--t);display:flex;flex-direction:column;}

/* ── TOP BAR ── */
.top{background:var(--bg2);border-bottom:1px solid var(--b);padding:7px 13px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.brand{display:flex;align-items:center;gap:8px;}
.bico{width:26px;height:26px;border:1.5px solid var(--c);border-radius:6px;display:flex;align-items:center;justify-content:center;background:var(--cg);}
.btitle{color:var(--c);font-size:11px;letter-spacing:2px;font-weight:600;font-family:'Share Tech Mono',monospace;}
.bsub{color:var(--m);font-size:7px;letter-spacing:1px;font-family:'Share Tech Mono',monospace;}
.topright{display:flex;gap:4px;align-items:center;}
.pi{font-size:7px;padding:2px 6px;border-radius:3px;border:1px solid;letter-spacing:.5px;font-family:'Share Tech Mono',monospace;}
.pi.ok{border-color:var(--ok);color:var(--ok);}
.pi.cy{border-color:var(--c);color:var(--c);}
.pi.mu{border-color:var(--m);color:var(--m);}
.pi.no{border-color:var(--err);color:var(--err);}
.pi.warn{border-color:var(--warn);color:var(--warn);}

/* ── LANG TOGGLE ── */
.langbar{display:flex;border-bottom:1px solid var(--b);flex-shrink:0;background:var(--bg2);}
.lbtn{flex:1;padding:5px 0;border:none;background:transparent;color:var(--m);font-size:10px;font-family:'Share Tech Mono',monospace;cursor:pointer;letter-spacing:1px;border-bottom:2px solid transparent;transition:all .2s;touch-action:manipulation;}
.lbtn.on{color:var(--c);border-bottom-color:var(--c);background:var(--cg);}

/* ── MIC ZONE ── */
.mzone{background:var(--bg2);border-bottom:1px solid var(--b);padding:9px 13px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.mouter{position:relative;width:66px;height:66px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.ring{position:absolute;border-radius:50%;border:1.5px solid transparent;opacity:0;transition:opacity .35s;}
.ring.r1{inset:0;border-top-color:var(--c);border-right-color:var(--c);animation:sp1 2s linear infinite;}
.ring.r2{inset:10%;border-left-color:var(--c2);border-bottom-color:var(--c2);animation:sp2 1.5s linear infinite reverse;}
.mouter.act .ring{opacity:1;}
@keyframes sp1{to{transform:rotate(360deg);}}
@keyframes sp2{to{transform:rotate(360deg);}}
.pdot{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--c);opacity:0;}
.mouter.act .pdot{animation:pd 1.5s ease-in-out infinite;}
.pdot:nth-child(3){top:0;left:calc(50% - 2px);}
.pdot:nth-child(4){right:0;top:calc(50% - 2px);animation-delay:.37s;}
.pdot:nth-child(5){bottom:0;left:calc(50% - 2px);animation-delay:.75s;}
.pdot:nth-child(6){left:0;top:calc(50% - 2px);animation-delay:1.12s;}
@keyframes pd{0%,100%{opacity:0;transform:scale(.3);}50%{opacity:1;transform:scale(1);}}
.hexbtn{width:50px;height:50px;clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;z-index:2;transition:transform .12s;touch-action:manipulation;}
.hexin{width:40px;height:40px;clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);background:var(--bg3);display:flex;align-items:center;justify-content:center;border:1.5px solid var(--c2);transition:all .2s;}
.hexbtn.lst .hexin{border-color:var(--c);}
.hexbtn.ok2 .hexin{border-color:var(--ok);}
.hexbtn.er  .hexin{border-color:var(--err);}
.hexbtn:active{transform:scale(.9);}
.minfo{flex:1;min-width:0;}
.stag{font-size:7px;letter-spacing:1.5px;color:var(--m);margin-bottom:2px;font-family:'Share Tech Mono',monospace;}
.zhbig{font-family:'Noto Sans SC',sans-serif;font-size:19px;font-weight:700;color:var(--c);line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pybig{font-size:7px;color:var(--m);margin:2px 0;white-space:nowrap;font-family:'Share Tech Mono',monospace;}
.srbig{font-family:'Noto Sans Arabic',sans-serif;font-size:12px;font-weight:500;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── WAKE STRIP ── */
.wkstrip{display:flex;align-items:center;gap:6px;padding:4px 13px;background:rgba(0,224,122,.05);border-bottom:1px solid rgba(0,224,122,.10);flex-shrink:0;transition:all .3s;}
.wkstrip.go{background:var(--cg);border-bottom-color:var(--b);}
.wkdot{width:5px;height:5px;border-radius:50%;background:var(--ok);animation:wkp 2s ease-in-out infinite;flex-shrink:0;}
.wkstrip.go .wkdot{background:var(--c);animation:none;}
@keyframes wkp{0%,100%{opacity:1;}50%{opacity:.2;}}
.wktxt{font-size:8px;color:var(--ok);letter-spacing:.5px;font-family:'Share Tech Mono',monospace;}
.wkstrip.go .wktxt{color:var(--c);}

/* background badge */
.bgbadge{display:none;font-size:7px;padding:1px 5px;border-radius:3px;border:1px solid var(--warn);color:var(--warn);font-family:'Share Tech Mono',monospace;margin-left:auto;}
.bgbadge.show{display:block;}

/* ── REC BAR ── */
.recbar{display:none;align-items:center;gap:5px;padding:3px 13px;background:rgba(255,51,85,.05);border-bottom:1px solid rgba(255,51,85,.10);flex-shrink:0;}
.recbar.show{display:flex;}
.rdot{width:5px;height:5px;border-radius:50%;background:var(--err);animation:bk 1s infinite;}
@keyframes bk{0%,100%{opacity:1;}50%{opacity:.1;}}
.rtxt{font-size:8px;color:var(--err);letter-spacing:2px;font-family:'Share Tech Mono',monospace;}
.rtime{font-size:8px;color:var(--err);font-family:'Share Tech Mono',monospace;}

/* ── NOISE / CONF ── */
.nstrip{display:flex;align-items:center;gap:7px;padding:3px 13px;background:var(--bg3);flex-shrink:0;}
.nlbl{font-size:7px;color:var(--m);width:30px;font-family:'Share Tech Mono',monospace;}
.nbars{display:flex;gap:2px;align-items:flex-end;height:10px;flex:1;}
.nb{width:3px;border-radius:1px;background:var(--bg2);transition:height .08s;}
.nb.lit{background:var(--c);}
.nval{font-size:7px;color:var(--c);width:28px;text-align:right;font-family:'Share Tech Mono',monospace;}
.cstrip{display:flex;align-items:center;gap:7px;padding:2px 13px;flex-shrink:0;}
.clbl{font-size:7px;color:var(--m);width:28px;font-family:'Share Tech Mono',monospace;}
.ctrk{flex:1;height:2px;background:var(--bg3);border-radius:1px;overflow:hidden;}
.cfil{height:100%;background:var(--c);border-radius:1px;width:0%;transition:width .25s;}
.cpct{font-size:7px;color:var(--c);width:24px;text-align:right;font-family:'Share Tech Mono',monospace;}

/* ── COMMANDS PANEL ── */
.cmpanel{flex:1;display:flex;flex-direction:column;overflow:hidden;border-top:1px solid var(--b);min-height:0;}
.cmhead{display:flex;align-items:center;justify-content:space-between;padding:5px 13px 2px;flex-shrink:0;}
.cmtitle{font-size:7px;letter-spacing:2px;color:var(--m);font-family:'Share Tech Mono',monospace;}
.cmcnt{font-size:7px;color:var(--c);font-family:'Share Tech Mono',monospace;}
.cats{display:flex;gap:4px;padding:3px 13px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;}
.cats::-webkit-scrollbar{display:none;}
.catbtn{font-size:9px;padding:3px 9px;border-radius:3px;border:1px solid var(--b);background:transparent;color:var(--m);cursor:pointer;white-space:nowrap;font-family:'Share Tech Mono',monospace;touch-action:manipulation;}
.catbtn.on{border-color:var(--c);color:var(--c);background:var(--cg);}
.srch{margin:3px 13px;background:var(--bg3);border:1px solid var(--b);border-radius:5px;padding:5px 10px;color:var(--t);font-size:12px;font-family:'Inter',sans-serif;outline:none;display:block;width:calc(100% - 26px);}
.srch::placeholder{color:var(--m);}
.srch:focus{border-color:var(--c);}

/* ── COMMAND LIST ── iOS-optimised scroll ── */
.cmdlist{
  flex:1;min-height:0;
  overflow-y:auto;
  overflow-x:hidden;
  padding:4px 13px 16px;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  will-change:scroll-position;
}
.cmdlist::-webkit-scrollbar{width:2px;}
.cmdlist::-webkit-scrollbar-thumb{background:var(--b);border-radius:1px;}

/* ── COMMAND CARD ── */
.cmd{
  display:flex;align-items:center;gap:10px;
  padding:10px 11px;margin-bottom:5px;
  background:var(--bg2);border:1px solid var(--b);border-radius:9px;
  cursor:pointer;
  touch-action:manipulation;
  -webkit-tap-highlight-color:rgba(0,229,255,.08);
  user-select:none;-webkit-user-select:none;
  transition:border-color .1s,background .1s;
}
.cmd:active{border-color:var(--c);background:var(--cg);}
.cmd.done{border-color:var(--ok);}
.cmd.wk{border-color:rgba(0,229,255,.32);background:var(--cg);}
.cmd.sp{border-color:rgba(255,170,0,.18);}

/* LEFT INFO */
.cmdl{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;}

/* Arabic — PRIMARY, large, bright */
.car{
  font-family:'Noto Sans Arabic',sans-serif;
  font-size:15px;
  font-weight:700;
  color:var(--ar);
  direction:rtl;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.25;
}
/* English — secondary, smaller, muted */
.cen{
  font-family:'Inter',sans-serif;
  font-size:10px;
  font-weight:500;
  color:var(--m);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:.2px;
}
.ccat{font-size:6px;color:var(--m);letter-spacing:1px;opacity:.5;font-family:'Share Tech Mono',monospace;}

/* Chinese — large, cyan, right */
.czh{
  font-family:'Noto Sans SC',sans-serif;
  font-size:22px;color:var(--c);
  flex-shrink:0;min-width:54px;text-align:right;line-height:1;
}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--bg2);border:1px solid var(--c);border-radius:10px;
  padding:6px 16px;font-size:13px;
  color:var(--c);font-family:'Noto Sans Arabic',sans-serif;
  opacity:0;transition:all .22s;pointer-events:none;z-index:999;
  white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.bot{display:flex;align-items:center;justify-content:space-between;padding:3px 13px;border-top:1px solid var(--b);background:var(--bg2);font-size:7px;color:var(--m);letter-spacing:1px;flex-shrink:0;font-family:'Share Tech Mono',monospace;}
</style>
</head>
<body>

</div>

<div class="wkstrip" id="wks">
  <div class="wkdot" id="wkd"></div>

</div>

  <span>BYD VOICE BRIDGE v7 · مرحباً 小迪</span>

</div>
<div id="toast"></div>

// ── Visibility / Resume handler ──
function onVisibility(){
  if(document.hidden){
    isVisible=false;
    document.getElementById('bgb').classList.add('show');
    // Keep wake loop running — just mark as background
  } else {
    isVisible=true;
    document.getElementById('bgb').classList.remove('show');
    onFocus();
  }
}
function onFocus(){
  // Resume from freeze (common on iOS Safari after tab switch)
  if(!listening && micOk && !wakeRunning){
    // Kill any stale recognition
    if(window._rec){try{window._rec.stop();}catch(e){}window._rec=null;}
    wakeRunning=false;
    setTimeout(()=>startWake(),300);
  }
  // Resume AudioContext if suspended (iOS)
  if(aCtx && aCtx.state==='suspended'){
    aCtx.resume().catch(()=>{});
  }
}

// ════════════════════════════════════════════════════
//  TTS — NO BEEP. Silent fail if no voice available.
//  4 tiers: Android → SpeechSynthesis → GoogleAudio → silent
// ════════════════════════════════════════════════════
function speakZH(text){
  // T1: Android APK bridge
  if(And&&And.speak){try{And.speak(text,'zh-CN',1.0,0.88);setTTSpill('APK');return;}catch(e){}}
  function speakZH(text){
  if(And&&And.speak){try{And.speak(text,'zh-CN',1.0,0.88);setTTSpill('APK');return;}catch(e){}}
  if(window.speechSynthesis){
    const go=()=>{
      const voices=window.speechSynthesis.getVoices();
      const zh=voices.find(v=>v.lang&&v.lang.startsWith('zh'));
      const u=new SpeechSynthesisUtterance(text);
      u.lang='zh-CN';u.rate=0.88;u.pitch=1.0;u.volume=1.0;
      if(zh)u.voice=zh;
      let started=false;
      u.onstart=()=>{started=true;setTTSpill('SYN');};
      u.onerror=()=>{if(!started)speakGoogleAudio(text);};
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
      setTimeout(()=>{if(!started&&!window.speechSynthesis.speaking)speakGoogleAudio(text);},1000);
    };
    if(window.speechSynthesis.getVoices().length>0)go();
    else{window.speechSynthesis.onvoiceschanged=go;setTimeout(go,300);}
    return;
  }
  speakGoogleAudio(text);
}

function speakAR(text){
  if(And&&And.speak){try{And.speak(text,'ar-EG',1.0,0.92);return;}catch(e){}}
  if(window.speechSynthesis){
    const u=new SpeechSynthesisUtterance(text);
    u.lang='ar-EG';u.rate=0.92;u.volume=1.0;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  }
}

function setTTSpill(m){
  const p=document.getElementById('ttsPill');
  p.textContent='TTS:'+m;
  p.className=(!m||m==='—')?'pi mu':(m==='APK'||m==='SYN'||m==='GTT')?'pi ok':'pi warn';
}

// ════════════════════════════════════════════════════

// ════════════════════════════════════════════════════
async function autoMic(){
  const was=localStorage.getItem(MIC_KEY)==='1';
  if(was||And){await grantMic();return;}
  if(navigator.permissions){
    try{
      const s=await navigator.permissions.query({name:'microphone'});
      if(s.state==='granted'){await grantMic();return;}
      s.onchange=()=>{if(s.state==='granted')grantMic();};
    }catch(e){}
  }
  document.getElementById('micPill').textContent='TAP';
  document.getElementById('micPill').className='pi warn';
}
async function grantMic(){
  try{
    mStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}});
    micOk=true;
    localStorage.setItem(MIC_KEY,'1');
    document.getElementById('micPill').textContent='MIC✓';
    document.getElementById('micPill').className='pi ok';
    try{
      aCtx=new(window.AudioContext||window.webkitAudioContext)();
      analyser=aCtx.createAnalyser();analyser.fftSize=256;
      aCtx.createMediaStreamSource(mStream).connect(analyser);
      liveNoise();
    }catch(e){}
    startWake();
  }catch(e){
    localStorage.removeItem(MIC_KEY);
    document.getElementById('micPill').textContent='MIC✗';
    document.getElementById('micPill').className='pi no';
  }
}
function tapMic(){
  if(!micOk){grantMic();return;}
  if(listening){stopListen();return;}
  startListen();
}

function idleNoise(){
  clearInterval(noiseT);
  noiseT=setInterval(()=>{
    document.getElementById('ndb').textContent=Math.floor(Math.random()*5+2)+'dB';
    for(let i=0;i<16;i++){const h=Math.random()*2+1;const b=document.getElementById('B'+i);b.style.height=Math.round(h)+'px';b.className='nb';}
  },900);
}
function liveNoise(){
  if(!analyser)return;
  clearInterval(noiseT);
  const d=new Uint8Array(analyser.frequencyBinCount);
  noiseT=setInterval(()=>{
    analyser.getByteFrequencyData(d);
    const avg=d.slice(0,50).reduce((a,b)=>a+b,0)/50;
    const db=Math.max(0,Math.round(20*Math.log10((avg||1)/255)+90));
    document.getElementById('ndb').textContent=db+'dB';
    for(let i=0;i<16;i++){const h=Math.min(10,(d[i*2]||0)/22+1);const b=document.getElementById('B'+i);b.style.height=Math.round(h)+'px';b.className='nb'+(h>5?' lit':'');}
  },120);
}

// ════════════════════════════════════════════════════
function isWakeWord(t){
  const s=t.toLowerCase();
  return s.includes('xiao')||s.includes('小迪')||s.includes('شياودي')||
         s.includes('byd')||s.includes('بيد')||s.includes('مرحبا')||
         s.includes('b y d')||s.includes('شياو');
}
function setWK(state){
  const ws=document.getElementById('wks');
  const wt=document.getElementById('wkt');
  const wd=document.getElementById('wkd');
  const bs=document.getElementById('bst');
  ws.className='wkstrip'+(state==='go'?' go':'');
  if(state==='armed'){wt.textContent='مرحباً 小迪 · ARMED';wd.style.background='var(--ok)';bs.textContent='ARMED';}
  if(state==='go'){wt.textContent='تفضل · 请说话';wd.style.background='var(--c)';bs.textContent='GO';}
  if(state==='done'){wt.textContent='DONE ✓ · تم';wd.style.background='var(--ok)';bs.textContent='DONE';}
}
function startWake(){
  if(!micOk||wakeRunning)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;
  wakeRunning=true;
  const langMap={ar:'ar-EG',en:'en-US',both:'ar-EG'};
  function loop(){
    if(listening){wakeRunning=false;return;}
    const r=new SR();
    r.lang=langMap[lang]||'ar-EG';
    r.interimResults=false;r.continuous=false;r.maxAlternatives=4;
    r.onresult=(e)=>{
      let done=false;
      for(let i=0;i<e.results.length&&!done;i++){
        for(let j=0;j<e.results[i].length&&!done;j++){
          const tr=e.results[i][j].transcript;
          if(isWakeWord(tr)){
            setWK('go');
            speakAR('تفضل');
            wakeRunning=false;
            setTimeout(()=>startListen(),750);
            done=true;
          } else if(!done&&checkCasual(tr.toLowerCase())){done=true;}
          else if(!done){
            const m=matchCmd(tr);
            if(m){execCmd(m);done=true;}
          }
        }
      }
    };
    r.onend=()=>{
      if(!listening){setWK('armed');setTimeout(loop,280);}
    };
    r.onerror=(ev)=>{
      const ok=['no-speech','aborted','network'];
      if(!ok.includes(ev.error))console.warn('WK:',ev.error);
      setTimeout(loop,400);
    };
    try{setWK('armed');r.start();}catch(e){setTimeout(loop,900);}
  }
  loop();
}

// ════════════════════════════════════════════════════
//  LISTEN
// ════════════════════════════════════════════════════
function startListen(){
  if(listening)return;
  wakeRunning=false;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){setDisp('غير مدعوم','اضغط الأوامر يدوياً','—','',0);return;}
  const langMap={ar:'ar-EG',en:'en-US',both:'ar-EG'};
  const r=new SR();
  r.lang=langMap[lang]||'ar-EG';
  r.interimResults=true;r.continuous=false;r.maxAlternatives=5;
  r.onstart=()=>{
    listening=true;
    document.getElementById('mo').classList.add('act');
    document.getElementById('hb').classList.add('lst');
    document.getElementById('rb').classList.add('show');
    setMC('#00e5ff');setFq(true);
    setDisp('LISTENING · بسمعك','...','','',0);
    setWK('go');
    let s=0;clearInterval(recT);
    recT=setInterval(()=>{s++;const m=Math.floor(s/60),sec=s%60;document.getElementById('rt').textContent=m+':'+(sec<10?'0':'')+sec;},1000);
  };
  r.onresult=(e)=>{
    const tr=Array.from(e.results).map(x=>x[0].transcript).join(' ');
    const cf=e.results[e.results.length-1][0].confidence||0.55;
    const pct=Math.round(cf*100);
    document.getElementById('srout').textContent=tr;
    document.getElementById('cf').style.width=pct+'%';
    document.getElementById('cp').textContent=pct+'%';
    if(checkCasual(tr.toLowerCase())){stopListen();return;}
    if(pct>=40){const m=matchCmd(tr);if(m){stopListen();execCmd(m);}}
  };
  r.onerror=()=>stopListen();
  r.onend=()=>stopListen();
  window._rec=r;
  try{r.start();}catch(e){stopListen();}
}
function stopListen(){
  listening=false;wakeRunning=false;
  if(window._rec){try{window._rec.stop();}catch(e){}window._rec=null;}
  clearInterval(recT);
  document.getElementById('rb').classList.remove('show');
  document.getElementById('mo').classList.remove('act');
  document.getElementById('hb').classList.remove('lst');
  setMC('#3d6070');setFq(false);
  if(document.getElementById('stag').textContent.includes('LISTEN'))
    setDisp('READY · جاهز','مرحباً 小迪','qool xiǎo dí','قول مرحبا شياودي أو اضغط المايك',0);
  if(micOk)setTimeout(startWake,350);
}

// ════════════════════════════════════════════════════
//  MATCH — EXACT first, then fuzzy
//  Prevents open/close confusion
// ════════════════════════════════════════════════════
function matchCmd(text){
  const t=text.trim();
  const tl=t.toLowerCase();

  // 1. Check EXACT lookup table (highest priority)
  for(const [phrase,id] of Object.entries(EXACT)){
    if(tl.includes(phrase)){
      return DB.find(c=>c.id===id)||null;
    }
  }

  // 2. Full phrase match
  let best=null,bs=0;
  DB.forEach(cmd=>{
    const phrases=[cmd.en.toLowerCase(),...(cmd.ar||[])];
    phrases.forEach(ph=>{
      const pl=ph.toLowerCase();
      if(tl===pl){if(1>bs){bs=1;best=cmd;}return;}
      if(tl.includes(pl)||pl.includes(tl)){if(0.93>bs){bs=0.93;best=cmd;}return;}
      // word overlap — weighted by phrase length (longer = more specific)
      const pw=pl.split(/\s+/),tw=tl.split(/\s+/);
      let hits=0;
      pw.forEach(p=>tw.forEach(w=>{if(p.length>1&&w.length>1&&(p===w||p.includes(w)||w.includes(p)))hits++;}));
      const sc=(hits/Math.max(pw.length,1))*(pl.length/(pl.length+5));
      if(sc>bs){bs=sc;best=cmd;}
    });
  });
  return bs>0.25?best:null;
}

// ════════════════════════════════════════════════════
//  EXECUTE
// ════════════════════════════════════════════════════
function execCmd(cmd){
  lastId=cmd.id;
  const label=(lang!=='en'&&cmd.ar&&cmd.ar.length)?cmd.ar[0]:cmd.en;
  setDisp('EXECUTING · تنفيذ',label,cmd.zh,cmd.py,98);
  document.getElementById('hb').classList.add('ok2');
  document.getElementById('cmtitle').textContent='EXECUTING · تنفيذ';
  render();
  speakZH(cmd.zh);
  showToast(cmd.zh+'  ·  '+label);
  setTimeout(()=>{
    document.getElementById('hb').classList.remove('ok2');
    setWK('done');
    document.getElementById('cmtitle').textContent='DONE ✓ · تم';
    setTimeout(()=>document.getElementById('cmtitle').textContent='WAITING · في انتظار الأمر',2500);
  },1600);
}

// ════════════════════════════════════════════════════
//  CASUAL
// ════════════════════════════════════════════════════
function checkCasual(t){
  for(const g of CASUAL){if(g.t.some(x=>t.includes(x))){setDisp('CHAT · دردشة',g.r,'😊','',0);showToast(g.r);return true;}}
  return false;
}

function setMC(c){['mb','ma','ml','mb2','f1','f2','f3'].forEach(id=>{const e=document.getElementById(id);if(e)e.setAttribute('stroke',c);});}
function setFq(on){['f1','f2','f3'].forEach((id,i)=>{const e=document.getElementById(id);if(!e)return;e.setAttribute('y2',on?['7','4','8'][i]:'10');e.setAttribute('opacity',on?'1':'0.4');});}
function showToast(msg){
  clearTimeout(toastT);
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  toastT=setTimeout(()=>t.classList.remove('show'),3200);
}
function setLang(l){
  lang=l;
  ['lbAr','lbEn','lbBo'].forEach((id,i)=>document.getElementById(id).className='lbtn'+(l===['ar','en','both'][i]?' on':''));
  render();
}
function buildCats(){
  const el=document.getElementById('cats');el.innerHTML='';
  CATS.forEach(c=>{
    const b=document.createElement('button');
    b.className='catbtn'+(c===activeCat?' on':'');
    b.textContent=c;
    b.onclick=()=>{activeCat=c;buildCats();render();};
    el.appendChild(b);
  });
}
function render(){
  const q=(document.getElementById('srch').value||'').toLowerCase();
  const list=DB.filter(c=>{
    const mc=activeCat==='ALL'||c.cat===activeCat;
    const mq=!q||c.en.toLowerCase().includes(q)||c.zh.includes(q)||(c.ar||[]).join(' ').includes(q);
    return mc&&mq;
  });
  document.getElementById('cnt').textContent=list.length;
  const el=document.getElementById('cmdlist');el.innerHTML='';
  list.forEach(c=>{
    const d=document.createElement('div');
    d.className='cmd'+(c.wk?' wk':c.sp?' sp':'')+(lastId===c.id?' done':'');
    const ar=(lang!=='en'&&c.ar&&c.ar.length)?`<div class="car">${c.ar[0]}</div>`:'';
    const en=(lang!=='ar')?`<div class="cen">${c.en}</div>`:'';
    d.innerHTML=`<div class="cmdl">${ar}${en}<div class="ccat">${c.cat}</div></div><div class="czh">${c.zh}</div>`;
    d.onclick=()=>execCmd(c);
    el.appendChild(d);
  });
}
</script>
</body>
</html>
