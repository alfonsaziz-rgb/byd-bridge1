<title>BYD Voice Bridge v8</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+SC:wght@700&family=Noto+Sans+Arabic:wght@500;700&family=Exo+2:wght@500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --c:#00e5ff;--c2:#007a99;--cg:rgba(0,229,255,.10);
  --bg:#06090f;--bg2:#0a1520;--bg3:#0d1c2b;
  --t:#cce6ff;--m:#4a7090;--b:rgba(0,229,255,.14);
  --ok:#00e07a;--err:#ff3355;--warn:#ffaa00;
  --ar:#7dd8ff;--en:#b8dff0;
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Exo 2',sans-serif;color:var(--t);display:flex;flex-direction:column;}
/* TOP */
.top{background:var(--bg2);border-bottom:1px solid var(--b);padding:7px 13px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.brand{display:flex;align-items:center;gap:8px;}
.bico{width:26px;height:26px;border:1.5px solid var(--c);border-radius:6px;display:flex;align-items:center;justify-content:center;background:var(--cg);}
.btitle{color:var(--c);font-size:11px;letter-spacing:2px;font-family:'Share Tech Mono',monospace;}
.bsub{color:var(--m);font-size:7px;letter-spacing:1px;font-family:'Share Tech Mono',monospace;}
.pills{display:flex;gap:4px;align-items:center;}
.pi{font-size:7px;padding:2px 6px;border-radius:3px;border:1px solid;letter-spacing:.5px;font-family:'Share Tech Mono',monospace;}
.pi.ok{border-color:var(--ok);color:var(--ok);}
.pi.cy{border-color:var(--c);color:var(--c);}
.pi.mu{border-color:var(--m);color:var(--m);}
.pi.no{border-color:var(--err);color:var(--err);}
.pi.wa{border-color:var(--warn);color:var(--warn);}
/* LANG */
.langbar{display:flex;border-bottom:1px solid var(--b);flex-shrink:0;background:var(--bg2);}
.lb{flex:1;padding:5px 0;border:none;background:transparent;color:var(--m);font-size:10px;font-family:'Share Tech Mono',monospace;cursor:pointer;letter-spacing:1px;border-bottom:2px solid transparent;transition:all .2s;touch-action:manipulation;}
.lb.on{color:var(--c);border-bottom-color:var(--c);background:var(--cg);}
/* MIC ZONE */
.mzone{background:var(--bg2);border-bottom:1px solid var(--b);padding:9px 13px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.mouter{position:relative;width:66px;height:66px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.ring{position:absolute;border-radius:50%;border:1.5px solid transparent;opacity:0;transition:opacity .35s;}
.ring.r1{inset:0;border-top-color:var(--c);border-right-color:var(--c);animation:s1 2s linear infinite;}
.ring.r2{inset:10%;border-left-color:var(--c2);border-bottom-color:var(--c2);animation:s2 1.5s linear infinite reverse;}
.mouter.act .ring{opacity:1;}
@keyframes s1{to{transform:rotate(360deg);}}
@keyframes s2{to{transform:rotate(360deg);}}
.pdot{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--c);opacity:0;}
.mouter.act .pdot{animation:pd 1.5s ease-in-out infinite;}
.pdot:nth-child(3){top:0;left:calc(50% - 2px);}
.pdot:nth-child(4){right:0;top:calc(50% - 2px);animation-delay:.37s;}
.pdot:nth-child(5){bottom:0;left:calc(50% - 2px);animation-delay:.75s;}
.pdot:nth-child(6){left:0;top:calc(50% - 2px);animation-delay:1.12s;}
@keyframes pd{0%,100%{opacity:0;transform:scale(.3);}50%{opacity:1;transform:scale(1);}}
.hex{width:50px;height:50px;clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;z-index:2;transition:transform .12s;touch-action:manipulation;}
.hexi{width:40px;height:40px;clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);background:var(--bg3);display:flex;align-items:center;justify-content:center;border:1.5px solid var(--c2);transition:all .2s;}
.hex.lst .hexi{border-color:var(--c);}
.hex.ok2 .hexi{border-color:var(--ok);}
.hex:active{transform:scale(.9);}
.mi{flex:1;min-width:0;}
.stag{font-size:7px;letter-spacing:1.5px;color:var(--m);margin-bottom:2px;font-family:'Share Tech Mono',monospace;}
.zh{font-family:'Noto Sans SC',sans-serif;font-size:19px;font-weight:700;color:var(--c);line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.py{font-size:7px;color:var(--m);margin:2px 0;font-family:'Share Tech Mono',monospace;}
.sr{font-family:'Noto Sans Arabic',sans-serif;font-size:12px;font-weight:500;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* WAKE */
.wk{display:flex;align-items:center;gap:6px;padding:4px 13px;background:rgba(0,224,122,.05);border-bottom:1px solid rgba(0,224,122,.10);flex-shrink:0;transition:all .3s;}
.wk.go{background:var(--cg);border-bottom-color:var(--b);}
.wd{width:5px;height:5px;border-radius:50%;background:var(--ok);animation:wkp 2s ease-in-out infinite;flex-shrink:0;}
.wk.go .wd{background:var(--c);animation:none;}
@keyframes wkp{0%,100%{opacity:1;}50%{opacity:.2;}}
.wt{font-size:8px;color:var(--ok);letter-spacing:.5px;font-family:'Share Tech Mono',monospace;}
.wk.go .wt{color:var(--c);}
.bgb{display:none;font-size:7px;padding:1px 5px;border-radius:3px;border:1px solid var(--warn);color:var(--warn);font-family:'Share Tech Mono',monospace;margin-left:auto;}
.bgb.on{display:block;}
/* REC */
.rec{display:none;align-items:center;gap:5px;padding:3px 13px;background:rgba(255,51,85,.05);border-bottom:1px solid rgba(255,51,85,.10);flex-shrink:0;}
.rec.on{display:flex;}
.rd{width:5px;height:5px;border-radius:50%;background:var(--err);animation:bk 1s infinite;}
@keyframes bk{0%,100%{opacity:1;}50%{opacity:.1;}}
.rt{font-size:8px;color:var(--err);letter-spacing:2px;font-family:'Share Tech Mono',monospace;}
/* NOISE */
.ns{display:flex;align-items:center;gap:7px;padding:3px 13px;background:var(--bg3);flex-shrink:0;}
.nl{font-size:7px;color:var(--m);width:30px;font-family:'Share Tech Mono',monospace;}
.nb{display:flex;gap:2px;align-items:flex-end;height:10px;flex:1;}
.nbb{width:3px;border-radius:1px;background:var(--bg2);transition:height .08s;}
.nbb.lit{background:var(--c);}
.nv{font-size:7px;color:var(--c);width:28px;text-align:right;font-family:'Share Tech Mono',monospace;}
.cs{display:flex;align-items:center;gap:7px;padding:2px 13px;flex-shrink:0;}
.cl{font-size:7px;color:var(--m);width:28px;font-family:'Share Tech Mono',monospace;}
.ct{flex:1;height:2px;background:var(--bg3);border-radius:1px;overflow:hidden;}
.cf{height:100%;background:var(--c);border-radius:1px;width:0%;transition:width .25s;}
.cp{font-size:7px;color:var(--c);width:24px;text-align:right;font-family:'Share Tech Mono',monospace;}
/* PANEL */
.pan{flex:1;display:flex;flex-direction:column;overflow:hidden;border-top:1px solid var(--b);min-height:0;}
.ph{display:flex;align-items:center;justify-content:space-between;padding:5px 13px 2px;flex-shrink:0;}
.ptitle{font-size:7px;letter-spacing:2px;color:var(--m);font-family:'Share Tech Mono',monospace;}
.pcnt{font-size:7px;color:var(--c);font-family:'Share Tech Mono',monospace;}
.cats{display:flex;gap:4px;padding:3px 13px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;}
.cats::-webkit-scrollbar{display:none;}
.cb{font-size:9px;padding:3px 9px;border-radius:3px;border:1px solid var(--b);background:transparent;color:var(--m);cursor:pointer;white-space:nowrap;font-family:'Share Tech Mono',monospace;touch-action:manipulation;}
.cb.on{border-color:var(--c);color:var(--c);background:var(--cg);}
.srch{margin:3px 13px;background:var(--bg3);border:1px solid var(--b);border-radius:5px;padding:5px 10px;color:var(--t);font-size:13px;font-family:'Exo 2',sans-serif;outline:none;display:block;width:calc(100% - 26px);}
.srch::placeholder{color:var(--m);}
.srch:focus{border-color:var(--c);}
/* LIST */
.list{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:4px 13px 16px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.list::-webkit-scrollbar{width:2px;}
.list::-webkit-scrollbar-thumb{background:var(--b);border-radius:1px;}
/* CARD */
.cmd{display:flex;align-items:center;gap:10px;padding:10px 11px;margin-bottom:5px;background:var(--bg2);border:1px solid var(--b);border-radius:9px;cursor:pointer;touch-action:manipulation;user-select:none;-webkit-user-select:none;transition:border-color .1s,background .1s;}
.cmd:active{border-color:var(--c);background:var(--cg);}
.cmd.done{border-color:var(--ok);}
.cmd.wkc{border-color:rgba(0,229,255,.32);background:var(--cg);}
.cmd.spc{border-color:rgba(255,170,0,.2);}
.cl2{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;}
/* Arabic — primary BIG */
.ar{font-family:'Noto Sans Arabic',sans-serif;font-size:15px;font-weight:700;color:var(--ar);direction:rtl;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
/* English — clearly visible, good size */
.en{font-family:'Exo 2',sans-serif;font-size:13px;font-weight:600;color:var(--en);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.2px;}
.cat{font-size:6px;color:var(--m);letter-spacing:1px;opacity:.55;font-family:'Share Tech Mono',monospace;}
/* Chinese */
.czh{font-family:'Noto Sans SC',sans-serif;font-size:22px;color:var(--c);flex-shrink:0;min-width:54px;text-align:right;line-height:1;}
/* TOAST */
#tst{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--bg2);border:1px solid var(--c);border-radius:10px;padding:6px 16px;font-size:13px;color:var(--c);font-family:'Noto Sans Arabic',sans-serif;opacity:0;transition:all .22s;pointer-events:none;z-index:999;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;}
#tst.on{opacity:1;transform:translateX(-50%) translateY(0);}
.bot{display:flex;align-items:center;justify-content:space-between;padding:3px 13px;border-top:1px solid var(--b);background:var(--bg2);font-size:7px;color:var(--m);letter-spacing:1px;flex-shrink:0;font-family:'Share Tech Mono',monospace;}
</style>
</head>

function init(){

  document.addEventListener('touchstart',function iosUnlock(){
    if(ac&&ac.state==='suspended')ac.resume().catch(function(){});
    document.removeEventListener('touchstart',iosUnlock);
  },{once:true,passive:true});

  if(!busy&&micOn&&!wkRun){
    if(window._r){try{window._r.stop();}catch(e){}window._r=null;}
    wkRun=false;setTimeout(wake,300);
  }

}

/* ══ TTS ══ */
function speakZH(txt){
  if(And&&And.speak){try{And.speak(txt,'zh-CN',1.0,0.88);setT('APK');return;}catch(e){}}
  if(window.speechSynthesis){
    var go=function(){
      var vs=window.speechSynthesis.getVoices(),zh=null;
      for(var i=0;i<vs.length;i++){if(vs[i].lang&&vs[i].lang.indexOf('zh')===0){zh=vs[i];break;}}
      var u=new SpeechSynthesisUtterance(txt);
      u.lang='zh-CN';u.rate=0.85;u.pitch=1.0;u.volume=1.0;
      if(zh)u.voice=zh;
      var ok=false;
      u.onstart=function(){ok=true;setT('SYN');};
      u.onerror=function(){if(!ok)gTTS(txt);};
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
      setTimeout(function(){if(!ok&&!window.speechSynthesis.speaking)gTTS(txt);},1000);
    };
    if(window.speechSynthesis.getVoices().length>0)go();
    else{window.speechSynthesis.onvoiceschanged=go;setTimeout(go,300);}
    return;
  }
  gTTS(txt);
}
function gTTS(txt){
  if(!navigator.onLine){setT('—');return;}
  try{
    var a=new Audio('https://translate.google.com/translate_tts?ie=UTF-8&q='+encodeURIComponent(txt)+'&tl=zh-CN&client=tw-ob');
    a.volume=1;
    a.oncanplay=function(){a.play();setT('GTT');};
    a.onerror=function(){setT('—');};
    a.load();setTimeout(function(){if(a.paused)setT('—');},2000);
  }catch(e){setT('—');}
}
function speakAR(txt){
  if(And&&And.speak){try{And.speak(txt,'ar-EG',1.0,0.92);return;}catch(e){}}
  if(window.speechSynthesis){var u=new SpeechSynthesisUtterance(txt);u.lang='ar-EG';u.rate=0.92;u.volume=1.0;window.speechSynthesis.cancel();window.speechSynthesis.speak(u);}
}
function setT(m){var p=document.getElementById('tPill');p.textContent='TTS:'+m;p.className=(m==='APK'||m==='SYN'||m==='GTT')?'pi ok':'pi mu';}

/* ══ MIC ══ */
function autoMic(){
  if(localStorage.getItem(MK)==='1'||And){gMic();return;}
  if(navigator.permissions){navigator.permissions.query({name:'microphone'}).then(function(s){if(s.state==='granted'){gMic();return;}s.onchange=function(){if(s.state==='granted')gMic();};}).catch(function(){});}
  document.getElementById('mPill').textContent='TAP';document.getElementById('mPill').className='pi wa';
}
function gMic(){
  navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}})
  .then(function(s){
    ms=s;micOn=true;localStorage.setItem(MK,'1');
    document.getElementById('mPill').textContent='MIC✓';document.getElementById('mPill').className='pi ok';
    try{ac=new(window.AudioContext||window.webkitAudioContext)();an=ac.createAnalyser();an.fftSize=256;ac.createMediaStreamSource(s).connect(an);liveN();}catch(e){}
    wake();
  }).catch(function(){
    localStorage.removeItem(MK);
    document.getElementById('mPill').textContent='MIC✗';document.getElementById('mPill').className='pi no';
  });
}
function mic(){if(!micOn){gMic();return;}if(busy){sLis();return;}startLis();}

/* ══ NOISE ══ */
function idleN(){
  clearInterval(noiseT);
  noiseT=setInterval(function(){
    document.getElementById('ndb').textContent=Math.floor(Math.random()*5+2)+'dB';
    for(var i=0;i<16;i++){var h=Math.random()*2+1;var b=document.getElementById('N'+i);b.style.height=Math.round(h)+'px';b.className='nbb';}
  },900);
}
function liveN(){
  if(!an)return;clearInterval(noiseT);
  var d=new Uint8Array(an.frequencyBinCount);
  noiseT=setInterval(function(){
    an.getByteFrequencyData(d);
    var avg=0;for(var i=0;i<50;i++)avg+=d[i];avg/=50;
    var db=Math.max(0,Math.round(20*Math.log(Math.max(avg,1)/255)/Math.LN10+90));
    document.getElementById('ndb').textContent=db+'dB';
    for(var j=0;j<16;j++){var h=Math.min(10,(d[j*2]||0)/22+1);var b=document.getElementById('N'+j);b.style.height=Math.round(h)+'px';b.className='nbb'+(h>5?' lit':'');}
  },120);
}

/* ══ WAKE WORD ══ */
function isWake(t){
  var s=t.toLowerCase();
  var sn=s.replace(/\s+/g,'');
  // English — with and without spaces
  if(sn.indexOf('hibyd')>=0||sn.indexOf('heybyd')>=0||sn.indexOf('hibd')>=0)return true;
  if(s.indexOf('hi byd')>=0||s.indexOf('hey byd')>=0||s.indexOf('hi b y d')>=0)return true;
  // Arabic
  if(s.indexOf('هاي')>=0)return true;
  if(s.indexOf('بيد')>=0||s.indexOf('باي دي')>=0)return true;
  // iOS Safari often transcribes "hi byd" as separate words
  var words=s.split(/\s+/);
  for(var i=0;i<words.length;i++){
    if(words[i]==='byd'||words[i]==='byad'||words[i]==='bid')return true;
    if(words[i]==='هاي'||words[i]==='هاى')return true;
  }
  if(s.indexOf('小迪')>=0||s.indexOf('xiao di')>=0)return true;
  return false;
}

function setWK(st){
  var ws=document.getElementById('wks'),wt=document.getElementById('wkt'),wd=document.getElementById('wkd'),bs=document.getElementById('bst');
  ws.className='wk'+(st==='go'?' go':'');
  if(st==='armed'){wt.textContent='هاي BYD · ARMED';wd.style.background='var(--ok)';bs.textContent='ARMED';}
  if(st==='go'){wt.textContent='تفضل · 请说话';wd.style.background='var(--c)';bs.textContent='GO';}
  if(st==='done'){wt.textContent='DONE ✓ · تم';wd.style.background='var(--ok)';bs.textContent='DONE';}
}
function wake(){
  if(!micOn||wkRun)return;
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){setWK('armed');return;}
  wkRun=true;
  var cycle=0; // alternate ar-EG / en-US each round

  function loop(){
    if(busy){wkRun=false;return;}
    var langs=['ar-EG','en-US'];
    var r=new SR();
    r.lang=langs[cycle%2];
    cycle++;
    r.interimResults=true;
    r.continuous=false;
    r.maxAlternatives=5;
    var triggered=false;

    r.onresult=function(e){
      if(triggered)return;
      for(var i=0;i<e.results.length;i++){
        for(var j=0;j<e.results[i].length;j++){
          var tr=e.results[i][j].transcript||'';
          if(isWake(tr)){
            triggered=true;
            try{r.abort();}catch(x){}
            setWK('go');
            speakAR('تفضل');
            wkRun=false;
            setTimeout(startLis,700);
            return;
          }
        }
      }
      // Check final results for direct commands
      for(var fi=0;fi<e.results.length;fi++){
        if(e.results[fi].isFinal&&!triggered){
          var ft=e.results[fi][0].transcript||'';
          var cf=e.results[fi][0].confidence||0;
          if(casual(ft.toLowerCase()))return;
          var m=match(ft);
          if(m&&cf>0.60){triggered=true;try{r.abort();}catch(x){}exec(m);return;}
        }
      }
    };

    r.onend=function(){
      if(!busy&&wkRun&&!triggered){
        setWK('armed');
        setTimeout(loop,80);
      }
    };

    r.onerror=function(ev){
      var soft=['no-speech','aborted'];
      var isSoft=false;
      for(var i=0;i<soft.length;i++)if(soft[i]===ev.error){isSoft=true;break;}
      if(!isSoft)console.warn('WK:',ev.error);
      if(!busy&&wkRun&&!triggered)setTimeout(loop,isSoft?80:300);
    };

    try{setWK('armed');r.start();}
    catch(e){setTimeout(loop,400);}
  }

  loop();
}

function startLis(){
  if(busy)return;
  wkRun=false;
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){disp('غير مدعوم','اضغط يدوياً','—','',0);return;}
  var lm={ar:'ar-EG',en:'en-US',both:'ar-EG'};
  var r=new SR();r.lang=lm[ln]||'ar-EG';r.interimResults=true;r.continuous=false;r.maxAlternatives=5;
  r.onstart=function(){
    busy=true;
    document.getElementById('mo').classList.add('act');document.getElementById('hb').classList.add('lst');document.getElementById('rb').classList.add('on');
    smc('#00e5ff');sfq(true);disp('LISTENING · بسمعك','...','','',0);setWK('go');
    var s=0;clearInterval(recT);
    recT=setInterval(function(){s++;var m=Math.floor(s/60),sc=s%60;document.getElementById('rtm').textContent=m+':'+(sc<10?'0':'')+sc;},1000);
  };
  r.onresult=function(e){
    var tr='';for(var i=0;i<e.results.length;i++)tr+=e.results[i][0].transcript;
    var cf=e.results[e.results.length-1][0].confidence||0.55;
    var pct=Math.round(cf*100);
    document.getElementById('srout').textContent=tr;
    document.getElementById('cf').style.width=pct+'%';document.getElementById('cp').textContent=pct+'%';
    if(casual(tr.toLowerCase())){sLis();return;}
    if(pct>=40){var m=match(tr);if(m){sLis();exec(m);}}
  };
  r.onerror=function(){sLis();};r.onend=function(){sLis();};
  window._r=r;try{r.start();}catch(e){sLis();}
}
function sLis(){
  busy=false;wkRun=false;
  if(window._r){try{window._r.abort();}catch(e){}try{window._r.stop();}catch(e){}window._r=null;}
  clearInterval(recT);
  document.getElementById('rb').classList.remove('on');
  document.getElementById('mo').classList.remove('act');
  document.getElementById('hb').classList.remove('lst');
  smc('#3d6070');sfq(false);
  if(document.getElementById('stag').textContent.indexOf('LISTEN')>=0)
    disp('READY · جاهز','你好，小迪我在','nǐ hǎo xiǎo dí','قول هاي BYD أو اضغط المايك',0);
  if(micOn)setTimeout(wake,400);
}

/* ══ MATCH ══ */
/* CLOSE MARKERS — if any present, command is definitely a CLOSE action */
var CLOSE_WORDS=['اقفل','سكر','غلق','اوقف','وقف'];
var OPEN_WORDS=['افتح','شغل','اشغل','فتح','ارفع','زود','ابدا'];

function isCloseIntent(tl){
  for(var i=0;i<CLOSE_WORDS.length;i++)
    if(tl.indexOf(CLOSE_WORDS[i])>=0)return true;
  return false;
}
function isOpenIntent(tl){
  for(var i=0;i<OPEN_WORDS.length;i++)
    if(tl.indexOf(OPEN_WORDS[i])>=0)return true;
  return false;
}

function match(txt){
  var t=txt.trim(),tl=t.toLowerCase();
  var closeIntent=isCloseIntent(tl);
  var openIntent=isOpenIntent(tl);

  /* STEP 1 — Intent-aware EXACT lookup
     Sort keys longest-first so most specific wins.
     If closeIntent, skip any key that belongs to an open command.
     If openIntent, skip any key that belongs to a close command. */
  var CLOSE_IDS={13:1,17:1,33:1,37:1,41:1,52:1,53:1,54:1,2:1,61:1,63:1,65:1,67:1,81:1,101:1};
  var OPEN_IDS ={12:1,16:1,14:1,15:1,34:1,36:1,42:1,32:1,1:1,60:1,62:1,64:1,66:1,80:1,100:1};

  var ks=Object.keys(EX).sort(function(a,b){return b.length-a.length;});
  for(var k=0;k<ks.length;k++){
    if(tl.indexOf(ks[k])>=0){
      var targetId=EX[ks[k]];
      /* Skip open command if user said close word */
      if(closeIntent && OPEN_IDS[targetId])continue;
      /* Skip close command if user said open word (and no close word) */
      if(openIntent && !closeIntent && CLOSE_IDS[targetId])continue;
      for(var x=0;x<DB.length;x++)if(DB[x].id===targetId)return DB[x];
    }
  }

  /* STEP 2 — Fuzzy match, also intent-filtered */
  var best=null,bs=0;
  for(var ci=0;ci<DB.length;ci++){
    var cmd=DB[ci];
    var cmdIsClose=CLOSE_IDS[cmd.id]?true:false;
    var cmdIsOpen=OPEN_IDS[cmd.id]?true:false;
    /* Skip wrong-direction commands */
    if(closeIntent && cmdIsOpen)continue;
    if(openIntent && !closeIntent && cmdIsClose)continue;

    var phs=[cmd.en.toLowerCase()];
    if(cmd.ar)for(var ai=0;ai<cmd.ar.length;ai++)phs.push(cmd.ar[ai]);
    for(var pi=0;pi<phs.length;pi++){
      var ph=phs[pi].toLowerCase();
      if(tl===ph){if(1>bs){bs=1;best=cmd;}continue;}
      if(tl.indexOf(ph)>=0||ph.indexOf(tl)>=0){if(0.93>bs){bs=0.93;best=cmd;}continue;}
      var pw=ph.split(/\s+/),tw=tl.split(/\s+/),hits=0;
      for(var wi=0;wi<pw.length;wi++)for(var ti=0;ti<tw.length;ti++)
        if(pw[wi].length>1&&tw[ti].length>1&&
           (pw[wi]===tw[ti]||pw[wi].indexOf(tw[ti])>=0||tw[ti].indexOf(pw[wi])>=0))hits++;
      var sc=(hits/Math.max(pw.length,1))*(ph.length/(ph.length+5));
      if(sc>bs){bs=sc;best=cmd;}
    }
  }
  return bs>0.25?best:null;
}

/* ══ EXECUTE ══ */
function exec(cmd){
  lid=cmd.id;
  var lb=(ln!=='en'&&cmd.ar&&cmd.ar.length)?cmd.ar[0]:cmd.en;
  disp('EXECUTING · تنفيذ',lb,cmd.zh,cmd.py,98);
  document.getElementById('hb').classList.add('ok2');
  document.getElementById('ptitle').textContent='EXECUTING · تنفيذ';
  rndr();speakZH(cmd.zh);toast(cmd.zh+'  ·  '+lb);
  setTimeout(function(){
    document.getElementById('hb').classList.remove('ok2');
    setWK('done');document.getElementById('ptitle').textContent='DONE ✓ · تم';
    setTimeout(function(){document.getElementById('ptitle').textContent='WAITING · في انتظار الأمر';},2500);
  },1600);
}

/* ══ CASUAL ══ */
function casual(t){
  for(var gi=0;gi<CASUAL.length;gi++){var g=CASUAL[gi];for(var ti=0;ti<g.t.length;ti++){if(t.indexOf(g.t[ti])>=0){disp('CHAT · دردشة',g.r,'😊','',0);toast(g.r);return true;}}}
  return false;
}

/* ══ UI HELPERS ══ */
function disp(tg,sr,zh,py,cf){
  document.getElementById('stag').textContent=tg;document.getElementById('srout').textContent=sr;
  document.getElementById('zhout').textContent=zh||'小迪';document.getElementById('pyout').textContent=py||'';
  document.getElementById('cf').style.width=cf+'%';document.getElementById('cp').textContent=cf?cf+'%':'—';
}
function smc(c){var ids=['mb','ma','ml','mb2','f1','f2','f3'];for(var i=0;i<ids.length;i++){var e=document.getElementById(ids[i]);if(e)e.setAttribute('stroke',c);}}
function sfq(on){var b=['f1','f2','f3'],y=['7','4','8'];for(var i=0;i<b.length;i++){var e=document.getElementById(b[i]);if(!e)continue;e.setAttribute('y2',on?y[i]:'10');e.setAttribute('opacity',on?'1':'0.4');}}
function toast(msg){clearTimeout(tstT);var t=document.getElementById('tst');t.textContent=msg;t.classList.add('on');tstT=setTimeout(function(){t.classList.remove('on');},3200);}
function lang(l){
  ln=l;var ids=['lAr','lEn','lBo'],vs=['ar','en','both'];
  for(var i=0;i<ids.length;i++)document.getElementById(ids[i]).className='lb'+(l===vs[i]?' on':'');
  rndr();
}
function bldCats(){
  var el=document.getElementById('cats');el.innerHTML='';
  for(var i=0;i<CATS.length;i++){
    var c=CATS[i],b=document.createElement('button');
    b.className='cb'+(c===cat?' on':'');b.textContent=c;
    (function(cc){b.onclick=function(){cat=cc;bldCats();rndr();};})(c);
    el.appendChild(b);
  }
}
function rndr(){
  var q=(document.getElementById('srch').value||'').toLowerCase();
  var ls=[];
  for(var i=0;i<DB.length;i++){
    var c=DB[i];
    var mc=cat==='ALL'||c.cat===cat;
    var mq=!q||c.en.toLowerCase().indexOf(q)>=0||c.zh.indexOf(q)>=0||(c.ar&&c.ar.join(' ').indexOf(q)>=0);
    if(mc&&mq)ls.push(c);
  }
  document.getElementById('cnt').textContent=ls.length;
  var el=document.getElementById('list');el.innerHTML='';
  for(var j=0;j<ls.length;j++){
    var cmd=ls[j],d=document.createElement('div');
    d.className='cmd'+(cmd.wk?' wkc':cmd.sp?' spc':'')+(lid===cmd.id?' done':'');
    var ar=(ln!=='en'&&cmd.ar&&cmd.ar.length)?'<div class="ar">'+cmd.ar[0]+'</div>':'';
    var en=(ln!=='ar')?'<div class="en">'+cmd.en+'</div>':'';
    d.innerHTML='<div class="cl2">'+ar+en+'<div class="cat">'+cmd.cat+'</div></div><div class="czh">'+cmd.zh+'</div>';
    (function(c){d.onclick=function(){exec(c);};})(cmd);
    el.appendChild(d);
  }
}
init();
return {lang:lang,mic:mic,render:rndr};
})();
