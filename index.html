<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#060a10">
<title>BYD Voice Bridge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+SC:wght@700&family=Noto+Sans+Arabic:wght@400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--c:#00e5ff;--c2:#0097a7;--cg:rgba(0,229,255,0.13);--bg:#060a10;--bg2:#0b1624;--bg3:#0e1d2e;--t:#d6eeff;--m:#4a7080;--b:rgba(0,229,255,0.16);--ok:#00e87a;--err:#ff3355;--warn:#ffbb00;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Share Tech Mono',monospace;color:var(--t);display:flex;flex-direction:column;}

.top{background:var(--bg2);border-bottom:1px solid var(--b);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.brand{display:flex;align-items:center;gap:8px;}
.bico{width:28px;height:28px;border:1.5px solid var(--c);border-radius:6px;display:flex;align-items:center;justify-content:center;background:var(--cg);}
.bname{color:var(--c);font-size:12px;letter-spacing:2px;}
.bsub{color:var(--m);font-size:7px;letter-spacing:1px;}
.pills{display:flex;gap:4px;align-items:center;}
.pi{font-size:7px;padding:2px 6px;border-radius:3px;border:1px solid;letter-spacing:.5px;}
.pi.ok{border-color:var(--ok);color:var(--ok);}
.pi.cy{border-color:var(--c);color:var(--c);}
.pi.mu{border-color:var(--m);color:var(--m);}
.pi.no{border-color:var(--err);color:var(--err);}
.wdot{width:6px;height:6px;border-radius:50%;background:var(--ok);animation:wp 2s ease-in-out infinite;display:inline-block;}
@keyframes wp{0%,100%{opacity:1;}50%{opacity:.2;}}
.wlbl{font-size:7px;color:var(--ok);letter-spacing:.5px;}

/* MIC ZONE */
.miczone{background:var(--bg2);border-bottom:1px solid var(--b);padding:10px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.mouter{position:relative;width:70px;height:70px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.ring{position:absolute;border-radius:50%;border:1.5px solid transparent;opacity:0;transition:opacity .4s;}
.ring.r1{inset:0;border-top-color:var(--c);border-right-color:var(--c);animation:s1 2s linear infinite;}
.ring.r2{inset:10%;border-left-color:var(--c2);border-bottom-color:var(--c2);animation:s2 1.5s linear infinite reverse;}
.mouter.act .ring{opacity:1;}
@keyframes s1{to{transform:rotate(360deg);}}
@keyframes s2{to{transform:rotate(360deg);}}
.pdot{position:absolute;width:5px;height:5px;border-radius:50%;background:var(--c);opacity:0;}
.mouter.act .pdot{animation:pd 1.6s ease-in-out infinite;}
.pdot:nth-child(3){top:0;left:calc(50% - 2.5px);}
.pdot:nth-child(4){right:0;top:calc(50% - 2.5px);animation-delay:.4s;}
.pdot:nth-child(5){bottom:0;left:calc(50% - 2.5px);animation-delay:.8s;}
.pdot:nth-child(6){left:0;top:calc(50% - 2.5px);animation-delay:1.2s;}
@keyframes pd{0%,100%{opacity:0;transform:scale(.4);}50%{opacity:1;transform:scale(1);}}
.hexbtn{width:52px;height:52px;clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;z-index:2;transition:transform .15s;}
.hexin{width:42px;height:42px;clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);background:var(--bg3);display:flex;align-items:center;justify-content:center;border:1.5px solid var(--c2);transition:all .2s;}
.hexbtn.lst .hexin{border-color:var(--c);}
.hexbtn.ok2 .hexin{border-color:var(--ok);}
.hexbtn:active{transform:scale(.92);}
.micinfo{flex:1;min-width:0;}
.stag{font-size:7px;letter-spacing:1.5px;color:var(--m);margin-bottom:2px;}
.zhbig{font-family:'Noto Sans SC',sans-serif;font-size:19px;font-weight:700;color:var(--c);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pybig{font-size:8px;letter-spacing:1px;color:var(--m);margin:1px 0;min-height:11px;}
.srbig{font-family:'Noto Sans Arabic',sans-serif;font-size:11px;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* WAKE STRIP */
.wstrip{display:flex;align-items:center;gap:6px;padding:4px 14px;background:rgba(0,232,122,.07);border-bottom:1px solid rgba(0,232,122,.15);flex-shrink:0;}
.wstrip .wdot{background:var(--ok);}
.wstrip.listening{background:rgba(255,187,0,.07);border-bottom-color:rgba(255,187,0,.2);}
.wstrip.listening .wdot{background:var(--warn);animation:none;opacity:1;}
.wstrip.active{background:var(--cg);border-bottom-color:var(--b);}
.wstrip.active .wdot{background:var(--c);}
.wtxt{font-size:8px;letter-spacing:.5px;color:var(--ok);}
.wstrip.listening .wtxt{color:var(--warn);}
.wstrip.active .wtxt{color:var(--c);}

/* REC */
.recbar{display:none;align-items:center;gap:6px;padding:3px 14px;background:rgba(255,51,85,.07);border-bottom:1px solid rgba(255,51,85,.15);flex-shrink:0;}
.recbar.show{display:flex;}
.rdot{width:6px;height:6px;border-radius:50%;background:var(--err);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.1;}}
.rtxt{font-size:8px;color:var(--err);letter-spacing:2px;}
.rtime{font-size:8px;color:var(--err);}

/* NOISE */
.nstrip{display:flex;align-items:center;gap:8px;padding:4px 14px;background:var(--bg3);flex-shrink:0;}
.nlbl{font-size:7px;color:var(--m);width:32px;}
.nbars{display:flex;gap:2px;align-items:flex-end;height:10px;flex:1;}
.nb{width:4px;border-radius:1px;background:var(--bg2);transition:height .1s;}
.nb.lit{background:var(--c);}
.nval{font-size:7px;color:var(--c);width:28px;text-align:right;}
.confstrip{display:flex;align-items:center;gap:8px;padding:3px 14px;flex-shrink:0;}
.clbl{font-size:7px;color:var(--m);width:28px;}
.ctrk{flex:1;height:2px;background:var(--bg3);border-radius:1px;overflow:hidden;}
.cfil{height:100%;background:var(--c);border-radius:1px;width:0%;transition:width .3s;}
.cpct{font-size:7px;color:var(--c);width:24px;text-align:right;}

/* COMMANDS */
.cmdsec{flex:1;display:flex;flex-direction:column;overflow:hidden;border-top:1px solid var(--b);}
.cmdhead{display:flex;align-items:center;justify-content:space-between;padding:5px 14px 2px;flex-shrink:0;}
.cmdtitle{font-size:7px;letter-spacing:2px;color:var(--m);}
.cmdcount{font-size:7px;color:var(--c);}
.cats{display:flex;gap:4px;padding:3px 14px;overflow-x:auto;flex-shrink:0;}
.cats::-webkit-scrollbar{display:none;}
.catbtn{font-size:9px;padding:3px 9px;border-radius:3px;border:1px solid var(--b);background:transparent;color:var(--m);cursor:pointer;white-space:nowrap;font-family:'Share Tech Mono',monospace;}
.catbtn.on{border-color:var(--c);color:var(--c);background:var(--cg);}
.srch{margin:3px 14px;background:var(--bg3);border:1px solid var(--b);border-radius:5px;padding:5px 10px;color:var(--t);font-size:11px;font-family:'Share Tech Mono',monospace;outline:none;display:block;width:calc(100% - 28px);}
.srch::placeholder{color:var(--m);}
.srch:focus{border-color:var(--c);}
.cmdlist{flex:1;overflow-y:auto;padding:3px 14px 8px;}
.cmdlist::-webkit-scrollbar{width:2px;}
.cmdlist::-webkit-scrollbar-thumb{background:var(--b);}
.cmd{display:flex;align-items:center;gap:10px;padding:7px 10px;margin-bottom:3px;background:var(--bg2);border:1px solid var(--b);border-radius:7px;cursor:pointer;transition:border-color .15s,background .15s;}
.cmd:active,.cmd:hover{border-color:var(--c);background:var(--cg);}
.cmd.done{border-color:var(--ok);}
.cmd.wake-c{border-color:rgba(0,229,255,.35);background:var(--cg);}
.cmd.spec{border-color:rgba(255,187,0,.18);}
.cmd-l{flex:1;min-width:0;}
.cen{font-size:11px;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.car{font-family:'Noto Sans Arabic',sans-serif;font-size:10px;color:var(--m);direction:rtl;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ccat{font-size:6px;color:var(--m);letter-spacing:1px;margin-top:1px;opacity:.6;}
.czh{font-family:'Noto Sans SC',sans-serif;font-size:20px;color:var(--c);flex-shrink:0;min-width:48px;text-align:right;}

.bot{display:flex;align-items:center;justify-content:space-between;padding:3px 14px;border-top:1px solid var(--b);background:var(--bg2);font-size:7px;color:var(--m);letter-spacing:1px;flex-shrink:0;}
</style>
</head>

<script>
// ═══════════════════════════════════════════
//  TTS ENGINE — Priority: Android > AudioCtx Synth > Beep
//  Solves DLink WebView speechSynthesis block
// ═══════════════════════════════════════════
const And = window.Android || null;

// Pre-built audio synthesis using Web Audio API oscillators
// Generates tonal confirmation when TTS unavailable
function toneConfirm(success){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const t=ac.currentTime;
    const freqs=success?[523,659,784]:[392,330];
    freqs.forEach((f,i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=f;o.type='sine';
      const start=t+i*0.12;
      g.gain.setValueAtTime(0,start);
      g.gain.linearRampToValueAtTime(0.3,start+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,start+0.18);
      o.start(start);o.stop(start+0.2);
    });
  }catch(e){}
}

// MAIN TTS — tries 4 methods in order
function speakZH(text){
  // Method 1: Android Java bridge (APK only)
  if(And&&And.speak){
    try{And.speak(text,'zh-CN',1.0,0.85);toneConfirm(true);return;}catch(e){}
  }
  // Method 2: speechSynthesis with voice pre-load trick
  if(window.speechSynthesis){
    const trySpeak=()=>{
      const voices=window.speechSynthesis.getVoices();
      const zh=voices.find(v=>v.lang&&(v.lang==='zh-CN'||v.lang==='zh-TW'||v.lang.startsWith('zh')));
      const u=new SpeechSynthesisUtterance(text);
      u.lang='zh-CN';u.rate=0.85;u.pitch=1.0;u.volume=1.0;
      if(zh)u.voice=zh;
      u.onstart=()=>toneConfirm(true);
      u.onerror=(e)=>{
        console.warn('TTS fail:',e.error);
        // Method 3: data URI audio trick for Android WebView
        speakViaAudio(text);
      };
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
      // Watchdog: if no speech after 600ms, try audio
      setTimeout(()=>{if(!window.speechSynthesis.speaking&&!window.speechSynthesis.pending)speakViaAudio(text);},800);
    };
    // Ensure voices loaded
    if(window.speechSynthesis.getVoices().length>0){trySpeak();}
    else{window.speechSynthesis.onvoiceschanged=trySpeak;setTimeout(trySpeak,300);}
    return;
  }
  // Method 4: tone only
  toneConfirm(true);
}

// Method 3: Google Translate TTS via audio element (works in some WebViews)
function speakViaAudio(text){
  try{
    const encoded=encodeURIComponent(text);
    const url=`https://translate.google.com/translate_tts?ie=UTF-8&q=${encoded}&tl=zh-CN&client=tw-ob`;
    const a=new Audio(url);
    a.volume=1;
    a.play().then(()=>toneConfirm(true)).catch(()=>toneConfirm(false));
  }catch(e){toneConfirm(false);}
}

// Speak Arabic (for "تفضل" wake response)
function speakAR(text){
  if(And&&And.speak){try{And.speak(text,'ar-EG',1.0,0.9);return;}catch(e){}}
  if(window.speechSynthesis){
    const u=new SpeechSynthesisUtterance(text);
    u.lang='ar-EG';u.rate=0.9;u.volume=1;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  }
}

const CASUAL=[
  {t:['ازيك','عامل ايه','اخبارك','عاملة ايه'],r:'أنا كويسة زي الفل!'},
  {t:['صباح الخير','صبح'],r:'صباح النور!'},
  {t:['مساء الخير','مسا'],r:'مساء الفل!'},
  {t:['شكرا','مشكور'],r:'العفو! في أمر تاني؟'},
];

const CATS=['ALL','WAKE','CLIMATE','WINDOWS','MEDIA','NAV','VEHICLE','SYSTEM'];
let activeCat='ALL', lastId=null, listening=false, micOk=false;
let recT=null, noiseT=null;
let aCtx=null, analyser=null, mStream=null;

// ═══════════════════════════════════════════
//  MICROPHONE — persistent via localStorage flag
// ═══════════════════════════════════════════
const MIC_KEY='byd_mic_granted';

// Build noise bars
(()=>{const nb=document.getElementById('nb');for(let i=0;i<16;i++){const b=document.createElement('div');b.className='nb';b.id='B'+i;b.style.height='2px';nb.appendChild(b);}})();

function checkNet(){const p=document.getElementById('netP');if(navigator.onLine){p.textContent='NET';p.className='pi ok';}else{p.textContent='OFFLINE';p.className='pi mu';}}
window.addEventListener('online',checkNet);window.addEventListener('offline',checkNet);checkNet();

function idleNoise(){
  clearInterval(noiseT);
  noiseT=setInterval(()=>{
    document.getElementById('ndb').textContent=Math.floor(Math.random()*6+2)+'dB';
    for(let i=0;i<16;i++){const h=Math.random()*2.5+1;const b=document.getElementById('B'+i);b.style.height=Math.round(h)+'px';b.className='nb';}
  },800);
}
function liveNoise(){
  if(!analyser)return;clearInterval(noiseT);
  const d=new Uint8Array(analyser.frequencyBinCount);
  noiseT=setInterval(()=>{
    analyser.getByteFrequencyData(d);
    const avg=d.slice(0,50).reduce((a,b)=>a+b,0)/50;
    const db=Math.max(0,Math.round(20*Math.log10((avg||1)/255)+90));
    document.getElementById('ndb').textContent=db+'dB';
    for(let i=0;i<16;i++){const h=Math.min(10,(d[i*2]||0)/22+1);const b=document.getElementById('B'+i);b.style.height=Math.round(h)+'px';b.className='nb'+(h>5?' lit':'');}
  },120);
}
idleNoise();

async function grantMic(){
  try{
    // Use exact same constraints that previously worked (stored)
    mStream=await navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true,sampleRate:16000}
    });
    micOk=true;
    localStorage.setItem(MIC_KEY,'1');
    document.getElementById('micP').textContent='MIC ✓';
    document.getElementById('micP').className='pi ok';
    try{
      aCtx=new(window.AudioContext||window.webkitAudioContext)();
      analyser=aCtx.createAnalyser();analyser.fftSize=256;
      aCtx.createMediaStreamSource(mStream).connect(analyser);
      liveNoise();
    }catch(e){idleNoise();}
    startWake();
  }catch(e){
    localStorage.removeItem(MIC_KEY);
    document.getElementById('micP').textContent='MIC ✗';
    document.getElementById('micP').className='pi no';
    document.getElementById('wt').textContent='MICROPHONE DENIED — tap commands manually';
  }
}

// ═══════════════════════════════════════════
//  WAKE WORD — 小迪 xiǎo dí  (as shown on car: 你好小迪，导航回家)
//  Also responds to: BYD, بيد, شاو دي
//  Lightweight loop — stops and restarts, no continuous=true
//  (continuous=true causes memory leak and crash on DLink)
// ═══════════════════════════════════════════
let wakeActive=false;
function isWake(t){
  const s=t.toLowerCase();
  return s.includes('小迪')||s.includes('xiao di')||s.includes('xiǎo')||
         s.includes('byd')||s.includes('بيد')||s.includes('شاو دي')||
         s.includes('b y d')||s.includes('هاي بيد');
}

function setWS(state){
  const ws=document.getElementById('ws');
  const wt=document.getElementById('wt');
  const wd=document.getElementById('wdot');
  const wl=document.getElementById('wlbl');
  const bs=document.getElementById('bst');
  ws.className='wstrip';
  if(state==='armed'){
    wt.textContent='小迪 ARMED · يستمع باستمرار';
    wd.style.background='var(--ok)';wl.textContent='小迪';bs.textContent='ARMED';
  }else if(state==='listening'){
    ws.className='wstrip listening';
    wt.textContent='LISTENING · بسمعك...';
    wd.style.background='var(--warn)';wl.textContent='...';bs.textContent='LISTEN';
  }else if(state==='active'){
    ws.className='wstrip active';
    wt.textContent='تفضل · 请说话';
    wd.style.background='var(--c)';wl.textContent='GO';bs.textContent='ACTIVE';
  }else if(state==='done'){
    wt.textContent='DONE ✓ · تم';
    wd.style.background='var(--ok)';wl.textContent='小迪';bs.textContent='DONE';
  }
}

function startWake(){
  if(!micOk||wakeActive)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;
  wakeActive=true;

  function loop(){
    if(listening){wakeActive=false;return;}
    const r=new SR();
    r.lang='ar-EG';    // ar-EG handles both Arabic AND English in most Android WebView
    r.interimResults=false;
    r.continuous=false;  // IMPORTANT: false prevents memory leak on DLink
    r.maxAlternatives=4;

    r.onresult=(e)=>{
      let handled=false;
      for(let i=0;i<e.results.length&&!handled;i++){
        for(let j=0;j<e.results[i].length&&!handled;j++){
          const tr=e.results[i][j].transcript;
          if(isWake(tr)){
            setWS('active');
            speakAR('تفضل');
            setTimeout(()=>{wakeActive=false;startListen();},850);
            handled=true;
          } else {
            if(checkCasual(tr.toLowerCase()))handled=true;
            else{const m=fuzzy(tr);if(m&&m.c>58){execCmd(m.cmd);handled=true;}}
          }
        }
      }
    };
    r.onend=()=>{
      if(!listening){
        setWS('armed');
        setTimeout(loop,300); // short pause then restart — lightweight
      }
    };
    r.onerror=(ev)=>{
      const ok=['no-speech','aborted','network'];
      if(!ok.includes(ev.error))console.warn('wake:',ev.error);
      setTimeout(loop,500);
    };
    try{setWS('armed');r.start();}catch(e){setTimeout(loop,1000);}
  }
  loop();
}

// ═══════════════════════════════════════════
//  MANUAL LISTEN
// ═══════════════════════════════════════════
function toggleListen(){
  if(!micOk){grantMic();return;}
  if(listening){stopListen();return;}
  startListen();
}

function startListen(){
  if(listening)return;
  wakeActive=false;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){setDisp('NOT SUPPORTED','Tap commands below','—','',0);return;}
  const r=new SR();
  r.lang='ar-EG';
  r.interimResults=true;r.continuous=false;r.maxAlternatives=5;

  r.onstart=()=>{
    listening=true;
    document.getElementById('mo').classList.add('act');
    document.getElementById('hb').classList.add('lst');
    document.getElementById('rb').classList.add('show');
    setMC('#00e5ff');setFq(true);
    setDisp('LISTENING · بسمعك','...','','',0);
    setWS('listening');
    let s=0;clearInterval(recT);
    recT=setInterval(()=>{
      s++;const m=Math.floor(s/60),sec=s%60;
      document.getElementById('rt').textContent=m+':'+(sec<10?'0':'')+sec;
    },1000);
  };
  r.onresult=(e)=>{
    const tr=Array.from(e.results).map(x=>x[0].transcript).join(' ');
    const cf=e.results[e.results.length-1][0].confidence||0.55;
    const pct=Math.round(cf*100);
    document.getElementById('srout').textContent=tr;
    document.getElementById('cf').style.width=pct+'%';
    document.getElementById('cp').textContent=pct+'%';
    if(checkCasual(tr.toLowerCase())){stopListen();return;}
    if(pct>=42){const m=fuzzy(tr);if(m&&m.c>38){stopListen();execCmd(m.cmd);}}
  };
  r.onerror=()=>stopListen();
  r.onend=()=>stopListen();
  window._r=r;
  try{r.start();}catch(e){stopListen();}
}

function stopListen(){
  listening=false;wakeActive=false;
  if(window._r){try{window._r.stop();}catch(e){}window._r=null;}
  clearInterval(recT);
  document.getElementById('rb').classList.remove('show');
  document.getElementById('mo').classList.remove('act');
  document.getElementById('hb').classList.remove('lst');
  setMC('#4a7080');setFq(false);
  if(document.getElementById('stag').textContent.includes('LISTEN'))
    setDisp('READY · جاهز','你好小迪，导航回家','nǐ hǎo xiǎo dí','قول 小迪 أو اضغط المايك',0);
  if(micOk)setTimeout(startWake,400);
}

// ═══════════════════════════════════════════
//  EXECUTE
// ═══════════════════════════════════════════
function execCmd(cmd){
  lastId=cmd.id;
  const ar=cmd.ar&&cmd.ar.length?cmd.ar[0]:cmd.en;
  setDisp('EXECUTING · تنفيذ',ar,cmd.zh,cmd.py,97);
  document.getElementById('hb').classList.add('ok2');
  document.getElementById('ctitle').textContent='EXECUTING · تنفيذ';
  render();
  // Speak Chinese command
  speakZH(cmd.zh);
  setTimeout(()=>{
    document.getElementById('hb').classList.remove('ok2');
    setWS('done');
    document.getElementById('ctitle').textContent='DONE ✓ · تم';
    setDisp('DONE ✓ · تم',ar,cmd.zh,cmd.py,97);
    setTimeout(()=>document.getElementById('ctitle').textContent='WAITING · في انتظار الأمر',2500);
  },1800);
}

// ═══════════════════════════════════════════
//  FUZZY MATCH
// ═══════════════════════════════════════════
function fuzzy(text){
  const t=text.toLowerCase().trim();
  let best=null,bs=0;
  DB.forEach(cmd=>{
    const phrases=[cmd.en.toLowerCase(),...(cmd.ar||[])];
    phrases.forEach(ph=>{
      const pl=ph.toLowerCase();
      if(t.includes(pl)||pl.includes(t)){if(0.92>bs){bs=0.92;best=cmd;}return;}
      const pw=pl.split(/\s+/),tw=t.split(/\s+/);
      let hits=0;
      pw.forEach(p=>tw.forEach(w=>{if(p.length>1&&w.length>1&&(p.includes(w)||w.includes(p)))hits++;}));
      const sc=hits/Math.max(pw.length,1);if(sc>bs){bs=sc;best=cmd;}
    });
  });
  return bs>0.25?{cmd:best,c:Math.round(bs*100)}:null;
}

function checkCasual(t){
  for(const g of CASUAL){if(g.t.some(x=>t.includes(x))){setDisp('CHAT',g.r,'💬','',0);return true;}}
  return false;
}

// ═══════════════════════════════════════════
//  DISPLAY + SVG
// ═══════════════════════════════════════════
function setDisp(tag,src,zh,py,conf){
  document.getElementById('stag').textContent=tag;
  document.getElementById('srout').textContent=src;
  document.getElementById('zhout').textContent=zh||'小迪';
  document.getElementById('pyout').textContent=py||'';
  document.getElementById('cf').style.width=conf+'%';
  document.getElementById('cp').textContent=conf?conf+'%':'—';
}
function setMC(c){['mb','ma','ml','mb2','f1','f2','f3'].forEach(id=>{const e=document.getElementById(id);if(e)e.setAttribute('stroke',c);});}
function setFq(on){['f1','f2','f3'].forEach((id,i)=>{const e=document.getElementById(id);if(!e)return;e.setAttribute('y2',on?['7','4','8'][i]:'10');e.setAttribute('opacity',on?'1':'0.4');});}

// ═══════════════════════════════════════════
//  RENDER COMMANDS
// ═══════════════════════════════════════════
function buildCats(){
  const el=document.getElementById('cats');el.innerHTML='';
  CATS.forEach(c=>{
    const b=document.createElement('button');
    b.className='catbtn'+(c===activeCat?' on':'');
    b.textContent=c;
    b.onclick=()=>{activeCat=c;buildCats();render();};
    el.appendChild(b);
  });
}
function render(){
  const q=(document.getElementById('srch').value||'').toLowerCase();
  const list=DB.filter(c=>{
    const mc=activeCat==='ALL'||c.cat===activeCat;
    const mq=!q||c.en.toLowerCase().includes(q)||c.zh.includes(q)||(c.ar||[]).join(' ').includes(q);
    return mc&&mq;
  });
  document.getElementById('cnt').textContent=list.length;
  const el=document.getElementById('cmdlist');el.innerHTML='';
  list.forEach(c=>{
    const d=document.createElement('div');
    let cls='cmd'+(c.wake?' wake-c':c.spec?' spec':'')+(lastId===c.id?' done':'');
    d.className=cls;
    const ar=(c.ar&&c.ar.length)?c.ar[0]:'';
    d.innerHTML=`<div class="cmd-l">
      <div class="cen">${c.en}</div>
      ${ar?`<div class="car">${ar}</div>`:''}
      <div class="ccat">${c.cat}</div>
    </div><div class="czh">${c.zh}</div>`;
    d.onclick=()=>execCmd(c);
    el.appendChild(d);
  });
}

// ═══════════════════════════════════════════
//  INIT — auto-grant mic if previously allowed
// ═══════════════════════════════════════════
buildCats();render();

// Check if mic was previously granted — skip dialog
(async()=>{
  const wasGranted=localStorage.getItem(MIC_KEY)==='1';
  if(navigator.permissions){
    try{
      const s=await navigator.permissions.query({name:'microphone'});
      if(s.state==='granted'){grantMic();return;}
      if(s.state==='prompt'&&wasGranted){grantMic();return;}
      // denied or unknown without prior grant
      document.getElementById('micP').textContent='TAP MIC';
      document.getElementById('wt').textContent='Tap mic button to allow microphone';
    }catch(e){
      // permissions API not available (some Android WebViews)
      if(wasGranted||And){grantMic();}
      else{document.getElementById('micP').textContent='TAP MIC';}
    }
  } else {
    // No permissions API — auto-try (APK / Android)
    if(wasGranted||And){grantMic();}
    else{document.getElementById('micP').textContent='TAP MIC';}
  }
})();
</script>
