<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#060a10">
<title>BYD Voice Bridge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+SC:wght@700&family=Noto+Sans+Arabic:wght@400;600&family=Rajdhani:wght@600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
:root{
  --c:#00e5ff;--c2:#0097a7;--cg:rgba(0,229,255,0.13);
  --bg:#060a10;--bg2:#0b1624;--bg3:#0e1d2e;
  --t:#d6eeff;--m:#4a7080;--b:rgba(0,229,255,0.16);
  --ok:#00e87a;--err:#ff3355;--warn:#ffbb00;
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Share Tech Mono',monospace;color:var(--t);display:flex;flex-direction:column;}

/* TOP BAR */
.top{background:var(--bg2);border-bottom:1px solid var(--b);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.brand-row{display:flex;align-items:center;gap:9px;}
.bico{width:30px;height:30px;border:1.5px solid var(--c);border-radius:7px;display:flex;align-items:center;justify-content:center;background:var(--cg);flex-shrink:0;}
.bname{color:var(--c);font-size:13px;letter-spacing:2px;font-weight:bold;line-height:1.1;}
.bsub{color:var(--m);font-size:8px;letter-spacing:1.5px;}
.ptop{display:flex;gap:5px;align-items:center;}
.pi{font-size:8px;padding:2px 7px;border-radius:3px;border:1px solid;letter-spacing:.5px;}
.pi.ok{border-color:var(--ok);color:var(--ok);}
.pi.cy{border-color:var(--c);color:var(--c);}
.pi.mu{border-color:var(--m);color:var(--m);}
.pi.no{border-color:var(--err);color:var(--err);}
.wd-wrap{display:flex;align-items:center;gap:4px;}
.wdot{width:6px;height:6px;border-radius:50%;background:var(--ok);animation:wp 1.8s ease-in-out infinite;}
@keyframes wp{0%,100%{opacity:1;}50%{opacity:.25;}}
.wlbl{font-size:8px;color:var(--ok);letter-spacing:.5px;}

/* MIC PERMISSION */
.mpbar{display:none;align-items:center;gap:8px;background:rgba(255,51,85,.1);border-bottom:1px solid rgba(255,51,85,.25);padding:7px 14px;flex-shrink:0;}
.mpbar.show{display:flex;}
.mptxt{font-size:9px;color:var(--err);flex:1;letter-spacing:.5px;}
.mpbtn{background:var(--err);color:#fff;border:none;border-radius:4px;padding:5px 14px;font-size:10px;font-family:'Share Tech Mono',monospace;cursor:pointer;}

/* MIC ZONE — horizontal */
.miczone{background:var(--bg2);border-bottom:1px solid var(--b);padding:10px 14px;display:flex;align-items:center;gap:14px;flex-shrink:0;}

/* HEX MIC */
.mouter{position:relative;width:74px;height:74px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.ring{position:absolute;border-radius:50%;border:1.5px solid transparent;opacity:0;transition:opacity .4s;}
.ring.r1{inset:0;border-top-color:var(--c);border-right-color:var(--c);animation:sp1 2s linear infinite;}
.ring.r2{inset:9%;border-left-color:var(--c2);border-bottom-color:var(--c2);animation:sp2 1.4s linear infinite reverse;}
.ring.r3{inset:20%;border-top-color:rgba(0,229,255,.25);border-bottom-color:rgba(0,229,255,.25);animation:sp1 3s linear infinite;}
.mouter.act .ring{opacity:1;}
.mouter.wake .ring.r1{opacity:.4;}
@keyframes sp1{to{transform:rotate(360deg);}}
@keyframes sp2{to{transform:rotate(360deg);}}
.pdot{position:absolute;width:5px;height:5px;border-radius:50%;background:var(--c);opacity:0;}
.mouter.act .pdot{animation:pd 1.6s ease-in-out infinite;}
.pdot:nth-child(3){top:0;left:calc(50% - 2.5px);}
.pdot:nth-child(4){right:0;top:calc(50% - 2.5px);animation-delay:.4s;}
.pdot:nth-child(5){bottom:0;left:calc(50% - 2.5px);animation-delay:.8s;}
.pdot:nth-child(6){left:0;top:calc(50% - 2.5px);animation-delay:1.2s;}
@keyframes pd{0%,100%{opacity:0;transform:scale(.4);}50%{opacity:1;transform:scale(1);}}
.hexbtn{width:54px;height:54px;clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;position:relative;z-index:2;}
.hexin{width:44px;height:44px;clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);background:var(--bg3);display:flex;align-items:center;justify-content:center;border:1.5px solid var(--c2);transition:all .25s;}
.hexbtn.lst .hexin{border-color:var(--c);box-shadow:0 0 12px rgba(0,229,255,.3);}
.hexbtn.ok2 .hexin{border-color:var(--ok);box-shadow:0 0 10px rgba(0,232,122,.25);}
.hexbtn.er .hexin{border-color:var(--err);}
.hexbtn:active{transform:scale(.93);}

/* MIC INFO RIGHT */
.micinfo{flex:1;min-width:0;}
.stag{font-size:8px;letter-spacing:1.5px;color:var(--m);margin-bottom:3px;}
.zhbig{font-family:'Noto Sans SC',sans-serif;font-size:20px;font-weight:700;color:var(--c);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pybig{font-size:9px;letter-spacing:1.5px;color:var(--m);margin:2px 0;min-height:13px;}
.srbig{font-family:'Noto Sans Arabic',sans-serif;font-size:11px;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* WAKE PILL */
.wake-pill{display:flex;align-items:center;gap:5px;padding:4px 14px;flex-shrink:0;}
.wpinner{display:inline-flex;align-items:center;gap:5px;background:rgba(0,232,122,.1);border:1px solid rgba(0,232,122,.3);border-radius:20px;padding:3px 10px;font-size:8px;color:var(--ok);letter-spacing:.5px;transition:all .3s;}
.wpinner.listening{background:rgba(255,187,0,.1);border-color:rgba(255,187,0,.3);color:var(--warn);}
.wpinner.listening .wdot{background:var(--warn);animation:none;opacity:1;}
.wpinner.active{background:var(--cg);border-color:var(--c);color:var(--c);}
.wpinner.active .wdot{background:var(--c);}
.wpdot{width:5px;height:5px;border-radius:50%;background:var(--ok);animation:wp 1.8s infinite;}

/* REC BAR */
.recbar{display:none;align-items:center;justify-content:center;gap:6px;background:rgba(255,51,85,.07);border-bottom:1px solid rgba(255,51,85,.2);padding:4px 14px;flex-shrink:0;}
.recbar.show{display:flex;}
.rdot{width:6px;height:6px;border-radius:50%;background:var(--err);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.1;}}
.rtxt{font-size:9px;color:var(--err);letter-spacing:2px;}
.rtime{font-size:9px;color:var(--err);}

/* NOISE */
.nstrip{display:flex;align-items:center;gap:8px;padding:5px 14px;background:var(--bg3);flex-shrink:0;}
.nlbl{font-size:8px;color:var(--m);letter-spacing:1px;width:36px;}
.nbars{display:flex;gap:2px;align-items:flex-end;height:12px;flex:1;}
.nb{width:4px;border-radius:1px;background:var(--bg2);transition:height .1s;}
.nb.lit{background:var(--c);}
.nval{font-size:8px;color:var(--c);width:32px;text-align:right;}

/* CONF */
.confstrip{display:flex;align-items:center;gap:8px;padding:4px 14px;flex-shrink:0;}
.clbl{font-size:8px;color:var(--m);width:30px;}
.ctrk{flex:1;height:2px;background:var(--bg3);border-radius:1px;overflow:hidden;}
.cfil{height:100%;background:var(--c);border-radius:1px;width:0%;transition:width .3s;}
.cpct{font-size:8px;color:var(--c);width:26px;text-align:right;}

/* COMMANDS */
.cmdsec{flex:1;display:flex;flex-direction:column;overflow:hidden;border-top:1px solid var(--b);}
.cmdhead{display:flex;align-items:center;justify-content:space-between;padding:6px 14px 3px;flex-shrink:0;}
.cmdtitle{font-size:8px;letter-spacing:2px;color:var(--m);}
.cmdcount{font-size:8px;color:var(--c);}
.cats{display:flex;gap:5px;padding:3px 14px;overflow-x:auto;flex-shrink:0;}
.cats::-webkit-scrollbar{display:none;}
.catbtn{font-size:9px;padding:3px 10px;border-radius:3px;border:1px solid var(--b);background:transparent;color:var(--m);cursor:pointer;white-space:nowrap;letter-spacing:.5px;font-family:'Share Tech Mono',monospace;}
.catbtn.on{border-color:var(--c);color:var(--c);background:var(--cg);}
.srch{margin:4px 14px;background:var(--bg3);border:1px solid var(--b);border-radius:6px;padding:6px 10px;color:var(--t);font-size:11px;font-family:'Share Tech Mono',monospace;outline:none;display:block;width:calc(100% - 28px);}
.srch::placeholder{color:var(--m);}
.srch:focus{border-color:var(--c);}

/* COMMAND LIST — 1 per row */
.cmdlist{flex:1;overflow-y:auto;padding:4px 14px 10px;}
.cmdlist::-webkit-scrollbar{width:2px;}
.cmdlist::-webkit-scrollbar-thumb{background:var(--b);}
.cmd{display:flex;align-items:center;gap:10px;padding:8px 10px;margin-bottom:4px;background:var(--bg2);border:1px solid var(--b);border-radius:8px;cursor:pointer;transition:all .15s;}
.cmd:hover,.cmd:active{border-color:var(--c);background:var(--cg);}
.cmd:active{transform:scale(.98);}
.cmd.done{border-color:var(--ok);background:rgba(0,232,122,.04);}
.cmd.wake-c{border-color:rgba(0,229,255,.4);background:var(--cg);}
.cmd.spec{border-color:rgba(255,187,0,.2);}
.cmd-left{flex:1;min-width:0;}
.cen{font-size:12px;color:var(--t);letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.car{font-family:'Noto Sans Arabic',sans-serif;font-size:11px;color:var(--m);direction:rtl;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.ccat{font-size:7px;color:var(--m);letter-spacing:1px;margin-top:2px;opacity:.7;}
.czh{font-family:'Noto Sans SC',sans-serif;font-size:22px;color:var(--c);flex-shrink:0;text-align:right;min-width:52px;}

/* BOTTOM */
.bot{display:flex;align-items:center;justify-content:space-between;padding:4px 14px;border-top:1px solid var(--b);background:var(--bg2);font-size:7px;color:var(--m);letter-spacing:1.5px;flex-shrink:0;}
</style>
</head>

<!-- REC BAR -->

</div>

<!-- NOISE -->

</div>

  {id:30,en:'Start charging',ar:['ابدأ الشحن','اشحن'],zh:'开始充电',py:'kāishǐ chōngdiàn',cat:'VEHICLE'},
  {id:31,en:'Stop charging',ar:['وقف الشحن'],zh:'停止充电',py:'tíngzhǐ chōngdiàn',cat:'VEHICLE'},
  {id:32,en:'Open trunk',ar:['افتح الشنطة','الشنطة'],zh:'打开后备箱',py:'dǎkāi hòubèixiāng',cat:'VEHICLE'},
  {id:33,en:'Lock doors',ar:['اقفل الأبواب','لوك'],zh:'锁门',py:'suǒmén',cat:'VEHICLE'},
  {id:34,en:'Unlock doors',ar:['افتح الأبواب','فتح القفل'],zh:'开门',py:'kāimén',cat:'VEHICLE'},
  {id:45,en:'Open hood',ar:['افتح الكبوت','الكبوت'],zh:'打开引擎盖',py:'dǎkāi yǐnqínggài',cat:'VEHICLE',spec:true},
  {id:46,en:'Hazard lights on',ar:['شغل الهازارد','الخطر'],zh:'打开双闪',py:'dǎkāi shuāngshǎn',cat:'VEHICLE',spec:true},
  {id:47,en:'Hazard lights off',ar:['اقفل الهازارد'],zh:'关闭双闪',py:'guānbì shuāngshǎn',cat:'VEHICLE',spec:true},
  {id:35,en:'Home screen',ar:['الصفحة الرئيسية','الهوم'],zh:'返回主界面',py:'fǎnhuí zhǔ jièmiàn',cat:'SYSTEM'},
  {id:36,en:'Bluetooth on',ar:['فتح البلوتوث','شغل البلوتوث'],zh:'打开蓝牙',py:'dǎkāi lányá',cat:'SYSTEM'},
  {id:37,en:'Bluetooth off',ar:['اقفل البلوتوث'],zh:'关闭蓝牙',py:'guānbì lányá',cat:'SYSTEM'},
  {id:38,en:'WiFi on',ar:['فتح الواي فاي','شغل النت'],zh:'打开无线网络',py:'dǎkāi wúxiàn wǎngluò',cat:'SYSTEM'},
  {id:48,en:'Answer in English',ar:['رد بالانجليزي'],zh:'用英语回答',py:'yòng yīngyǔ huídá',cat:'SYSTEM',spec:true},
  {id:49,en:'Open CarPlay',ar:['كار بلاي','افتح كار بلاي'],zh:'打开CarPlay',py:'dǎkāi CarPlay',cat:'SYSTEM',spec:true},
  {id:50,en:'Open Android Auto',ar:['اندرويد اوتو'],zh:'打开Android Auto',py:'dǎkāi Android Auto',cat:'SYSTEM',spec:true},
  {id:51,en:'Screen off',ar:['اطفي الشاشة','اقفل الشاشة'],zh:'关闭屏幕',py:'guānbì píngmù',cat:'SYSTEM'},
];
const CASUAL=[
  {t:['ازيك','عامل ايه','اخبارك','عاملة ايه'],r:'أنا كويسة زي الفل! وانت؟'},
  {t:['صباح الخير','صبح'],r:'صباح النور يا فندم!'},
  {t:['مساء الخير','مسا'],r:'مساء الفل!'},
  {t:['شكرا','مشكور'],r:'العفو! في أمر تاني؟'},
  {t:['تعبان','زهقت'],r:'متزهقش! أنا هنا معاك دايما.'},
];
const CATS=['ALL','WAKE','CLIMATE','WINDOWS','MEDIA','NAV','VEHICLE','SYSTEM'];
let activeCat='ALL',lastId=null,listening=false,micOk=false;
let recT=null,noiseT=null;
let aCtx=null,analyser=null,mStream=null;
const And=window.Android||null;

// noise bars
(()=>{const nb=document.getElementById('nb');for(let i=0;i<16;i++){const b=document.createElement('div');b.className='nb';b.id='B'+i;b.style.height='2px';nb.appendChild(b);}})();

function checkNet(){const p=document.getElementById('netP');if(navigator.onLine){p.textContent='ONLINE';p.className='pi ok';}else{p.textContent='OFFLINE';p.className='pi mu';}}
window.addEventListener('online',checkNet);window.addEventListener('offline',checkNet);checkNet();

function idleNoise(){clearInterval(noiseT);noiseT=setInterval(()=>{document.getElementById('ndb').textContent=Math.floor(Math.random()*8+2)+'dB';for(let i=0;i<16;i++){const h=Math.random()*3+1;const b=document.getElementById('B'+i);b.style.height=Math.round(h)+'px';b.className='nb';}},600);}
function liveNoise(){if(!analyser)return;clearInterval(noiseT);const d=new Uint8Array(analyser.frequencyBinCount);noiseT=setInterval(()=>{analyser.getByteFrequencyData(d);const avg=d.slice(0,50).reduce((a,b)=>a+b,0)/50;const db=Math.max(0,Math.round(20*Math.log10((avg||1)/255)+90));document.getElementById('ndb').textContent=db+'dB';for(let i=0;i<16;i++){const h=Math.min(12,(d[i*2]||0)/20+1);const b=document.getElementById('B'+i);b.style.height=Math.round(h)+'px';b.className='nb'+(h>6?' lit':'');}},100);}
idleNoise();

async function grantMic(){
  try{
    mStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}});
    micOk=true;
    document.getElementById('mpbar').classList.remove('show');
    document.getElementById('micP').textContent='MIC ✓';
    document.getElementById('micP').className='pi ok';
    aCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=aCtx.createAnalyser();analyser.fftSize=512;
    aCtx.createMediaStreamSource(mStream).connect(analyser);
    liveNoise();
    startWake();
  }catch(e){
    document.getElementById('mpbar').classList.add('show');
    document.getElementById('mptxt').textContent='MIC DENIED — USE MANUAL COMMANDS';
    document.getElementById('micP').textContent='MIC ✗';
    document.getElementById('micP').className='pi no';
  }
}

function setWS(s){
  const wp=document.getElementById('wp');
  const wt=document.getElementById('wpt');
  const wd=document.getElementById('wpd');
  const wl=document.getElementById('wlbl');
  const bs=document.getElementById('bstat');
  if(s==='armed'){wp.className='wpinner';wt.textContent='Hi BYD · ARMED · يستمع';wd.style.background='var(--ok)';wl.style.color='var(--ok)';wl.textContent='Hi BYD';bs.textContent='ARMED';}
  else if(s==='listening'){wp.className='wpinner listening';wt.textContent='LISTENING · بسمعك...';wd.style.background='var(--warn)';wl.style.color='var(--warn)';wl.textContent='...';bs.textContent='LISTENING';}
  else if(s==='active'){wp.className='wpinner active';wt.textContent='WAKE OK · تفضل';wd.style.background='var(--c)';wl.style.color='var(--c)';wl.textContent='ACTIVE';bs.textContent='ACTIVE';}
  else if(s==='done'){wp.className='wpinner';wt.textContent='DONE · تم';wd.style.background='var(--ok)';bs.textContent='DONE';}
}

function isWake(t){const s=t.toLowerCase();return s.includes('byd')||s.includes('هاي بيد')||s.includes('بيد')||s.includes('هاي بي');}

function startWake(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR||!micOk)return;
  function loop(){
    if(listening)return;setWS('armed');
    const r=new SR();r.lang='ar-EG';r.interimResults=false;r.continuous=false;r.maxAlternatives=5;
    r.onresult=(e)=>{
      for(let i=0;i<e.results.length;i++){
        for(let j=0;j<e.results[i].length;j++){
          const tr=e.results[i][j].transcript;
          if(isWake(tr)){
            setWS('active');
            speak('تفضل','ar-EG');
            setTimeout(()=>{if(!listening)startListen();},900);
            return;
          }
          if(checkCasual(tr.toLowerCase()))return;
          const m=fuzzy(tr);if(m&&m.c>55){execCmd(m.cmd);return;}
        }
      }
    };
    r.onend=()=>{if(!listening)setTimeout(loop,400);};
    r.onerror=(ev)=>{if(!['no-speech','aborted','network'].includes(ev.error))console.warn(ev.error);if(!listening)setTimeout(loop,1000);};
    try{r.start();}catch(e){setTimeout(loop,1500);}
  }
  loop();
}

function toggleListen(){if(!micOk){grantMic();return;}if(listening){stopListen();return;}startListen();}

function startListen(){
  if(listening)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){setDisp('NOT SUPPORTED','Use buttons below','—','',0);return;}
  const r=new SR();r.lang='ar-EG';r.interimResults=true;r.continuous=false;r.maxAlternatives=5;
  r.onstart=()=>{
    listening=true;
    document.getElementById('mo').classList.add('act');
    document.getElementById('hb').classList.add('lst');
    document.getElementById('rb').classList.add('show');
    setMC('#00e5ff');setFq(true);
    setDisp('LISTENING · بسمعك','...','','',0);
    setWS('listening');
    let s=0;clearInterval(recT);
    recT=setInterval(()=>{s++;const m=Math.floor(s/60);document.getElementById('rt').textContent=m+':'+(s%60<10?'0':'')+s%60;},1000);
  };
  r.onresult=(e)=>{
    const tr=Array.from(e.results).map(x=>x[0].transcript).join(' ');
    const cf=e.results[e.results.length-1][0].confidence||0.6;
    const pct=Math.round(cf*100);
    document.getElementById('srout').textContent=tr;
    document.getElementById('cf').style.width=pct+'%';
    document.getElementById('cp').textContent=pct+'%';
    if(checkCasual(tr.toLowerCase())){stopListen();return;}
    if(pct>=45){const m=fuzzy(tr);if(m&&m.c>40){stopListen();execCmd(m.cmd);}}
  };
  r.onerror=()=>stopListen();r.onend=()=>stopListen();
  window._r=r;try{r.start();}catch(e){stopListen();}
}

function stopListen(){
  listening=false;
  if(window._r){try{window._r.stop();}catch(e){}window._r=null;}
  clearInterval(recT);
  document.getElementById('rb').classList.remove('show');
  document.getElementById('mo').classList.remove('act');
  document.getElementById('hb').classList.remove('lst');
  setMC('#4a7080');setFq(false);
  if(document.getElementById('stag').textContent.includes('LISTEN'))
    setDisp('READY · جاهز','قول BYD للبدء','say BYD to start','اضغط المايك أو قول Hi BYD',0);
  if(micOk)setTimeout(startWake,500);
}

function execCmd(cmd){
  lastId=cmd.id;
  const ar=cmd.ar&&cmd.ar.length?cmd.ar[0]:cmd.en;
  setDisp('EXECUTING · تنفيذ',ar,cmd.zh,cmd.py,97);
  document.getElementById('hb').classList.add('ok2');
  document.getElementById('cmdtitle').textContent='EXECUTING · تنفيذ';
  render();
  speak(cmd.zh,'zh-CN');
  if(And&&And.vibrate)And.vibrate(60);
  setTimeout(()=>{
    document.getElementById('hb').classList.remove('ok2');
    document.getElementById('cmdtitle').textContent='DONE ✓ · تم';
    setWS('done');
    setDisp('DONE ✓ · تم',ar,cmd.zh,cmd.py,97);
    setTimeout(()=>document.getElementById('cmdtitle').textContent='WAITING · في انتظار الأمر',2000);
  },2000);
}

function speak(text,lang){
  lang=lang||'zh-CN';
  if(And&&And.speak){And.speak(text,lang,1,0.85);return;}
  if(window.speechSynthesis){
    window.speechSynthesis.cancel();
    setTimeout(()=>{
      const u=new SpeechSynthesisUtterance(text);u.lang=lang;u.rate=0.82;u.volume=1;
      const v=window.speechSynthesis.getVoices().find(x=>x.lang.startsWith(lang.split('-')[0]));
      if(v)u.voice=v;window.speechSynthesis.speak(u);
    },50);
  }
}

function fuzzy(text){
  const t=text.toLowerCase().trim();let best=null,bs=0;
  DB.forEach(cmd=>{
    const phrases=[cmd.en.toLowerCase(),...(cmd.ar||[])];
    phrases.forEach(ph=>{
      const pl=ph.toLowerCase();
      if(t.includes(pl)||pl.includes(t)){if(0.92>bs){bs=0.92;best=cmd;}return;}
      const pw=pl.split(/\s+/),tw=t.split(/\s+/);let hits=0;
      pw.forEach(p=>tw.forEach(w=>{if(p.length>1&&w.length>1&&(p.includes(w)||w.includes(p)))hits++;}));
      const sc=hits/Math.max(pw.length,1);if(sc>bs){bs=sc;best=cmd;}
    });
  });
  return bs>0.28?{cmd:best,c:Math.round(bs*100)}:null;
}

function checkCasual(t){
  for(const g of CASUAL){if(g.t.some(x=>t.includes(x))){setDisp('CHAT · دردشة',g.r,'💬','',0);return true;}}
  return false;
}

function setDisp(tag,src,zh,py,conf){
  document.getElementById('stag').textContent=tag;
  document.getElementById('srout').textContent=src;
  document.getElementById('zhout').textContent=zh||'BYD';
  document.getElementById('pyout').textContent=py||'';
  document.getElementById('cf').style.width=conf+'%';
  document.getElementById('cp').textContent=conf?conf+'%':'—';
}
function setMC(c){['mb','ma','ml','mb2','f1','f2','f3'].forEach(id=>{const e=document.getElementById(id);if(e)e.setAttribute('stroke',c);});}
function setFq(on){['f1','f2','f3'].forEach((id,i)=>{const e=document.getElementById(id);if(!e)return;e.setAttribute('y2',on?['7','4','8'][i]:'10');e.setAttribute('opacity',on?'1':'0.4');});}

function buildCats(){
  const el=document.getElementById('cats');el.innerHTML='';
  CATS.forEach(c=>{const b=document.createElement('button');b.className='catbtn'+(c===activeCat?' on':'');b.textContent=c;b.onclick=()=>{activeCat=c;buildCats();render();};el.appendChild(b);});
}
function render(){
  const q=(document.getElementById('srch').value||'').toLowerCase();
  const list=DB.filter(c=>{const mc=activeCat==='ALL'||c.cat===activeCat;const mq=!q||c.en.toLowerCase().includes(q)||c.zh.includes(q)||(c.ar||[]).join(' ').includes(q);return mc&&mq;});
  document.getElementById('cnt').textContent=list.length;
  const el=document.getElementById('cmdlist');el.innerHTML='';
  list.forEach(c=>{
    const d=document.createElement('div');
    let cls='cmd'+(c.wake?' wake-c':c.spec?' spec':'')+(lastId===c.id?' done':'');
    d.className=cls;
    const ar=(c.ar&&c.ar.length)?c.ar[0]:'';
    d.innerHTML=`<div class="cmd-left"><div class="cen">${c.en}</div>${ar?`<div class="car">${ar}</div>`:''}
    <div class="ccat">${c.cat}</div></div><div class="czh">${c.zh}</div>`;
    d.onclick=()=>execCmd(c);el.appendChild(d);
  });
}

// init
if(navigator.permissions){
  navigator.permissions.query({name:'microphone'}).then(r=>{
    if(r.state==='granted')grantMic();
    else document.getElementById('mpbar').classList.add('show');
    r.onchange=()=>{if(r.state==='granted')grantMic();};
  }).catch(()=>document.getElementById('mpbar').classList.add('show'));
} else {
  if(And)grantMic();else document.getElementById('mpbar').classList.add('show');
}
buildCats();render();
</script>
