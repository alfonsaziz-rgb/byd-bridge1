<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#06090f">
<title>BYD Voice Bridge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+SC:wght@700&family=Noto+Sans+Arabic:wght@500;700&family=Exo+2:wght@500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
:root{
  --c:#00e5ff;--c2:#007a99;--cg:rgba(0,229,255,.11);
  --bg:#06090f;--bg2:#0a1520;--bg3:#0d1c2b;--bg4:#101f30;
  --t:#cce6ff;--m:#4a7090;--b:rgba(0,229,255,.15);
  --ok:#00e07a;--err:#ff3355;--warn:#ffaa00;
  --ar:#7dd8ff;--en:#a8d4e8;
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Exo 2',sans-serif;color:var(--t);display:flex;flex-direction:column;}

/* ── TOP BAR ── */
.top{
  background:var(--bg2);border-bottom:1px solid var(--b);
  padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.brand{display:flex;align-items:center;gap:9px;}
.bico{
  width:30px;height:30px;border:1.5px solid var(--c);border-radius:8px;
  display:flex;align-items:center;justify-content:center;background:var(--cg);
}
.bname{color:var(--c);font-size:11px;letter-spacing:2px;font-family:'IBM Plex Mono',monospace;}
.bsub{color:var(--m);font-size:7px;letter-spacing:1.5px;font-family:'IBM Plex Mono',monospace;}
.pills{display:flex;gap:5px;align-items:center;}
.pi{font-size:7px;padding:2px 7px;border-radius:3px;border:1px solid;letter-spacing:.5px;font-family:'IBM Plex Mono',monospace;}
.pi.ok{border-color:var(--ok);color:var(--ok);}
.pi.cy{border-color:var(--c);color:var(--c);}
.pi.mu{border-color:var(--m);color:var(--m);}
.pi.no{border-color:var(--err);color:var(--err);}
.pi.wa{border-color:var(--warn);color:var(--warn);}

/* ── LANG BAR ── */
.langbar{display:flex;border-bottom:1px solid var(--b);flex-shrink:0;background:var(--bg2);}
.lb{flex:1;padding:5px 0;border:none;background:transparent;color:var(--m);font-size:10px;
    font-family:'IBM Plex Mono',monospace;cursor:pointer;letter-spacing:1px;
    border-bottom:2px solid transparent;transition:all .2s;}
.lb.on{color:var(--c);border-bottom-color:var(--c);background:var(--cg);}

/* ── MIC ZONE ── */
.mzone{
  background:var(--bg2);border-bottom:1px solid var(--b);
  padding:10px 14px;display:flex;align-items:center;gap:13px;flex-shrink:0;
}
.mouter{position:relative;width:68px;height:68px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.ring{position:absolute;border-radius:50%;border:1.5px solid transparent;opacity:0;transition:opacity .4s;}
.ring.r1{inset:0;border-top-color:var(--c);border-right-color:var(--c);animation:sp1 2s linear infinite;}
.ring.r2{inset:10%;border-left-color:var(--c2);border-bottom-color:var(--c2);animation:sp2 1.5s linear infinite reverse;}
.mouter.act .ring{opacity:1;}
@keyframes sp1{to{transform:rotate(360deg);}}
@keyframes sp2{to{transform:rotate(360deg);}}
.pdot{position:absolute;width:5px;height:5px;border-radius:50%;background:var(--c);opacity:0;}
.mouter.act .pdot{animation:pd 1.5s ease-in-out infinite;}
.pdot:nth-child(3){top:0;left:calc(50% - 2.5px);}
.pdot:nth-child(4){right:0;top:calc(50% - 2.5px);animation-delay:.37s;}
.pdot:nth-child(5){bottom:0;left:calc(50% - 2.5px);animation-delay:.75s;}
.pdot:nth-child(6){left:0;top:calc(50% - 2.5px);animation-delay:1.12s;}
@keyframes pd{0%,100%{opacity:0;transform:scale(.3);}50%{opacity:1;transform:scale(1);}}
.hexbtn{
  width:52px;height:52px;
  clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);
  background:var(--bg);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:2;transition:transform .12s;
}
.hexi{
  width:42px;height:42px;
  clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);
  background:var(--bg3);display:flex;align-items:center;justify-content:center;
  border:1.5px solid var(--c2);transition:all .2s;
}
.hexbtn.lst .hexi{border-color:var(--c);background:var(--cg);}
.hexbtn.ok2 .hexi{border-color:var(--ok);background:rgba(0,224,122,.08);}
.hexbtn:active{transform:scale(.9);}
.minfo{flex:1;min-width:0;direction:rtl;}
.stag{font-size:7px;letter-spacing:1.5px;color:var(--m);margin-bottom:2px;font-family:'IBM Plex Mono',monospace;}
.zhout{font-family:'Noto Sans SC',sans-serif;font-size:20px;font-weight:700;color:var(--c);line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pyout{font-size:7px;color:var(--m);margin:2px 0;font-family:'IBM Plex Mono',monospace;}
.srout{font-family:'Noto Sans Arabic',sans-serif;font-size:12px;font-weight:500;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── WAKE STRIP ── */
.wkstrip{
  display:flex;align-items:center;gap:7px;padding:4px 14px;
  background:rgba(0,224,122,.05);border-bottom:1px solid rgba(0,224,122,.12);
  flex-shrink:0;transition:all .3s;
}
.wkstrip.go{background:var(--cg);border-bottom-color:rgba(0,229,255,.2);}
.wkdot{width:6px;height:6px;border-radius:50%;background:var(--ok);animation:wkp 2s ease-in-out infinite;flex-shrink:0;}
.wkstrip.go .wkdot{background:var(--c);animation:none;}
@keyframes wkp{0%,100%{opacity:1;}50%{opacity:.2;}}
.wktxt{font-size:8px;color:var(--ok);letter-spacing:.5px;font-family:'IBM Plex Mono',monospace;}
.wkstrip.go .wktxt{color:var(--c);}
.bgbadge{display:none;font-size:7px;padding:1px 5px;border-radius:3px;border:1px solid var(--warn);color:var(--warn);margin-left:auto;font-family:'IBM Plex Mono',monospace;}
.bgbadge.on{display:block;}

/* ── REC BAR ── */
.recbar{display:none;align-items:center;gap:6px;padding:3px 14px;background:rgba(255,51,85,.06);border-bottom:1px solid rgba(255,51,85,.12);flex-shrink:0;}
.recbar.on{display:flex;}
.rdot{width:5px;height:5px;border-radius:50%;background:var(--err);animation:bk 1s infinite;}
@keyframes bk{0%,100%{opacity:1;}50%{opacity:.1;}}
.rtxt{font-size:8px;color:var(--err);letter-spacing:2px;font-family:'IBM Plex Mono',monospace;}

/* ── NOISE / CONF ── */
.nstrip{display:flex;align-items:center;gap:7px;padding:3px 14px;background:var(--bg3);flex-shrink:0;}
.nlbl{font-size:7px;color:var(--m);width:32px;font-family:'IBM Plex Mono',monospace;}
.nbars{display:flex;gap:2px;align-items:flex-end;height:10px;flex:1;}
.nb{width:3px;border-radius:1px;background:var(--bg2);transition:height .08s;}
.nb.lit{background:var(--c);}
.nval{font-size:7px;color:var(--c);width:28px;text-align:right;font-family:'IBM Plex Mono',monospace;}
.cstrip{display:flex;align-items:center;gap:7px;padding:2px 14px;flex-shrink:0;}
.clbl{font-size:7px;color:var(--m);width:28px;font-family:'IBM Plex Mono',monospace;}
.ctrk{flex:1;height:2px;background:var(--bg3);border-radius:1px;overflow:hidden;}
.cfil{height:100%;background:var(--c);border-radius:1px;width:0%;transition:width .25s;}
.cpct{font-size:7px;color:var(--c);width:24px;text-align:right;font-family:'IBM Plex Mono',monospace;}

/* ── COMMANDS PANEL ── */
.panel{flex:1;display:flex;flex-direction:column;overflow:hidden;border-top:1px solid var(--b);min-height:0;}
.phead{display:flex;align-items:center;justify-content:space-between;padding:5px 14px 2px;flex-shrink:0;}
.ptitle{font-size:7px;letter-spacing:2px;color:var(--m);font-family:'IBM Plex Mono',monospace;}
.pcnt{font-size:7px;color:var(--c);font-family:'IBM Plex Mono',monospace;}
.cats{display:flex;gap:4px;padding:3px 14px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;}
.cats::-webkit-scrollbar{display:none;}
.catbtn{font-size:9px;padding:3px 9px;border-radius:3px;border:1px solid var(--b);background:transparent;color:var(--m);cursor:pointer;white-space:nowrap;font-family:'IBM Plex Mono',monospace;}
.catbtn.on{border-color:var(--c);color:var(--c);background:var(--cg);}
.srch{margin:3px 14px;background:var(--bg3);border:1px solid var(--b);border-radius:6px;padding:6px 10px;color:var(--t);font-size:13px;font-family:'Exo 2',sans-serif;outline:none;display:block;width:calc(100% - 28px);}
.srch::placeholder{color:var(--m);}
.srch:focus{border-color:var(--c);}
.cmdlist{
  flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:4px 14px 16px;
  -webkit-overflow-scrolling:touch;overscroll-behavior:contain;
}
.cmdlist::-webkit-scrollbar{width:2px;}
.cmdlist::-webkit-scrollbar-thumb{background:var(--b);}
.cmd{
  display:flex;align-items:center;gap:10px;padding:10px 11px;margin-bottom:5px;
  background:var(--bg2);border:1px solid var(--b);border-radius:9px;cursor:pointer;
  user-select:none;-webkit-user-select:none;transition:border-color .12s,background .12s;
}
.cmd:active{border-color:var(--c);background:var(--cg);}
.cmd.done{border-color:var(--ok);}
.cmd.wkc{border-color:rgba(0,229,255,.35);background:var(--cg);}
.cmd.spc{border-color:rgba(255,170,0,.2);}
.cmdinfo{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;}
.ar{font-family:'Noto Sans Arabic',sans-serif;font-size:15px;font-weight:700;color:var(--ar);direction:rtl;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.en{font-family:'Exo 2',sans-serif;font-size:12px;font-weight:600;color:var(--en);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ccat{font-size:6px;color:var(--m);letter-spacing:1px;opacity:.55;font-family:'IBM Plex Mono',monospace;}
.czh{font-family:'Noto Sans SC',sans-serif;font-size:22px;color:var(--c);flex-shrink:0;min-width:54px;text-align:left;line-height:1;}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--bg2);border:1px solid var(--c);border-radius:12px;
  padding:7px 18px;font-size:14px;color:var(--c);
  font-family:'Noto Sans Arabic',sans-serif;
  opacity:0;transition:all .22s;pointer-events:none;z-index:999;
  white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── BOTTOM BAR ── */
.bot{
  display:flex;align-items:center;justify-content:space-between;
  padding:3px 14px;border-top:1px solid var(--b);background:var(--bg2);
  font-size:7px;color:var(--m);letter-spacing:1px;flex-shrink:0;
  font-family:'IBM Plex Mono',monospace;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top">
  <div class="brand">
    <div class="bico">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L21 7V17L12 22L3 17V7L12 2Z" stroke="#00e5ff" stroke-width="1.5"/>

</div>

<!-- REC BAR -->

</div>

<!-- NOISE / CONF -->

</div>

<script>
var G = (function(){
'use strict';

/* ════════════════════════════════════════════════

function isCl(t){for(var i=0;i<CW.length;i++)if(t.indexOf(CW[i])>=0)return true;return false;}
function isOp(t){for(var i=0;i<OW.length;i++)if(t.indexOf(OW[i])>=0)return true;return false;}

/* ════════════════════════════════════════════════
   COMMAND DATABASE — priority ordered
════════════════════════════════════════════════ */
var DB = [
  /* WAKE */
  {id:0,  en:'BYD',                       ar:['BYD','بيد','هاي byd','你好小迪','小迪'],                                 zh:'你好，小迪',     py:'nǐ hǎo xiǎo dí',     cat:'WAKE',   wk:true},

/* ═══ TTS ═══ */
function speakZH(txt){
  // Method 1: Android native bridge (APK only)
  if(And&&And.speak){try{And.speak(txt,'zh-CN',1.0,0.88);setT('APK');return;}catch(e){}}
  // Method 2: Web Speech API — clean, no fallback noise
  if(window.speechSynthesis){
    window.speechSynthesis.cancel();
    var doSpeak=function(){
      var vs=window.speechSynthesis.getVoices(),zh=null;
      for(var i=0;i<vs.length;i++){if(vs[i].lang&&vs[i].lang.indexOf('zh')===0){zh=vs[i];break;}}
      var u=new SpeechSynthesisUtterance(txt);
      u.lang='zh-CN';u.rate=0.85;u.pitch=1.0;u.volume=1.0;
      if(zh)u.voice=zh;
      u.onstart=function(){setT('SYN');};
      u.onerror=function(e){
        // Only try Google if NOT a network/not-allowed error (those cause noise)
        if(e.error!=='network'&&e.error!=='not-allowed')gTTS(txt);
        else setT('—');
      };
      window.speechSynthesis.speak(u);
    };
    if(window.speechSynthesis.getVoices().length>0){doSpeak();}
    else{window.speechSynthesis.onvoiceschanged=function(){doSpeak();};setTimeout(doSpeak,400);}
    return;
  }
  gTTS(txt);
}
function gTTS(txt){
  if(!navigator.onLine){setT('—');return;}
  try{
    var a=new Audio();
    a.volume=1;
    a.oncanplay=function(){a.play();setT('GTT');};
    a.onerror=function(){setT('—');};
    // Set src after binding events to prevent premature error
    a.src='https://translate.google.com/translate_tts?ie=UTF-8&q='+encodeURIComponent(txt)+'&tl=zh-CN&client=tw-ob';
    a.load();
    setTimeout(function(){if(a.paused&&a.readyState===0)setT('—');},3000);
  }catch(e){setT('—');}
}
function speakAR(txt){
  if(And&&And.speak){try{And.speak(txt,'ar-EG',1.0,0.92);return;}catch(e){}}
  if(window.speechSynthesis){
    var uAR=new SpeechSynthesisUtterance(txt);
    uAR.lang='ar-EG';uAR.rate=0.95;uAR.volume=1.0;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(uAR);
  }
}
function setT(m){var p=document.getElementById('ttsPill');p.textContent='TTS:'+m;p.className=(m==='APK'||m==='SYN'||m==='GTT')?'pi ok':'pi mu';}

/* ═══ MICROPHONE — auto-start, no button needed ═══ */
function startMic(){
  navigator.mediaDevices.getUserMedia({
    audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}
  }).then(function(s){
    ms=s; micOk=true;
    localStorage.setItem(MK,'1');
    document.getElementById('micPill').textContent='MIC✓';
    document.getElementById('micPill').className='pi ok';
    try{
      ac=new(window.AudioContext||window.webkitAudioContext)();
      an=ac.createAnalyser(); an.fftSize=256;
      ac.createMediaStreamSource(s).connect(an);
      liveN();
    }catch(e){idleN();}
    wake(); // Start listening immediately, no button needed
  }).catch(function(){
    document.getElementById('micPill').textContent='TAP🎤';
    document.getElementById('micPill').className='pi wa';
    document.getElementById('wkt').textContent='اضغط المايك للبدء · Tap mic to start';
  });
}

function tapMic(){

/* ═══ NOISE ═══ */
function idleN(){
  clearInterval(noiseT);
  noiseT=setInterval(function(){
    document.getElementById('ndb').textContent=Math.floor(Math.random()*5+2)+'dB';
    for(var i=0;i<16;i++){var h=Math.random()*2+1;var b=document.getElementById('N'+i);b.style.height=Math.round(h)+'px';b.className='nb';}
  },900);
}
function liveN(){
  if(!an)return; clearInterval(noiseT);
  var d=new Uint8Array(an.frequencyBinCount);
  noiseT=setInterval(function(){
    an.getByteFrequencyData(d);
    var avg=0;for(var i=0;i<50;i++)avg+=d[i];avg/=50;
    var db=Math.max(0,Math.round(20*Math.log(Math.max(avg,1)/255)/Math.LN10+90));
    document.getElementById('ndb').textContent=db+'dB';
    for(var j=0;j<16;j++){var h=Math.min(10,(d[j*2]||0)/22+1);var b=document.getElementById('N'+j);b.style.height=Math.round(h)+'px';b.className='nb'+(h>5?' lit':'');}
  },120);
}

/* ═══ WAKE WORD ═══ */
function isWake(t){
  var s=t.toLowerCase().trim();
  var sn=s.replace(/[\s\u200c\u200d]/g,'');
  // Primary: BYD (Arabic + English)
  if(sn.indexOf('byd')>=0||sn.indexOf('byad')>=0)return true;
  if(s.indexOf('byd')>=0||s.indexOf('b y d')>=0)return true;
  if(s.indexOf('بيد')>=0||s.indexOf('باي دي')>=0||s.indexOf('بي واي دي')>=0)return true;
  if(s.indexOf('هاي')>=0)return true;
  // Secondary: Chinese
  if(s.indexOf('小迪')>=0||s.indexOf('你好小迪')>=0)return true;
  if(sn.indexOf('xiaodi')>=0||sn.indexOf('nihaoxiaodi')>=0)return true;
  return false;
}

function setWK(st){
  var ws=document.getElementById('wks'),wt=document.getElementById('wkt'),wd=document.getElementById('wkd'),bs=document.getElementById('bst');
  ws.className='wkstrip'+(st==='go'?' go':'');
  if(st==='armed'){wt.textContent='BYD · ARMED · يستمع';wd.style.background='var(--ok)';bs.textContent='ARMED';}
  if(st==='go'){wt.textContent='تفضل · 请说话 · SPEAK NOW';wd.style.background='var(--c)';bs.textContent='GO';}
  if(st==='done'){wt.textContent='DONE ✓ · تم';wd.style.background='var(--ok)';bs.textContent='DONE';}
}

function wake(){
  if(!micOk||wkRun)return;
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){setWK('armed');return;}
  wkRun=true;

  var cycle=0;

  function loop(){
    if(busy){wkRun=false;return;}
    var r=new SR();
    // Cycle ar-EG / zh-CN: ar-EG catches Arabic+English, zh-CN catches 你好小迪
    var wkLangs=['ar-EG','zh-CN'];
    r.lang=wkLangs[cycle%2]; cycle++;
    r.interimResults=true;  // Fire on partial results = faster response
    r.continuous=false;
    r.maxAlternatives=3;
    var fired=false;

    r.onresult=function(e){
      if(fired)return;
      // Check ALL results including interim
      for(var i=0;i<e.results.length;i++){
        for(var j=0;j<e.results[i].length;j++){
          var tr=e.results[i][j].transcript||'';
          // Wake word check
          if(isWake(tr)){
            fired=true;
            try{r.abort();}catch(x){}
            setWK('go');
            // Speak "تفضل" then wait for command
            // Speak Chinese greeting (stays as-is for BYD)
            speakZH('你好，小迪');
            wkRun=false;
            setTimeout(startLis,1200); // Wait for Chinese TTS to finish
            return;
          }
        }
      }
      // Direct command detection (only on FINAL results with high confidence)
      for(var fi=0;fi<e.results.length;fi++){
        if(e.results[fi].isFinal&&!fired){
          var ft=e.results[fi][0].transcript||'';
          var cf=e.results[fi][0].confidence||0;
          if(casual(ft.toLowerCase()))return;
          if(cf>0.70){
            var m=matchCmd(ft);
            if(m&&m.id!==0){
              fired=true;
              try{r.abort();}catch(x){}
              exec(m);
              return;
            }
          }
        }
      }
    };

    r.onend=function(){
      if(!busy&&wkRun&&!fired){
        setWK('armed');
        setTimeout(loop,30); // minimal gap = max coverage
      }
    };

    r.onerror=function(ev){
      var soft=['no-speech','aborted','network'];
      var s=false;
      for(var i=0;i<soft.length;i++)if(soft[i]===ev.error){s=true;break;}
      if(!s)console.warn('WK:',ev.error);
      if(!busy&&wkRun&&!fired)setTimeout(loop,s?30:200);
    };

    try{setWK('armed');r.start();}
    catch(e){setTimeout(loop,300);}
  }

  loop();
}

/* ═══ LISTEN ═══ */
function startLis(){
  if(busy)return;
  wkRun=false;
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){disp('غير مدعوم','اضغط الأوامر يدوياً','—','',0);return;}
  var lm={ar:'ar-EG',en:'en-US',both:'ar-EG'};
  var r=new SR();
  r.lang=lm[lang]||'ar-EG';
  r.interimResults=true; r.continuous=false; r.maxAlternatives=5;

  r.onstart=function(){
    busy=true;
    document.getElementById('mo').classList.add('act');
    document.getElementById('hb').classList.add('lst');
    document.getElementById('rb').classList.add('on');
    sMC('#00e5ff'); sFQ(true);
    disp('LISTENING · بسمعك','...','','',0); setWK('go');
    var s=0; clearInterval(recT);
    recT=setInterval(function(){s++;var m=Math.floor(s/60),sc=s%60;document.getElementById('rtm').textContent=m+':'+(sc<10?'0':'')+sc;},1000);
  };

  r.onresult=function(e){
    var tr='';
    for(var i=0;i<e.results.length;i++)tr+=e.results[i][0].transcript;
    var cf=e.results[e.results.length-1][0].confidence||0.55;
    var pct=Math.round(cf*100);
    document.getElementById('srout').textContent=tr;
    document.getElementById('cf').style.width=pct+'%';
    document.getElementById('cp').textContent=pct+'%';
    if(casual(tr.toLowerCase())){stopLis();return;}
    if(pct>=40){var m=matchCmd(tr);if(m){stopLis();exec(m);}}
  };

  r.onerror=function(){stopLis();};
  r.onend=function(){stopLis();};
  window._r=r;
  try{r.start();}catch(e){stopLis();}
}

function stopLis(){
  busy=false; wkRun=false;
  if(window._r){try{window._r.abort();}catch(e){}try{window._r.stop();}catch(e){}window._r=null;}
  clearInterval(recT);
  document.getElementById('rb').classList.remove('on');
  document.getElementById('mo').classList.remove('act');
  document.getElementById('hb').classList.remove('lst');
  sMC('#4a7090'); sFQ(false);
  if(document.getElementById('stag').textContent.indexOf('LISTEN')>=0)
    disp('READY · جاهز','你好，小迪','nǐ hǎo xiǎo dí','قول BYD · Say BYD',0);
  if(micOk&&!wkRun){setTimeout(wake,250);}
}

/* ═══ MATCH ═══ */
function matchCmd(txt){
  var t=txt.trim(), tl=t.toLowerCase();
  var ci=isCl(tl), oi=isOp(tl);
  // Sort EX keys longest-first for specificity
  var ks=Object.keys(EX).sort(function(a,b){return b.length-a.length;});
  for(var k=0;k<ks.length;k++){
    if(tl.indexOf(ks[k])>=0){
      var tid=EX[ks[k]];
      if(ci&&OIDS[tid])continue;  // close intent, skip open cmd
      if(oi&&!ci&&CIDS[tid])continue; // open intent, skip close cmd
      for(var x=0;x<DB.length;x++)if(DB[x].id===tid)return DB[x];
    }
  }
  // Fuzzy fallback
  var best=null, bs=0;
  for(var ci2=0;ci2<DB.length;ci2++){
    var cmd=DB[ci2];
    if(ci&&OIDS[cmd.id])continue;
    if(oi&&!ci&&CIDS[cmd.id])continue;
    var phs=[cmd.en.toLowerCase()];
    if(cmd.ar)for(var ai=0;ai<cmd.ar.length;ai++)phs.push(cmd.ar[ai]);
    for(var pi=0;pi<phs.length;pi++){
      var ph=phs[pi].toLowerCase();
      if(tl===ph){if(1>bs){bs=1;best=cmd;}continue;}
      if(tl.indexOf(ph)>=0||ph.indexOf(tl)>=0){if(0.93>bs){bs=0.93;best=cmd;}continue;}
      var pw=ph.split(/\s+/), tw=tl.split(/\s+/), hits=0;
      for(var wi=0;wi<pw.length;wi++)
        for(var ti=0;ti<tw.length;ti++)
          if(pw[wi].length>1&&tw[ti].length>1&&(pw[wi]===tw[ti]||pw[wi].indexOf(tw[ti])>=0||tw[ti].indexOf(pw[wi])>=0))hits++;
      var sc=(hits/Math.max(pw.length,1))*(ph.length/(ph.length+5));
      if(sc>bs){bs=sc;best=cmd;}
    }
  }
  return bs>0.25?best:null;
}

/* ═══ EXECUTE ═══ */
function exec(cmd){
  lastId=cmd.id;
  var lb=(lang!=='en'&&cmd.ar&&cmd.ar.length)?cmd.ar[0]:cmd.en;
  disp('EXECUTING · تنفيذ',lb,cmd.zh,cmd.py,98);
  document.getElementById('hb').classList.add('ok2');
  document.getElementById('ptitle').textContent='EXECUTING · تنفيذ';
  rndr(); speakZH(cmd.zh); toast(cmd.zh+'  ·  '+lb);
  setTimeout(function(){
    document.getElementById('hb').classList.remove('ok2');
    setWK('done');
    document.getElementById('ptitle').textContent='DONE ✓ · تم';
    // Restart wake listening after command completes
    if(micOk&&!wkRun&&!busy){wkRun=false;setTimeout(wake,150);}
    setTimeout(function(){
      document.getElementById('ptitle').textContent='WAITING · في انتظار الأمر';
    },2500);
  },1600);
}

/* ═══ CASUAL ═══ */
function casual(t){
  for(var gi=0;gi<CASUAL.length;gi++){
    var g=CASUAL[gi];
    for(var ti=0;ti<g.t.length;ti++){
      if(t.indexOf(g.t[ti])>=0){disp('CHAT · دردشة',g.r,'😊','',0);toast(g.r);return true;}
    }
  }
  return false;
}

/* ═══ UI HELPERS ═══ */
function disp(tag,src,zh,py,cf){
  document.getElementById('stag').textContent=tag;
  document.getElementById('srout').textContent=src;
  document.getElementById('zhout').textContent=zh||'你好，小迪';
  document.getElementById('pyout').textContent=py||'';
  document.getElementById('cf').style.width=cf+'%';
  document.getElementById('cp').textContent=cf?cf+'%':'—';
}
function sMC(c){var ids=['mb','ma','ml','mb2','f1','f2','f3'];for(var i=0;i<ids.length;i++){var e=document.getElementById(ids[i]);if(e)e.setAttribute('stroke',c);}}
function sFQ(on){var b=['f1','f2','f3'],y=['7','4','8'];for(var i=0;i<b.length;i++){var e=document.getElementById(b[i]);if(!e)continue;e.setAttribute('y2',on?y[i]:'10');e.setAttribute('opacity',on?'1':'0.4');}}
function toast(msg){clearTimeout(tstT);var t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');tstT=setTimeout(function(){t.classList.remove('on');},3500);}

function setLang(l){
  lang=l;
  var ids=['lAr','lEn','lBo'],vs=['ar','en','both'];
  for(var i=0;i<ids.length;i++)document.getElementById(ids[i]).className='lb'+(l===vs[i]?' on':'');
  rndr();
}
function bldCats(){
  var el=document.getElementById('cats'); el.innerHTML='';
  for(var i=0;i<CATS.length;i++){
    var c=CATS[i],b=document.createElement('button');
    b.className='catbtn'+(c===activeCat?' on':''); b.textContent=c;
    (function(cc){b.onclick=function(){activeCat=cc;bldCats();rndr();};})(c);
    el.appendChild(b);
  }
}
function rndr(){
  var q=(document.getElementById('srch').value||'').toLowerCase();
  var ls=[];
  for(var i=0;i<DB.length;i++){
    var c=DB[i];
    var mc=activeCat==='ALL'||c.cat===activeCat;
    var mq=!q||c.en.toLowerCase().indexOf(q)>=0||c.zh.indexOf(q)>=0||(c.ar&&c.ar.join(' ').indexOf(q)>=0);
    if(mc&&mq)ls.push(c);
  }
  document.getElementById('cnt').textContent=ls.length;
  var el=document.getElementById('cmdlist'); el.innerHTML='';
  for(var j=0;j<ls.length;j++){
    var cmd=ls[j],d=document.createElement('div');
    d.className='cmd'+(cmd.wk?' wkc':cmd.sp?' spc':'')+(lastId===cmd.id?' done':'');
    var ar=(lang!=='en'&&cmd.ar&&cmd.ar.length)?'<div class="ar">'+cmd.ar[0]+'</div>':'';
    var en=(lang!=='ar')?'<div class="en">'+cmd.en+'</div>':'';
    d.innerHTML='<div class="cmdinfo">'+ar+en+'<div class="ccat">'+cmd.cat+'</div></div><div class="czh">'+cmd.zh+'</div>';
    (function(c){d.onclick=function(){exec(c);};})(cmd);
    el.appendChild(d);
  }
}

/* ═══ START ═══ */
init();
return {setLang:setLang, tapMic:tapMic, render:rndr};
})();
</script>
