<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#060a10">
<title>BYD Voice Bridge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+SC:wght@700&family=Noto+Sans+Arabic:wght@400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --c:#00e5ff;--c2:#007a99;--cg:rgba(0,229,255,0.11);
  --bg:#06090f;--bg2:#0a1520;--bg3:#0d1c2b;
  --t:#cce6ff;--m:#3d6070;--b:rgba(0,229,255,0.14);
  --ok:#00e07a;--err:#ff3355;--warn:#ffaa00;
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Share Tech Mono',monospace;color:var(--t);display:flex;flex-direction:column;font-size:13px;}

/* ── TOP BAR ── */
.top{background:var(--bg2);border-bottom:1px solid var(--b);padding:7px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.brand{display:flex;align-items:center;gap:8px;}
.bico{width:26px;height:26px;border:1.5px solid var(--c);border-radius:6px;display:flex;align-items:center;justify-content:center;background:var(--cg);}
.btitle{color:var(--c);font-size:11px;letter-spacing:2px;font-weight:bold;line-height:1.1;}
.bsub{color:var(--m);font-size:7px;letter-spacing:1.5px;}
.topright{display:flex;gap:5px;align-items:center;}
.pi{font-size:7px;padding:2px 6px;border-radius:3px;border:1px solid;letter-spacing:.5px;}
.pi.ok{border-color:var(--ok);color:var(--ok);}
.pi.cy{border-color:var(--c);color:var(--c);}
.pi.mu{border-color:var(--m);color:var(--m);}
.pi.no{border-color:var(--err);color:var(--err);}
.pi.warn{border-color:var(--warn);color:var(--warn);}

/* ── LANG TOGGLE ── */
.langbar{display:flex;border-bottom:1px solid var(--b);flex-shrink:0;background:var(--bg2);}
.lbtn{flex:1;padding:5px 0;border:none;background:transparent;color:var(--m);font-size:10px;font-family:'Share Tech Mono',monospace;cursor:pointer;letter-spacing:1px;border-bottom:2px solid transparent;transition:all .2s;}
.lbtn.on{color:var(--c);border-bottom-color:var(--c);background:var(--cg);}

/* ── MIC ZONE ── */
.mzone{background:var(--bg2);border-bottom:1px solid var(--b);padding:9px 12px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.mouter{position:relative;width:66px;height:66px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.ring{position:absolute;border-radius:50%;border:1.5px solid transparent;opacity:0;transition:opacity .35s;}
.ring.r1{inset:0;border-top-color:var(--c);border-right-color:var(--c);animation:sp1 2s linear infinite;}
.ring.r2{inset:10%;border-left-color:var(--c2);border-bottom-color:var(--c2);animation:sp2 1.5s linear infinite reverse;}
.mouter.act .ring{opacity:1;}
@keyframes sp1{to{transform:rotate(360deg);}}
@keyframes sp2{to{transform:rotate(360deg);}}
.pdot{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--c);opacity:0;}
.mouter.act .pdot{animation:pd 1.5s ease-in-out infinite;}
.pdot:nth-child(3){top:0;left:calc(50% - 2px);}
.pdot:nth-child(4){right:0;top:calc(50% - 2px);animation-delay:.37s;}
.pdot:nth-child(5){bottom:0;left:calc(50% - 2px);animation-delay:.75s;}
.pdot:nth-child(6){left:0;top:calc(50% - 2px);animation-delay:1.12s;}
@keyframes pd{0%,100%{opacity:0;transform:scale(.3);}50%{opacity:1;transform:scale(1);}}
.hexbtn{width:50px;height:50px;clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;z-index:2;transition:transform .12s;}
.hexin{width:40px;height:40px;clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);background:var(--bg3);display:flex;align-items:center;justify-content:center;border:1.5px solid var(--c2);transition:all .2s;}
.hexbtn.lst .hexin{border-color:var(--c);}
.hexbtn.ok2 .hexin{border-color:var(--ok);}
.hexbtn.er  .hexin{border-color:var(--err);}
.hexbtn:active{transform:scale(.9);}
.minfo{flex:1;min-width:0;}
.stag{font-size:7px;letter-spacing:1.5px;color:var(--m);margin-bottom:2px;}
.zhbig{font-family:'Noto Sans SC',sans-serif;font-size:20px;font-weight:700;color:var(--c);line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pybig{font-size:8px;color:var(--m);margin:2px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.srbig{font-family:'Noto Sans Arabic',sans-serif;font-size:11px;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── WAKE STRIP ── */
.wkstrip{display:flex;align-items:center;gap:6px;padding:4px 12px;background:rgba(0,224,122,.06);border-bottom:1px solid rgba(0,224,122,.12);flex-shrink:0;transition:all .3s;}
.wkstrip.go{background:var(--cg);border-bottom-color:var(--b);}
.wkstrip.go .wkdot{background:var(--c);}
.wkstrip.go .wktxt{color:var(--c);}
.wkdot{width:5px;height:5px;border-radius:50%;background:var(--ok);animation:wkp 2s ease-in-out infinite;flex-shrink:0;}
@keyframes wkp{0%,100%{opacity:1;}50%{opacity:.2;}}
.wktxt{font-size:8px;color:var(--ok);letter-spacing:.5px;}

/* ── REC ── */
.recbar{display:none;align-items:center;gap:5px;padding:3px 12px;background:rgba(255,51,85,.06);border-bottom:1px solid rgba(255,51,85,.12);flex-shrink:0;}
.recbar.show{display:flex;}
.rdot{width:5px;height:5px;border-radius:50%;background:var(--err);animation:bk 1s infinite;}
@keyframes bk{0%,100%{opacity:1;}50%{opacity:.1;}}
.rtxt{font-size:8px;color:var(--err);letter-spacing:2px;}
.rtime{font-size:8px;color:var(--err);}

/* ── NOISE + CONF ── */
.nstrip{display:flex;align-items:center;gap:7px;padding:3px 12px;background:var(--bg3);flex-shrink:0;}
.nlbl{font-size:7px;color:var(--m);width:28px;}
.nbars{display:flex;gap:2px;align-items:flex-end;height:10px;flex:1;}
.nb{width:3px;border-radius:1px;background:var(--bg2);transition:height .08s;}
.nb.lit{background:var(--c);}
.nval{font-size:7px;color:var(--c);width:28px;text-align:right;}
.cstrip{display:flex;align-items:center;gap:7px;padding:2px 12px;flex-shrink:0;}
.clbl{font-size:7px;color:var(--m);width:28px;}
.ctrk{flex:1;height:2px;background:var(--bg3);border-radius:1px;overflow:hidden;}
.cfil{height:100%;background:var(--c);border-radius:1px;width:0%;transition:width .25s;}
.cpct{font-size:7px;color:var(--c);width:24px;text-align:right;}

/* ── COMMANDS PANEL ── */
.cmpanel{flex:1;display:flex;flex-direction:column;overflow:hidden;border-top:1px solid var(--b);}
.cmhead{display:flex;align-items:center;justify-content:space-between;padding:5px 12px 2px;flex-shrink:0;}
.cmtitle{font-size:7px;letter-spacing:2px;color:var(--m);}
.cmcnt{font-size:7px;color:var(--c);}
.cats{display:flex;gap:4px;padding:3px 12px;overflow-x:auto;flex-shrink:0;}
.cats::-webkit-scrollbar{display:none;}
.catbtn{font-size:9px;padding:3px 9px;border-radius:3px;border:1px solid var(--b);background:transparent;color:var(--m);cursor:pointer;white-space:nowrap;font-family:'Share Tech Mono',monospace;letter-spacing:.3px;}
.catbtn.on{border-color:var(--c);color:var(--c);background:var(--cg);}
.srch{margin:3px 12px;background:var(--bg3);border:1px solid var(--b);border-radius:5px;padding:5px 9px;color:var(--t);font-size:11px;font-family:'Share Tech Mono',monospace;outline:none;display:block;width:calc(100% - 24px);}
.srch::placeholder{color:var(--m);}
.srch:focus{border-color:var(--c);}
.cmdlist{flex:1;overflow-y:auto;padding:3px 12px 8px;}
.cmdlist::-webkit-scrollbar{width:2px;}
.cmdlist::-webkit-scrollbar-thumb{background:var(--b);border-radius:1px;}
.cmd{display:flex;align-items:center;gap:9px;padding:7px 9px;margin-bottom:3px;background:var(--bg2);border:1px solid var(--b);border-radius:7px;cursor:pointer;transition:border-color .12s,background .12s;}
.cmd:active,.cmd:hover{border-color:var(--c);background:var(--cg);}
.cmd.done{border-color:var(--ok);}
.cmd.wk{border-color:rgba(0,229,255,.3);background:var(--cg);}
.cmd.sp{border-color:rgba(255,170,0,.15);}
.cmdl{flex:1;min-width:0;}
.cen{font-size:11px;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:bold;}
.car{font-family:'Noto Sans Arabic',sans-serif;font-size:10px;color:var(--m);direction:rtl;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ccat{font-size:6px;color:var(--m);letter-spacing:1px;opacity:.6;margin-top:1px;}
.czh{font-family:'Noto Sans SC',sans-serif;font-size:21px;color:var(--c);flex-shrink:0;min-width:52px;text-align:right;line-height:1;}

/* ── TTS STATUS TOAST ── */
#toast{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(6px);
  background:var(--bg2);border:1px solid var(--c);border-radius:8px;
  padding:5px 14px;font-size:10px;color:var(--c);letter-spacing:.5px;
  opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.bot{display:flex;align-items:center;justify-content:space-between;padding:3px 12px;border-top:1px solid var(--b);background:var(--bg2);font-size:7px;color:var(--m);letter-spacing:1px;flex-shrink:0;}
</style>
</head>
<body>

<!-- TOP -->
<div class="top">
  <div class="brand">

</div>

<!-- WAKE STRIP -->

</div>

<script>
'use strict';

// ════════════════════════════════════════════════════
//  TTS ENGINE  — مرحباً 小迪 voice output
//  4-tier approach for maximum Android WebView compat
// ════════════════════════════════════════════════════
const And = window.Android || null;
let ttsMethod = '—';   // tracked for status pill

// Tier 1: Android APK bridge
function ttsAndroid(text) {
  if (!And || !And.speak) return false;
  try { And.speak(text, 'zh-CN', 1.0, 0.88); return true; } catch(e) { return false; }
}

// Tier 2: speechSynthesis — with voice-load wait & watchdog
function ttsSpeech(text, onFail) {
  if (!window.speechSynthesis) { onFail(); return; }
  const attempt = () => {
    const voices = window.speechSynthesis.getVoices();
    const zh = voices.find(v => v.lang && v.lang.startsWith('zh'));
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN'; u.rate = 0.88; u.pitch = 1.0; u.volume = 1.0;
    if (zh) u.voice = zh;
    let fired = false;
    u.onstart = () => { fired = true; setTTS('SYN'); };
    u.onend   = () => {};
    u.onerror = () => { if (!fired) onFail(); };
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
    // Watchdog — DLink sometimes fires no events
    setTimeout(() => {
      if (!fired && !window.speechSynthesis.speaking) onFail();
    }, 900);
  };
  if (window.speechSynthesis.getVoices().length > 0) { attempt(); }
  else { window.speechSynthesis.onvoiceschanged = attempt; setTimeout(attempt, 250); }
}

// Tier 3: Google TTS audio element (works in Chrome-based WebView with internet)
function ttsGoogle(text, onFail) {
  try {
    const a = new Audio('https://translate.google.com/translate_tts?ie=UTF-8&q='
      + encodeURIComponent(text) + '&tl=zh-CN&client=tw-ob');
    a.volume = 1.0;
    a.oncanplay = () => { a.play(); setTTS('GTT'); };
    a.onerror   = onFail;
    a.load();
    setTimeout(() => { if (a.paused) onFail(); }, 1500);
  } catch(e) { onFail(); }
}

// Tier 4: Tone confirmation only
function ttsTone(success) {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const now = ac.currentTime;
    (success ? [523, 659, 784] : [440]).forEach((f, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.frequency.value = f; o.type = 'sine';
      const s = now + i * 0.11;
      g.gain.setValueAtTime(0.28, s);
      g.gain.exponentialRampToValueAtTime(0.001, s + 0.15);
      o.start(s); o.stop(s + 0.16);
    });
    setTTS('BIP');
  } catch(e) {}
}

// Main speak — cascade
function speakZH(text) {
  if (ttsAndroid(text)) { setTTS('APK'); return; }
  ttsSpeech(text, () => {
    ttsGoogle(text, () => ttsTone(true));
  });
}

function speakAR(text) {
  if (window.speechSynthesis) {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ar-EG'; u.rate = 0.92; u.volume = 1.0;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  }
}

function setTTS(m) {
  ttsMethod = m;
  const p = document.getElementById('ttsPill');
  p.textContent = 'TTS:' + m;
  p.className = m === 'BIP' ? 'pi warn' : 'pi ok';
}

// ════════════════════════════════════════════════════
//  COMMAND DATABASE
// ════════════════════════════════════════════════════
const DB = [
  // WAKE
  {id:0, en:'Wake up / مرحباً 小迪', ar:['مرحبا شياودي','هاي شياودي','بيد','شياو دي'], zh:'你好，小迪我在', py:'nǐ hǎo, xiǎo dí wǒ zài', cat:'WAKE', wk:true},

  // CLIMATE
  {id:1,  en:'Turn on AC',           ar:['شغل التكييف','اشغل المكيف'],       zh:'开空调',         py:'kāi kōngtiáo',            cat:'CLIMATE'},
  {id:2,  en:'Turn off AC',          ar:['اوقف التكييف','اقفل المكيف'],       zh:'关空调',         py:'guān kōngtiáo',           cat:'CLIMATE'},
  {id:3,  en:'Increase temperature', ar:['ارفع الحرارة','زود الحرارة'],       zh:'升高温度',       py:'shēng gāo wēndù',         cat:'CLIMATE'},
  {id:4,  en:'Decrease temperature', ar:['خفض الحرارة','برد شوية'],           zh:'降低温度',       py:'jiàng dī wēndù',          cat:'CLIMATE'},
  {id:5,  en:'Temperature 16',       ar:['ستاشر درجة','١٦ درجة'],             zh:'温度调到16度',   py:'wēndù tiáo dào shíliù dù',cat:'CLIMATE'},
  {id:6,  en:'Temperature 18',       ar:['تمناشر درجة','١٨ درجة'],            zh:'温度调到18度',   py:'wēndù tiáo dào shíbā dù', cat:'CLIMATE'},
  {id:7,  en:'Temperature 20',       ar:['عشرين درجة','اعمل عشرين'],          zh:'温度调到20度',   py:'wēndù tiáo dào èrshí dù', cat:'CLIMATE'},
  {id:8,  en:'Temperature 22',       ar:['اتنين وعشرين','٢٢ درجة'],           zh:'温度调到22度',   py:'wēndù tiáo dào èrshí èr', cat:'CLIMATE'},
  {id:9,  en:'Temperature 24',       ar:['اربعة وعشرين','٢٤ درجة'],           zh:'温度调到24度',   py:'wēndù tiáo dào èrshí sì', cat:'CLIMATE'},
  {id:10, en:'Max cooling',          ar:['برودة قصوى','ابرد اوي'],             zh:'最大制冷',       py:'zuìdà zhìlěng',           cat:'CLIMATE'},
  {id:11, en:'Auto climate',         ar:['اوتو تكييف','تكييف اوتوماتيك'],     zh:'自动空调',       py:'zìdòng kōngtiáo',         cat:'CLIMATE'},
  {id:39, en:'Fan speed up',         ar:['زود الفان','زود التهوية'],           zh:'增加风速',       py:'zēngjiā fēng sù',         cat:'CLIMATE'},
  {id:40, en:'Fan speed down',       ar:['قلل الفان','قلل التهوية'],           zh:'降低风速',       py:'jiàng dī fēng sù',        cat:'CLIMATE'},

  // WINDOWS
  {id:12, en:'Open all windows',     ar:['افتح كل الشبابيك','النوافذ كلها'],  zh:'打开所有车窗',   py:'dǎkāi suǒyǒu chēchuāng',  cat:'WINDOWS'},
  {id:13, en:'Close all windows',    ar:['اقفل كل الشبابيك','اقفل النوافذ'],  zh:'关闭车窗',       py:'guānbì chēchuāng',        cat:'WINDOWS'},

const CASUAL = [
  {t:['ازيك','عامل ايه','اخبارك','عاملة ايه'], r:'أنا كويسة زي الفل!'},
  {t:['صباح الخير','صبح'],                      r:'صباح النور يا فندم!'},

];

let listening = false, micOk = false, wakeRunning = false;
let recT = null, noiseT = null, toastT = null;
let aCtx = null, analyser = null, mStream = null;
const MIC_KEY = 'byd6_mic';

// ════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════
(function init() {
  // noise bars
  const nb = document.getElementById('nb');
  for (let i = 0; i < 16; i++) {
    const b = document.createElement('div');
    b.className = 'nb'; b.id = 'B' + i; b.style.height = '2px';
    nb.appendChild(b);
  }
  buildCats(); render();
  checkNet();
  window.addEventListener('online', checkNet);
  window.addEventListener('offline', checkNet);
  idleNoise();
  autoMic();
})();

function checkNet() {
  const p = document.getElementById('netPill');
  p.textContent = navigator.onLine ? 'NET' : 'OFF';
  p.className   = navigator.onLine ? 'pi ok' : 'pi mu';
}

// ════════════════════════════════════════════════════
//  MIC — persistent grant
// ════════════════════════════════════════════════════
async function autoMic() {
  // If previously granted, try silently
  if (localStorage.getItem(MIC_KEY) === '1' || And) {
    await grantMic(true);
    return;
  }
  // Check permissions API
  if (navigator.permissions) {
    try {
      const s = await navigator.permissions.query({name:'microphone'});
      if (s.state === 'granted') { await grantMic(true); return; }
      s.onchange = async () => { if (s.state === 'granted') await grantMic(true); };
    } catch(e) {}
  }
  document.getElementById('micPill').textContent = 'TAP';
  document.getElementById('micPill').className = 'pi warn';
}

async function grantMic(silent) {
  try {
    mStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
    });
    micOk = true;
    localStorage.setItem(MIC_KEY, '1');
    document.getElementById('micPill').textContent = 'MIC✓';
    document.getElementById('micPill').className = 'pi ok';
    try {
      aCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = aCtx.createAnalyser(); analyser.fftSize = 256;
      aCtx.createMediaStreamSource(mStream).connect(analyser);
      liveNoise();
    } catch(e) {}
    startWake();
  } catch(e) {
    localStorage.removeItem(MIC_KEY);
    document.getElementById('micPill').textContent = 'MIC✗';
    document.getElementById('micPill').className = 'pi no';
    showToast('اضغط المايك للسماح بالوصول');
  }
}

function tapMic() {
  if (!micOk) { grantMic(false); return; }
  if (listening) { stopListen(); return; }
  startListen();
}

// ════════════════════════════════════════════════════
//  NOISE METERS
// ════════════════════════════════════════════════════
function idleNoise() {
  clearInterval(noiseT);
  noiseT = setInterval(() => {
    document.getElementById('ndb').textContent = Math.floor(Math.random() * 5 + 2) + 'dB';
    for (let i = 0; i < 16; i++) {
      const h = Math.random() * 2 + 1;
      const b = document.getElementById('B' + i);
      b.style.height = Math.round(h) + 'px'; b.className = 'nb';
    }
  }, 900);
}
function liveNoise() {
  if (!analyser) return;
  clearInterval(noiseT);
  const d = new Uint8Array(analyser.frequencyBinCount);
  noiseT = setInterval(() => {
    analyser.getByteFrequencyData(d);
    const avg = d.slice(0, 50).reduce((a, b) => a + b, 0) / 50;
    const db = Math.max(0, Math.round(20 * Math.log10((avg || 1) / 255) + 90));
    document.getElementById('ndb').textContent = db + 'dB';
    for (let i = 0; i < 16; i++) {
      const h = Math.min(10, (d[i * 2] || 0) / 22 + 1);
      const b = document.getElementById('B' + i);
      b.style.height = Math.round(h) + 'px';
      b.className = 'nb' + (h > 5 ? ' lit' : '');
    }
  }, 110);
}

// ════════════════════════════════════════════════════
//  WAKE WORD — مرحباً 小迪
//  Triggers: مرحبا شياودي / xiaoди / byd / بيد
//  Uses short continuous=false loop (prevents DLink crash)
// ════════════════════════════════════════════════════
function isWakeWord(t) {
  const s = t.toLowerCase();
  return s.includes('xiao') || s.includes('小迪') || s.includes('byd') ||
         s.includes('بيد')  || s.includes('شياودي') || s.includes('مرحبا') ||
         s.includes('b y d')|| s.includes('شياو');
}

function setWK(state) {
  const ws = document.getElementById('wks');
  const wt = document.getElementById('wkt');
  const wd = document.getElementById('wkd');
  const bs = document.getElementById('bst');
  ws.className = 'wkstrip' + (state === 'go' ? ' go' : '');
  if (state === 'armed')  { wt.textContent = 'مرحباً 小迪 · ARMED · يستمع'; wd.style.background='var(--ok)'; bs.textContent='ARMED'; }
  if (state === 'go')     { wt.textContent = 'تفضل · 请说话 · SPEAK NOW'; wd.style.background='var(--c)';  bs.textContent='GO'; }
  if (state === 'done')   { wt.textContent = 'DONE ✓ · تم'; wd.style.background='var(--ok)'; bs.textContent='DONE'; }
}

function startWake() {
  if (!micOk || wakeRunning) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  wakeRunning = true;

  const langMap = { ar: 'ar-EG', en: 'en-US', both: 'ar-EG' };

  let r = null;
  function loop() {
    if (listening) { wakeRunning = false; return; }
    r = new SR();
    r.lang = langMap[lang] || 'ar-EG';
    r.interimResults = false;
    r.continuous = false;   // false = no memory leak
    r.maxAlternatives = 4;

    r.onresult = (e) => {
      let handled = false;
      outer: for (let i = 0; i < e.results.length; i++) {
        for (let j = 0; j < e.results[i].length; j++) {
          const tr = e.results[i][j].transcript;
          if (isWakeWord(tr)) {
            setWK('go');
            speakAR('تفضل');
            wakeRunning = false;
            setTimeout(() => startListen(), 700);
            handled = true; break outer;
          }
          if (!handled && checkCasual(tr.toLowerCase())) { handled = true; break outer; }
          if (!handled) {
            const m = fuzzy(tr);
            if (m && m.c > 60) { execCmd(m.cmd); handled = true; break outer; }
          }
        }
      }
    };
    r.onend = () => { if (!listening) { setWK('armed'); setTimeout(loop, 250); } };
    r.onerror = (ev) => {
      const skip = ['no-speech', 'aborted', 'network'];
      if (!skip.includes(ev.error)) console.warn('WK:', ev.error);
      setTimeout(loop, 400);
    };
    try { setWK('armed'); r.start(); } catch (e) { setTimeout(loop, 800); }
  }
  loop();
}

// ════════════════════════════════════════════════════
//  MANUAL LISTEN
// ════════════════════════════════════════════════════
function startListen() {
  if (listening) return;
  wakeRunning = false;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setDisp('غير مدعوم', 'اضغط الأوامر يدوياً', '—', '', 0); return; }

  const langMap = { ar: 'ar-EG', en: 'en-US', both: 'ar-EG' };
  const r = new SR();
  r.lang = langMap[lang] || 'ar-EG';
  r.interimResults = true; r.continuous = false; r.maxAlternatives = 5;

  r.onstart = () => {
    listening = true;
    document.getElementById('mo').classList.add('act');
    document.getElementById('hb').classList.add('lst');
    document.getElementById('rb').classList.add('show');
    setMC('#00e5ff'); setFq(true);
    setDisp('LISTENING · بسمعك', '...', '', '', 0);
    setWK('go');
    let s = 0; clearInterval(recT);
    recT = setInterval(() => {
      s++; const m = Math.floor(s / 60), sec = s % 60;
      document.getElementById('rt').textContent = m + ':' + (sec < 10 ? '0' : '') + sec;
    }, 1000);
  };

  r.onresult = (e) => {
    const tr = Array.from(e.results).map(x => x[0].transcript).join(' ');
    const cf = e.results[e.results.length - 1][0].confidence || 0.55;
    const pct = Math.round(cf * 100);
    document.getElementById('srout').textContent = tr;
    document.getElementById('cf').style.width = pct + '%';
    document.getElementById('cp').textContent = pct + '%';
    if (checkCasual(tr.toLowerCase())) { stopListen(); return; }
    if (pct >= 40) {
      const m = fuzzy(tr);
      if (m && m.c > 36) { stopListen(); execCmd(m.cmd); }
    }
  };

  r.onerror = () => stopListen();
  r.onend   = () => stopListen();
  window._rec = r;
  try { r.start(); } catch (e) { stopListen(); }
}

function stopListen() {
  listening = false; wakeRunning = false;
  if (window._rec) { try { window._rec.stop(); } catch(e) {} window._rec = null; }
  clearInterval(recT);
  document.getElementById('rb').classList.remove('show');
  document.getElementById('mo').classList.remove('act');
  document.getElementById('hb').classList.remove('lst');
  setMC('#3d6070'); setFq(false);
  if (document.getElementById('stag').textContent.includes('LISTEN'))
    setDisp('READY · جاهز', 'مرحباً 小迪', 'qool xiǎo dí li-l-bida', 'قول مرحبا 小迪 أو اضغط المايك', 0);
  if (micOk) setTimeout(startWake, 350);
}

// ════════════════════════════════════════════════════
//  EXECUTE COMMAND
// ════════════════════════════════════════════════════
function execCmd(cmd) {
  lastId = cmd.id;
  const label = (lang !== 'en' && cmd.ar && cmd.ar.length) ? cmd.ar[0] : cmd.en;
  setDisp('EXECUTING · تنفيذ', label, cmd.zh, cmd.py, 97);
  document.getElementById('hb').classList.add('ok2');
  document.getElementById('cmtitle').textContent = 'EXECUTING · تنفيذ';
  render();
  speakZH(cmd.zh);
  showToast(cmd.zh + '  · ' + label);
  setTimeout(() => {
    document.getElementById('hb').classList.remove('ok2');
    setWK('done');
    document.getElementById('cmtitle').textContent = 'DONE ✓ · تم';
    setTimeout(() => document.getElementById('cmtitle').textContent = 'WAITING · في انتظار الأمر', 2500);
  }, 1600);
}

// ════════════════════════════════════════════════════
//  FUZZY MATCH — weighted
// ════════════════════════════════════════════════════
function fuzzy(text) {
  const t = text.toLowerCase().trim();
  let best = null, bs = 0;
  DB.forEach(cmd => {
    const phrases = [cmd.en.toLowerCase(), ...(cmd.ar || [])];
    phrases.forEach(ph => {
      const pl = ph.toLowerCase();
      // exact include — highest score
      if (t.includes(pl) || pl.includes(t)) { if (0.95 > bs) { bs = 0.95; best = cmd; } return; }
      // word overlap
      const pw = pl.split(/\s+/), tw = t.split(/\s+/);
      let hits = 0;
      pw.forEach(p => tw.forEach(w => { if (p.length > 1 && w.length > 1 && (p.includes(w) || w.includes(p))) hits++; }));
      const sc = hits / Math.max(pw.length, 1);
      if (sc > bs) { bs = sc; best = cmd; }
    });
  });
  return bs > 0.22 ? { cmd: best, c: Math.round(bs * 100) } : null;
}

// ════════════════════════════════════════════════════
//  CASUAL CHAT
// ════════════════════════════════════════════════════
function checkCasual(t) {
  for (const g of CASUAL) {
    if (g.t.some(x => t.includes(x))) {
      setDisp('CHAT · دردشة', g.r, '😊', '', 0);
      showToast(g.r);
      return true;
    }
  }
  return false;
}

//  UI HELPERS

function setDisp(tag, src, zh, py, conf) {
  document.getElementById('stag').textContent = tag;
  document.getElementById('srout').textContent = src;
  document.getElementById('zhout').textContent = zh || '小迪';
  document.getElementById('pyout').textContent = py || '';
  document.getElementById('cf').style.width = conf + '%';
  document.getElementById('cp').textContent = conf ? conf + '%' : '—';
}
function setMC(c) { ['mb','ma','ml','mb2','f1','f2','f3'].forEach(id => { const e = document.getElementById(id); if(e) e.setAttribute('stroke', c); }); }
function setFq(on) { ['f1','f2','f3'].forEach((id, i) => { const e = document.getElementById(id); if(!e) return; e.setAttribute('y2', on ? ['7','4','8'][i] : '10'); e.setAttribute('opacity', on ? '1' : '0.4'); }); }

function showToast(msg) {
  clearTimeout(toastT);
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  toastT = setTimeout(() => t.classList.remove('show'), 3000);
}

// ════════════════════════════════════════════════════
//  LANG
// ════════════════════════════════════════════════════
function setLang(l) {
  lang = l;
  ['lbAr','lbEn','lbBo'].forEach((id, i) => document.getElementById(id).className = 'lbtn' + (l === ['ar','en','both'][i] ? ' on' : ''));
  render();
}

// ════════════════════════════════════════════════════
//  CATS & COMMANDS
// ════════════════════════════════════════════════════
function buildCats() {
  const el = document.getElementById('cats'); el.innerHTML = '';
  CATS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'catbtn' + (c === activeCat ? ' on' : '');
    b.textContent = c;
    b.onclick = () => { activeCat = c; buildCats(); render(); };
    el.appendChild(b);
  });
}
function render() {
  const q = (document.getElementById('srch').value || '').toLowerCase();
  const list = DB.filter(c => {
    const mc = activeCat === 'ALL' || c.cat === activeCat;
    const mq = !q || c.en.toLowerCase().includes(q) || c.zh.includes(q) || (c.ar || []).join(' ').includes(q);
    return mc && mq;
  });
  document.getElementById('cnt').textContent = list.length;
  const el = document.getElementById('cmdlist'); el.innerHTML = '';
  list.forEach(c => {
    const d = document.createElement('div');
    d.className = 'cmd' + (c.wk ? ' wk' : c.sp ? ' sp' : '') + (lastId === c.id ? ' done' : '');
    const ar = (lang !== 'en' && c.ar && c.ar.length) ? c.ar[0] : '';
    const en = (lang !== 'ar') ? `<div class="cen">${c.en}</div>` : '';
    d.innerHTML = `<div class="cmdl">${en}${ar ? `<div class="car">${ar}</div>` : ''}<div class="ccat">${c.cat}</div></div><div class="czh">${c.zh}</div>`;
    d.onclick = () => execCmd(c);
    el.appendChild(d);
  });
}
