<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>BYD Voice Bridge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+SC:wght@700&family=Noto+Sans+Arabic:wght@500;700&family=Exo+2:wght@500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--c:#00e5ff;--c2:#006880;--cg:rgba(0,229,255,.11);--bg:#06090f;--bg2:#0a1520;--bg3:#0d1c2b;--t:#cce6ff;--m:#4a7090;--b:rgba(0,229,255,.15);--ok:#00e07a;--err:#ff3355;--warn:#ffaa00;--ar:#7dd8ff;--en:#a8d4e8;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Exo 2',sans-serif;color:var(--t);display:flex;flex-direction:column;}
/* TOP */
.top{background:var(--bg2);border-bottom:1px solid var(--b);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.brand{display:flex;align-items:center;gap:9px;}
.bico{width:30px;height:30px;border:1.5px solid var(--c);border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--cg);}
.bname{color:var(--c);font-size:11px;letter-spacing:2px;font-family:'IBM Plex Mono',monospace;}
.bsub{color:var(--m);font-size:7px;letter-spacing:1px;font-family:'IBM Plex Mono',monospace;}
.pills{display:flex;gap:5px;align-items:center;}
.pi{font-size:7px;padding:2px 7px;border-radius:3px;border:1px solid;letter-spacing:.5px;font-family:'IBM Plex Mono',monospace;}
.pi.ok{border-color:var(--ok);color:var(--ok);}
.pi.cy{border-color:var(--c);color:var(--c);}
.pi.mu{border-color:var(--m);color:var(--m);}
.pi.no{border-color:var(--err);color:var(--err);}
.pi.wa{border-color:var(--warn);color:var(--warn);}
/* LANG */
.langbar{display:flex;border-bottom:1px solid var(--b);flex-shrink:0;background:var(--bg2);}
.lb{flex:1;padding:5px 0;border:none;background:transparent;color:var(--m);font-size:10px;font-family:'IBM Plex Mono',monospace;cursor:pointer;letter-spacing:1px;border-bottom:2px solid transparent;transition:all .2s;touch-action:manipulation;}
.lb.on{color:var(--c);border-bottom-color:var(--c);background:var(--cg);}
/* STATUS BAR */
.statusbar{padding:6px 14px;background:var(--bg3);border-bottom:1px solid var(--b);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.statusdot{width:8px;height:8px;border-radius:50%;background:var(--ok);animation:pulse 2s ease-in-out infinite;flex-shrink:0;}
.statusdot.listening{background:var(--c);animation:pulse .8s ease-in-out infinite;}
.statusdot.speaking{background:var(--warn);animation:none;}
.statusdot.off{background:var(--m);animation:none;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.statustxt{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--ok);flex:1;}
.statustxt.listening{color:var(--c);}
.statustxt.speaking{color:var(--warn);}
.statustxt.off{color:var(--m);}
/* RESULT */
.result{padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--b);flex-shrink:0;}
.resultlabel{font-size:7px;letter-spacing:1.5px;color:var(--m);font-family:'IBM Plex Mono',monospace;margin-bottom:3px;}
.resultaudio{font-family:'Noto Sans Arabic',sans-serif;font-size:13px;color:var(--t);min-height:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.resultzh{font-family:'Noto Sans SC',sans-serif;font-size:22px;font-weight:700;color:var(--c);min-height:28px;}
.resultpy{font-size:8px;color:var(--m);font-family:'IBM Plex Mono',monospace;min-height:12px;}
/* COMMANDS */
.panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.phead{display:flex;align-items:center;justify-content:space-between;padding:5px 14px 2px;flex-shrink:0;}
.ptitle{font-size:7px;letter-spacing:2px;color:var(--m);font-family:'IBM Plex Mono',monospace;}
.pcnt{font-size:7px;color:var(--c);font-family:'IBM Plex Mono',monospace;}
.cats{display:flex;gap:4px;padding:3px 14px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;}
.cats::-webkit-scrollbar{display:none;}
.catbtn{font-size:9px;padding:3px 9px;border-radius:3px;border:1px solid var(--b);background:transparent;color:var(--m);cursor:pointer;white-space:nowrap;font-family:'IBM Plex Mono',monospace;touch-action:manipulation;}
.catbtn.on{border-color:var(--c);color:var(--c);background:var(--cg);}
.srch{margin:3px 14px;background:var(--bg3);border:1px solid var(--b);border-radius:5px;padding:6px 10px;color:var(--t);font-size:13px;font-family:'Exo 2',sans-serif;outline:none;display:block;width:calc(100% - 28px);}
.srch::placeholder{color:var(--m);}
.srch:focus{border-color:var(--c);}
.cmdlist{flex:1;min-height:0;overflow-y:auto;padding:4px 14px 16px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.cmdlist::-webkit-scrollbar{width:2px;}
.cmdlist::-webkit-scrollbar-thumb{background:var(--b);}
.cmd{display:flex;align-items:center;gap:10px;padding:10px 11px;margin-bottom:5px;background:var(--bg2);border:1px solid var(--b);border-radius:9px;cursor:pointer;user-select:none;-webkit-user-select:none;transition:border-color .1s,background .1s;touch-action:manipulation;}
.cmd:active{border-color:var(--c);background:var(--cg);}
.cmd.done{border-color:var(--ok);}
.cmd.wkc{border-color:rgba(0,229,255,.35);background:var(--cg);}
.cmd.spc{border-color:rgba(255,170,0,.2);}
.cmdinfo{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;}
.ar{font-family:'Noto Sans Arabic',sans-serif;font-size:15px;font-weight:700;color:var(--ar);direction:rtl;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.en{font-family:'Exo 2',sans-serif;font-size:12px;font-weight:600;color:var(--en);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ccat{font-size:6px;color:var(--m);letter-spacing:1px;opacity:.55;font-family:'IBM Plex Mono',monospace;}
.czh{font-family:'Noto Sans SC',sans-serif;font-size:22px;color:var(--c);flex-shrink:0;min-width:54px;text-align:left;line-height:1;}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--bg2);border:1px solid var(--c);border-radius:12px;padding:7px 18px;font-size:14px;color:var(--c);font-family:'Noto Sans Arabic',sans-serif;opacity:0;transition:all .22s;pointer-events:none;z-index:999;white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
.bot{display:flex;align-items:center;justify-content:space-between;padding:3px 14px;border-top:1px solid var(--b);background:var(--bg2);font-size:7px;color:var(--m);letter-spacing:1px;flex-shrink:0;font-family:'IBM Plex Mono',monospace;}
</style>
</head>

  {id:37, en:'Bluetooth off',    ar:['اقفل البلوتوث','وقف البلوتوث'],                               zh:'关闭蓝牙',   py:'guān bì lán yá',     cat:'SYSTEM'},

var CASUAL=[
  {t:['ازيك','عامل ايه','اخبارك'],r:'أنا كويسة زي الفل! 😊'},
  {t:['صباح الخير','صبح'],r:'صباح النور! ☀️'},
  {t:['مساء الخير','مسا'],r:'مساء الفل! 🌙'},
  {t:['شكرا','مشكور'],r:'العفو! في أمر تاني؟'}
];

var CATS=['ALL','WAKE','WINDOWS','CLIMATE','VEHICLE','LIGHTS','DRIVE','SCREEN','APPS','MEDIA','NAV','SYSTEM'];
var And=window.Android||null;
var activeCat='ALL',lastId=null,lang='ar';
var micOk=false,running=false,waiting4cmd=false;
var tstT=null,noiseT=null,aCtx=null,an=null,ms=null;
var MK='byd10_mic';

/* ════ INIT ════ */
function init(){
  bldCats();rndr();chkNet();
  window.addEventListener('online',chkNet);
  window.addEventListener('offline',chkNet);
  document.addEventListener('visibilitychange',function(){
    if(!document.hidden&&micOk&&!running)setTimeout(startLoop,300);
  });
  window.addEventListener('focus',function(){
    if(micOk&&!running)setTimeout(startLoop,300);
  });
  document.addEventListener('touchstart',function ios(){
    if(aCtx&&aCtx.state==='suspended')aCtx.resume().catch(function(){});
    document.removeEventListener('touchstart',ios);
  },{once:true,passive:true});
  startMic();
}
function chkNet(){var p=document.getElementById('netPill');p.textContent=navigator.onLine?'NET':'OFF';p.className=navigator.onLine?'pi ok':'pi mu';}

function setStatus(state,txt){
  var dot=document.getElementById('statusdot');
  var stxt=document.getElementById('statustxt');
  var bst=document.getElementById('bst');
  var btn=document.getElementById('toggleBtn');
  dot.className='statusdot '+(state==='listening'?'listening':state==='speaking'?'speaking':state==='off'?'off':'');
  stxt.className='statustxt '+(state==='listening'?'listening':state==='speaking'?'speaking':state==='off'?'off':'');
  stxt.textContent=txt;
  bst.textContent=state.toUpperCase();
  btn.textContent=running?'STOP':'START';
}

/* ════ MIC ════ */
function startMic(){
  navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}})
  .then(function(s){
    ms=s;micOk=true;
    localStorage.setItem(MK,'1');
    document.getElementById('micPill').textContent='MIC✓';
    document.getElementById('micPill').className='pi ok';
    try{
      aCtx=new(window.AudioContext||window.webkitAudioContext)();
      an=aCtx.createAnalyser();an.fftSize=256;
      aCtx.createMediaStreamSource(s).connect(an);
    }catch(e){}
    startLoop();
  }).catch(function(){
    document.getElementById('micPill').textContent='TAP🎤';
    document.getElementById('micPill').className='pi wa';
    setStatus('off','اضغط START أو المايك للبدء');
  });
}

/* ════ MAIN LOOP ════
   Strategy: ONE continuous recognition session
   - Listens non-stop using continuous:false + immediate restart
   - Detects wake word "BYD" → speak Chinese → listen for command
   - Detects command directly → execute immediately
   No two-phase wake required if command is said with high confidence
════ */
var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
var curR=null;

function startLoop(){
  if(!micOk||running)return;
  running=true;
  waiting4cmd=false;
  loop();
}

function stopLoop(){
  running=false;waiting4cmd=false;
  if(curR){try{curR.abort();}catch(e){}curR=null;}
  setStatus('off','متوقف · Stopped');
}

function toggleListen(){
  if(running)stopLoop();
  else{startLoop();}
}

function loop(){
  if(!running||!SR){return;}
  var r=new SR();
  curR=r;
  r.lang='ar-EG';
  r.continuous=false;
  r.interimResults=true;
  r.maxAlternatives=3;

  if(waiting4cmd){
    setStatus('listening','🎙️ قول الأمر · Say command...');
  } else {
    setStatus('listening','👂 يستمع · Say BYD...');
  }

  // Don't start SR if TTS is currently speaking
  if(window.speechSynthesis&&window.speechSynthesis.speaking){
    if(running)setTimeout(loop,200);return;
  }
  r.onresult=function(e){
    var interim='',final_tr='',cf=0;
    for(var i=0;i<e.results.length;i++){
      var res=e.results[i];
      if(res.isFinal){final_tr+=res[0].transcript;cf=res[0].confidence||0.5;}
      else{interim+=res[0].transcript;}
    }
    var heard=final_tr||interim;
    document.getElementById('resultaudio').textContent=heard;

    // Check wake word in any result
    if(!waiting4cmd&&isWake(heard)){
      waiting4cmd=true;
      try{r.abort();}catch(x){}
      if(curR){try{curR.abort();}catch(e){}curR=null;}
      speakZHthen('你好，小迪',function(){
        setResult('WAKE · استيقاظ','قول الأمر الآن · Say command now','你好，小迪','nǐ hǎo xiǎo dí');
        if(running)loop();
      });
      return;
    }

    // Try command match on interim (fast)
    if(interim.length>2){
      var mi=matchCmd(interim);
      if(mi&&mi.id!==0){
        try{r.abort();}catch(x){}
        waiting4cmd=false;
        execCmd(mi);
        return;
      }
    }

    // Try command on final result
    if(final_tr){
      if(casual(final_tr.toLowerCase())){try{r.abort();}catch(x){}waiting4cmd=false;return;}
      var mf=matchCmd(final_tr);
      if(mf&&mf.id!==0){
        try{r.abort();}catch(x){}
        waiting4cmd=false;
        execCmd(mf);
        return;
      }
      // Check wake in final too
      if(!waiting4cmd&&isWake(final_tr)){
        waiting4cmd=true;
        try{r.abort();}catch(x){}
        if(curR){try{curR.abort();}catch(e){}curR=null;}
        speakZHthen('你好，小迪',function(){
          setResult('WAKE','قول الأمر الآن','你好，小迪','nǐ hǎo xiǎo dí');
          if(running)loop();
        });
        return;
      }
      // No match — if we were waiting for command, reset
      if(waiting4cmd){
        waiting4cmd=false;
        setResult('لم أفهم · Not understood',final_tr,'?','');
      }
    }
  };

  r.onerror=function(ev){
    curR=null;
    var soft=['no-speech','aborted','network'];
    var s=false;for(var i=0;i<soft.length;i++)if(soft[i]===ev.error){s=true;break;}
    if(!s)console.warn('SR:',ev.error);
    if(running)setTimeout(loop,s?30:200);
  };

  r.onend=function(){
    curR=null;
    if(running)setTimeout(loop,30);
  };

  try{r.start();}catch(e){
    curR=null;
    if(running)setTimeout(loop,400);
  }
}

/* ════ WAKE DETECT ════ */
function isWake(t){
  var s=t.toLowerCase().replace(/\s+/g,'');
  if(s.indexOf('byd')>=0||s.indexOf('byad')>=0)return true;
  var sw=t.toLowerCase();
  if(sw.indexOf('بيد')>=0||sw.indexOf('باي دي')>=0)return true;
  if(sw.indexOf('هاي')>=0)return true;
  if(sw.indexOf('小迪')>=0||sw.indexOf('xiao di')>=0)return true;
  return false;
}

/* ════ MATCH ════ */
function matchCmd(txt){
  var t=txt.trim(),tl=t.toLowerCase();
  var ci=isCl(tl),oi=isOp(tl);
  var ks=Object.keys(EX).sort(function(a,b){return b.length-a.length;});
  for(var k=0;k<ks.length;k++){
    if(tl.indexOf(ks[k])>=0){
      var tid=EX[ks[k]];
      if(ci&&OIDS[tid])continue;
      if(oi&&!ci&&CIDS[tid])continue;
      for(var x=0;x<DB.length;x++)if(DB[x].id===tid)return DB[x];
    }
  }
  var best=null,bs=0;
  for(var ci2=0;ci2<DB.length;ci2++){
    var cmd=DB[ci2];
    if(ci&&OIDS[cmd.id])continue;
    if(oi&&!ci&&CIDS[cmd.id])continue;
    var phs=[cmd.en.toLowerCase()];
    if(cmd.ar)for(var ai=0;ai<cmd.ar.length;ai++)phs.push(cmd.ar[ai].toLowerCase());
    for(var pi=0;pi<phs.length;pi++){
      var ph=phs[pi];
      if(tl===ph){if(1>bs){bs=1;best=cmd;}continue;}
      if(tl.indexOf(ph)>=0||ph.indexOf(tl)>=0){if(0.93>bs){bs=0.93;best=cmd;}continue;}
      var pw=ph.split(/\s+/),tw=tl.split(/\s+/),hits=0;
      for(var wi=0;wi<pw.length;wi++)
        for(var ti=0;ti<tw.length;ti++)
          if(pw[wi].length>1&&tw[ti].length>1&&(pw[wi]===tw[ti]||pw[wi].indexOf(tw[ti])>=0||tw[ti].indexOf(pw[wi])>=0))hits++;
      var sc=(hits/Math.max(pw.length,1))*(ph.length/(ph.length+5));
      if(sc>bs){bs=sc;best=cmd;}
    }
  }
  return bs>0.18?best:null;
}

/* ════ EXECUTE ════ */
function execCmd(cmd){
  lastId=cmd.id;
  var lb=(lang!=='en'&&cmd.ar&&cmd.ar.length)?cmd.ar[0]:cmd.en;
  setResult('EXECUTING · تنفيذ ✓',lb,cmd.zh,cmd.py);
  setStatus('speaking','🔊 '+lb);
  rndr();
  toast(cmd.zh+'  ·  '+lb);
  // Stop SR before speaking to prevent conflict
  if(curR){try{curR.abort();}catch(e){}curR=null;}
  speakZHthen(cmd.zh, function(){
    // Restart loop ONLY after TTS finishes
    setResult('DONE ✓ · تم',lb,cmd.zh,cmd.py);
    waiting4cmd=false;
    if(running){
      setStatus('listening','👂 يستمع · Say BYD...');
      setTimeout(loop,300);
    }
  });
}

/* ════ CASUAL ════ */
function casual(t){
  for(var i=0;i<CASUAL.length;i++){
    var g=CASUAL[i];
    for(var j=0;j<g.t.length;j++){
      if(t.indexOf(g.t[j])>=0){setResult('CHAT',g.r,'😊','');toast(g.r);return true;}
    }
  }
  return false;
}

/* ════ TTS ════ */
function speakZH(txt){speakZHthen(txt,null);}
function speakZHthen(txt,cb){
  if(And&&And.speak){
    try{And.speak(txt,'zh-CN',1.0,0.88);setT('APK');if(cb)setTimeout(cb,1500);return;}catch(e){}
  }
  if(window.speechSynthesis){
    window.speechSynthesis.cancel();
    var done=false;
    var finish=function(){if(!done){done=true;if(cb)cb();}};
    var doIt=function(){
      var vs=window.speechSynthesis.getVoices(),zh=null;
      for(var i=0;i<vs.length;i++){if(vs[i].lang&&vs[i].lang.indexOf('zh')===0){zh=vs[i];break;}}
      var u=new SpeechSynthesisUtterance(txt);
      u.lang='zh-CN';u.rate=0.85;u.pitch=1.0;u.volume=1.0;
      if(zh)u.voice=zh;
      u.onstart=function(){setT('SYN');};
      u.onend=function(){finish();};
      u.onerror=function(ev){
        if(ev.error!=='interrupted'){gTTS(txt);setTimeout(finish,2000);}
        else finish();
      };
      window.speechSynthesis.speak(u);
      // Safety timeout in case onend never fires (Android WebView bug)
      setTimeout(finish,4000);
    };
    if(window.speechSynthesis.getVoices().length>0)doIt();
    else{window.speechSynthesis.onvoiceschanged=doIt;setTimeout(doIt,300);}
    return;
  }
  gTTS(txt);if(cb)setTimeout(cb,2000);
}
function gTTS(txt){
  if(!navigator.onLine){setT('—');return;}
  try{
    var a=new Audio();
    a.oncanplay=function(){a.play();setT('GTT');};
    a.onerror=function(){setT('—');};
    a.src='https://translate.google.com/translate_tts?ie=UTF-8&q='+encodeURIComponent(txt)+'&tl=zh-CN&client=tw-ob';
    a.load();
  }catch(e){setT('—');}
}
function setT(m){var p=document.getElementById('ttsPill');p.textContent='TTS:'+m;p.className=(m==='APK'||m==='SYN'||m==='GTT')?'pi ok':'pi mu';}

/* ════ UI ════ */
function setResult(label,audio,zh,py){
  document.getElementById('resultlabel').textContent=label;
  document.getElementById('resultaudio').textContent=audio;
  document.getElementById('resultzh').textContent=zh||'';
  document.getElementById('resultpy').textContent=py||'';
}
function toast(msg){clearTimeout(tstT);var t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');tstT=setTimeout(function(){t.classList.remove('on');},3500);}
function setLang(l){lang=l;var ids=['lAr','lEn','lBo'],vs=['ar','en','both'];for(var i=0;i<ids.length;i++)document.getElementById(ids[i]).className='lb'+(l===vs[i]?' on':'');rndr();}
function bldCats(){
  var el=document.getElementById('cats');el.innerHTML='';
  for(var i=0;i<CATS.length;i++){
    var c=CATS[i],b=document.createElement('button');
    b.className='catbtn'+(c===activeCat?' on':'');b.textContent=c;
    (function(cc){b.onclick=function(){activeCat=cc;bldCats();rndr();};})(c);
    el.appendChild(b);
  }
}
function rndr(){
  var q=(document.getElementById('srch').value||'').toLowerCase();
  var ls=[];
  for(var i=0;i<DB.length;i++){
    var c=DB[i],mc=activeCat==='ALL'||c.cat===activeCat;
    var mq=!q||c.en.toLowerCase().indexOf(q)>=0||c.zh.indexOf(q)>=0||(c.ar&&c.ar.join(' ').indexOf(q)>=0);
    if(mc&&mq)ls.push(c);
  }
  document.getElementById('cnt').textContent=ls.length;
  var el=document.getElementById('cmdlist');el.innerHTML='';
  for(var j=0;j<ls.length;j++){
    var cmd=ls[j],d=document.createElement('div');
    d.className='cmd'+(cmd.wk?' wkc':cmd.sp?' spc':'')+(lastId===cmd.id?' done':'');
    var ar=(lang!=='en'&&cmd.ar&&cmd.ar.length)?'<div class="ar">'+cmd.ar[0]+'</div>':'';
    var en=(lang!=='ar')?'<div class="en">'+cmd.en+'</div>':'';
    d.innerHTML='<div class="cmdinfo">'+ar+en+'<div class="ccat">'+cmd.cat+'</div></div><div class="czh">'+cmd.zh+'</div>';
    (function(c){d.onclick=function(){waiting4cmd=false;execCmd(c);};})(cmd);
    el.appendChild(d);
  }
}
init();
return{setLang:setLang,toggleListen:toggleListen,render:rndr};
})();
